<script>
/**
 * Formatters - 表示フォーマットユーティリティ
 *
 * 数値、日付、ステータスなどの表示フォーマット
 */
const Formatters = {
  /**
   * 数値をカンマ区切りでフォーマット
   * @param {number|string} value - 数値
   * @returns {string} フォーマット済み文字列
   */
  number(value) {
    if (value === null || value === undefined || value === '') return '';
    const num = Number(value);
    if (isNaN(num)) return String(value);
    return num.toLocaleString('ja-JP');
  },

  /**
   * 金額をフォーマット（円記号付き）
   * @param {number|string} value - 金額
   * @param {boolean} showYen - 円記号を表示するか
   * @returns {string} フォーマット済み文字列
   */
  currency(value, showYen = true) {
    const formatted = this.number(value);
    if (!formatted) return '';
    return showYen ? `¥${formatted}` : formatted;
  },

  /**
   * カンマ区切り文字列を数値に変換
   * @param {string} str - カンマ区切り文字列
   * @returns {number} 数値
   */
  parseNumber(str) {
    if (!str && str !== 0) return 0;
    const cleaned = String(str).replace(/[,、¥\\s]/g, '');
    return Number(cleaned) || 0;
  },

  /**
   * 入力フィールド用フォーマット（0は空文字表示）
   * @param {number|string} value - 数値
   * @returns {string} フォーマット済み文字列
   */
  forInput(value) {
    if (!value || Number(value) === 0) return '';
    return Number(value).toLocaleString('ja-JP');
  },

  /**
   * 入力中にリアルタイムでカンマ区切りフォーマットする
   * カーソル位置を適切に保持する
   * @param {InputEvent} event - inputイベント
   */
  liveFormat(event) {
    const input = event.target;
    const cursorPos = input.selectionStart;
    const oldValue = input.value;

    // カンマを除去して数字部分だけ取得
    const stripped = oldValue.replace(/,/g, '');
    // 数字・マイナス・小数点のみ残す
    const cleaned = stripped.replace(/[^0-9\-]/g, '');

    if (cleaned === '' || cleaned === '-') {
      input.value = cleaned;
      return;
    }

    const num = parseInt(cleaned, 10);
    if (isNaN(num)) return;

    // カーソル前の数字の桁数を数える（カンマを除いた位置）
    const beforeCursor = oldValue.substring(0, cursorPos);
    const commasBefore = (beforeCursor.match(/,/g) || []).length;
    const digitsBeforeCursor = cursorPos - commasBefore;

    // カンマ付きフォーマット
    const formatted = num.toLocaleString('ja-JP');
    input.value = formatted;

    // 新しいカーソル位置を計算（数字の桁数ベースで復元）
    let digitCount = 0;
    let newPos = formatted.length;
    for (let i = 0; i < formatted.length; i++) {
      if (formatted[i] !== ',') {
        digitCount++;
      }
      if (digitCount >= digitsBeforeCursor) {
        newPos = i + 1;
        break;
      }
    }

    input.setSelectionRange(newPos, newPos);
  },

  /**
   * 日付をフォーマット
   * @param {Date|string} value - 日付
   * @param {string} format - フォーマット ('short', 'long', 'iso')
   * @returns {string} フォーマット済み文字列
   */
  date(value, format = 'short') {
    if (!value) return '';

    const date = value instanceof Date ? value : new Date(value);
    if (isNaN(date.getTime())) return '';

    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');

    switch (format) {
      case 'long':
        return `${year}年${month}月${day}日`;
      case 'iso':
        return `${year}-${month}-${day}`;
      case 'short':
      default:
        return `${year}/${month}/${day}`;
    }
  },

  /**
   * 日時をフォーマット
   * @param {Date|string} value - 日時
   * @returns {string} フォーマット済み文字列
   */
  datetime(value) {
    if (!value) return '';

    const date = value instanceof Date ? value : new Date(value);
    if (isNaN(date.getTime())) return '';

    const dateStr = this.date(date, 'short');
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');

    return `${dateStr} ${hours}:${minutes}`;
  },

  /**
   * 期間をフォーマット
   * @param {Date|string} startDate - 開始日
   * @param {Date|string} endDate - 終了日
   * @returns {string} フォーマット済み文字列
   */
  dateRange(startDate, endDate) {
    const start = this.date(startDate, 'short');
    const end = this.date(endDate, 'short');

    if (!start && !end) return '';
    if (!start) return `〜 ${end}`;
    if (!end) return `${start} 〜`;
    return `${start} 〜 ${end}`;
  },

  /**
   * パーセントをフォーマット
   * @param {number|string} value - 数値
   * @param {number} decimals - 小数点以下桁数
   * @returns {string} フォーマット済み文字列
   */
  percent(value, decimals = 1) {
    if (value === null || value === undefined || value === '') return '';
    const num = Number(value);
    if (isNaN(num)) return '';
    return `${num.toFixed(decimals)}%`;
  },

  /**
   * ファイルサイズをフォーマット
   * @param {number} bytes - バイト数
   * @returns {string} フォーマット済み文字列
   */
  fileSize(bytes) {
    if (!bytes || bytes === 0) return '0 B';

    const units = ['B', 'KB', 'MB', 'GB'];
    let unitIndex = 0;
    let size = bytes;

    while (size >= 1024 && unitIndex < units.length - 1) {
      size /= 1024;
      unitIndex++;
    }

    return `${size.toFixed(unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
  },

  /**
   * 工事ステータスをフォーマット
   * @param {string} status - ステータスコード
   * @returns {Object} { label, class }
   */
  projectStatus(status) {
    const statusMap = {
      'draft': { label: '下書き', class: 'pending' },
      'negotiating': { label: '契約協議中', class: 'pending' },
      'contracted': { label: '契約済', class: 'active' },
      'in_progress': { label: '施工中', class: 'active' },
      'completed': { label: '完工', class: 'completed' },
      'closed': { label: 'クローズ', class: 'completed' }
    };
    return statusMap[status] || { label: status, class: '' };
  },

  /**
   * 支払条件をフォーマット
   * @param {string} condition - 支払条件コード
   * @returns {string} 表示文字列
   */
  paymentCondition(condition) {
    const conditionMap = {
      'immediate': '即日',
      'end_of_month': '当月末',
      'next_month_end': '翌月末',
      'next_next_month_end': '翌々月末',
      'note_60': '手形60日',
      'note_90': '手形90日',
      'note_120': '手形120日'
    };
    return conditionMap[condition] || condition;
  },

  /**
   * 工事IDをフォーマット
   * @param {string} prefix - プレフィックス（例: 'PJ'）
   * @param {number} year - 年度
   * @param {number} sequence - 連番
   * @returns {string} フォーマット済みID
   */
  projectId(prefix, year, sequence) {
    return `${prefix}-${year}-${String(sequence).padStart(4, '0')}`;
  },

  /**
   * 電話番号をフォーマット
   * @param {string} phone - 電話番号
   * @returns {string} フォーマット済み文字列
   */
  phone(phone) {
    if (!phone) return '';
    // ハイフンを除去して再フォーマット
    const cleaned = phone.replace(/[^0-9]/g, '');
    if (cleaned.length === 10) {
      return `${cleaned.slice(0, 3)}-${cleaned.slice(3, 6)}-${cleaned.slice(6)}`;
    }
    if (cleaned.length === 11) {
      return `${cleaned.slice(0, 3)}-${cleaned.slice(3, 7)}-${cleaned.slice(7)}`;
    }
    return phone;
  },

  /**
   * 郵便番号をフォーマット
   * @param {string} zipCode - 郵便番号
   * @returns {string} フォーマット済み文字列
   */
  zipCode(zipCode) {
    if (!zipCode) return '';
    const cleaned = zipCode.replace(/[^0-9]/g, '');
    if (cleaned.length === 7) {
      return `〒${cleaned.slice(0, 3)}-${cleaned.slice(3)}`;
    }
    return zipCode;
  },

  /**
   * 文字列を省略
   * @param {string} text - テキスト
   * @param {number} maxLength - 最大文字数
   * @returns {string} 省略済み文字列
   */
  truncate(text, maxLength = 30) {
    if (!text) return '';
    if (text.length <= maxLength) return text;
    return text.slice(0, maxLength - 1) + '…';
  }
};
</script>
<script>
/**
 * SettlementView - 決算集計画面
 *
 * 竣工日の期間指定で工事を検索し、請負金額・原価・入金・未収入金を一括集計。
 * CSV出力および決算確定後の一括ロック機能を提供。
 */
const SettlementView = {
  name: 'SettlementView',

  props: {
    projects: {
      type: Array,
      default: () => []
    },
    allConstructions: {
      type: Array,
      default: () => []
    }
  },

  emits: ['show-toast'],

  data() {
    return {
      // 検索条件
      searchDateFrom: '',
      searchDateTo: '',
      // 検索結果
      results: [],
      searched: false,
      loading: false,
      // 取得データ
      orders: [],
      invoices: [],
      // ロック操作
      lockLoading: false
    };
  },

  computed: {
    // サマリー集計
    summaryCount() {
      return this.results.length;
    },
    summaryContractAmount() {
      return this.results.reduce((sum, r) => sum + r.contractAmount, 0);
    },
    summaryCostAmount() {
      return this.results.reduce((sum, r) => sum + r.costAmount, 0);
    },
    summaryGrossProfit() {
      return this.results.reduce((sum, r) => sum + r.grossProfit, 0);
    },
    summaryPaymentAmount() {
      return this.results.reduce((sum, r) => sum + r.paymentAmount, 0);
    },
    summaryUnpaidAmount() {
      return this.results.reduce((sum, r) => sum + r.unpaidAmount, 0);
    },
    summaryGrossProfitRate() {
      if (this.summaryContractAmount === 0) return '0.0';
      return (this.summaryGrossProfit / this.summaryContractAmount * 100).toFixed(1);
    },
    // ロック可能な（未ロックの）工事があるか
    hasUnlockedResults() {
      return this.results.some(r => !r.locked);
    }
  },

  methods: {
    async search() {
      if (!this.searchDateFrom || !this.searchDateTo) {
        this.$emit('show-toast', '竣工日の開始日・終了日を入力してください', 'error');
        return;
      }
      if (this.searchDateFrom > this.searchDateTo) {
        this.$emit('show-toast', '開始日は終了日以前を指定してください', 'error');
        return;
      }

      this.loading = true;
      this.searched = true;

      try {
        // 発注と請求データを並行取得
        const [ordersData, invoicesData] = await Promise.all([
          GasApi.getOrders(),
          GasApi.getInvoices({})
        ]);
        this.orders = ordersData || [];
        this.invoices = invoicesData || [];

        // 竣工日（endDate）が期間内の工事をフィルタ
        const from = this.searchDateFrom;
        const to = this.searchDateTo;
        const filtered = this.allConstructions.filter(c => {
          const endDate = c.endDate || c['完工日'] || '';
          return endDate >= from && endDate <= to;
        });

        // 各工事の集計
        this.results = filtered.map(c => {
          const constructionId = c.constructionId || c['工事番号'];
          const projectId = c.projectId || c['関連案件ID'];
          const constructionName = c.constructionName || c['工事名称'] || '';
          const endDate = c.endDate || c['完工日'] || '';
          const locked = !!c.locked;

          // 案件を逆引き → 契約金額（請負金額）、顧客名
          const project = this.projects.find(p =>
            (p['案件ID'] || p.projectId) === projectId
          );
          const contractAmount = project ? (Number(project['契約金額']) || 0) : 0;
          const customerName = project ? (project['顧客名'] || '') : '';

          // 発注合計（原価）
          // getOrders()は日本語キーで返す
          const costAmount = this.orders
            .filter(o => (o['関連工事番号'] || o.constructionId) === constructionId)
            .reduce((sum, o) => sum + (Number(o['注文金額'] || o.orderAmount) || 0), 0);

          // 請求の入金合計
          const paymentAmount = this.invoices
            .filter(inv => inv.projectId === projectId)
            .reduce((sum, inv) => sum + (Number(inv.paymentAmount) || 0), 0);

          // 未収入金 = 請負金額 − 入金合計
          const unpaidAmount = contractAmount - paymentAmount;
          // 粗利 = 請負金額 − 原価合計
          const grossProfit = contractAmount - costAmount;

          return {
            constructionId,
            projectId,
            constructionName,
            customerName,
            endDate,
            contractAmount,
            costAmount,
            grossProfit,
            paymentAmount,
            unpaidAmount,
            locked
          };
        });
      } catch (e) {
        console.error('決算集計エラー:', e);
        this.$emit('show-toast', '集計データの取得に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    // CSV出力
    exportCsv() {
      if (this.results.length === 0) return;

      const headers = ['工事番号', '工事名', '顧客名', '竣工日', '請負金額', '原価合計', '粗利', '入金合計', '未収入金'];
      const rows = this.results.map(r => [
        r.constructionId,
        r.constructionName,
        r.customerName,
        r.endDate,
        r.contractAmount,
        r.costAmount,
        r.grossProfit,
        r.paymentAmount,
        r.unpaidAmount
      ]);

      // サマリー行
      rows.push([]);
      rows.push(['合計', '', '', '',
        this.summaryContractAmount,
        this.summaryCostAmount,
        this.summaryGrossProfit,
        this.summaryPaymentAmount,
        this.summaryUnpaidAmount
      ]);

      const csvContent = [headers, ...rows]
        .map(row => row.map(cell => {
          const str = String(cell == null ? '' : cell);
          return str.includes(',') || str.includes('"') || str.includes('\n')
            ? '"' + str.replace(/"/g, '""') + '"'
            : str;
        }).join(','))
        .join('\n');

      // BOM付きUTF-8
      const bom = '\uFEFF';
      const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '決算集計_' + this.searchDateFrom + '_' + this.searchDateTo + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      this.$emit('show-toast', 'CSVファイルをダウンロードしました', 'success');
    },

    // 一括ロック
    async lockAll() {
      const unlocked = this.results.filter(r => !r.locked);
      if (unlocked.length === 0) {
        this.$emit('show-toast', 'すべての工事がロック済みです', 'info');
        return;
      }
      if (!confirm('この期間の未ロック工事 ' + unlocked.length + ' 件を一括ロックしますか？\nロック後は工事の編集・削除ができなくなります。')) {
        return;
      }
      this.lockLoading = true;
      try {
        const ids = unlocked.map(r => r.constructionId);
        const result = await GasApi.lockConstructions(ids);
        if (result && result.success !== false) {
          // ローカル状態を更新
          this.results.forEach(r => { r.locked = true; });
          this.$emit('show-toast', unlocked.length + ' 件の工事をロックしました', 'success');
        } else {
          this.$emit('show-toast', 'ロックに失敗しました: ' + (result ? result.error : ''), 'error');
        }
      } catch (e) {
        console.error('一括ロックエラー:', e);
        this.$emit('show-toast', '一括ロック処理に失敗しました', 'error');
      } finally {
        this.lockLoading = false;
      }
    },

    // ロック解除（管理者のみ）
    async unlockConstruction(row) {
      if (!confirm('工事「' + row.constructionName + '」のロックを解除しますか？')) return;
      try {
        const result = await GasApi.unlockConstruction(row.constructionId);
        if (result && result.success !== false) {
          row.locked = false;
          this.$emit('show-toast', 'ロックを解除しました', 'success');
        } else {
          this.$emit('show-toast', 'ロック解除に失敗しました', 'error');
        }
      } catch (e) {
        console.error('ロック解除エラー:', e);
        this.$emit('show-toast', 'ロック解除に失敗しました', 'error');
      }
    },

    formatCurrency(val) {
      return Number(val || 0).toLocaleString();
    },

    formatDate(dateStr) {
      if (!dateStr) return '-';
      return dateStr;
    }
  },

  template: `
    <div class="settlement-view" style="padding: 0;">
      <!-- ページヘッダー -->
      <div class="ip-page-header">
        <h2>
          <span class="header-icon" style="background:#ede7f6;">📊</span>
          決算集計
        </h2>
      </div>

      <!-- 検索フィルタ -->
      <div class="ip-filter-area">
        <div class="ip-filter-row">
          <div class="ip-filter-item">
            <label>竣工日（開始）</label>
            <input type="date" v-model="searchDateFrom" style="min-width:160px;">
          </div>
          <div style="padding-bottom:8px; color:#999; font-weight:500;">〜</div>
          <div class="ip-filter-item">
            <label>竣工日（終了）</label>
            <input type="date" v-model="searchDateTo" style="min-width:160px;">
          </div>
          <div class="ip-filter-item" style="align-self:flex-end;">
            <button class="btn btn-primary" @click="search" :disabled="loading" style="height:36px;">
              {{ loading ? '検索中...' : '検索' }}
            </button>
          </div>
        </div>
      </div>

      <!-- 検索結果 -->
      <template v-if="searched">
        <!-- サマリーカード -->
        <div class="ip-summary-row">
          <div class="ip-summary-card">
            <div class="ip-sc-label">該当工事</div>
            <div class="ip-sc-value">{{ summaryCount }}<span style="font-size:14px;font-weight:400;"> 件</span></div>
          </div>
          <div class="ip-summary-card">
            <div class="ip-sc-label">請負金額</div>
            <div class="ip-sc-value">{{ Formatters.currency(summaryContractAmount) }}</div>
          </div>
          <div class="ip-summary-card" style="border-left:4px solid #e67e22;">
            <div class="ip-sc-label">原価合計</div>
            <div class="ip-sc-value" style="color:#e67e22;">{{ Formatters.currency(summaryCostAmount) }}</div>
          </div>
          <div class="ip-summary-card" :class="summaryGrossProfit >= 0 ? 'accent-green' : 'accent-red'">
            <div class="ip-sc-label">粗利合計</div>
            <div class="ip-sc-value">{{ Formatters.currency(summaryGrossProfit) }}</div>
            <div class="ip-sc-sub">粗利率 {{ summaryGrossProfitRate }}%</div>
          </div>
          <div class="ip-summary-card" style="border-left:4px solid #17a2b8;">
            <div class="ip-sc-label">入金合計</div>
            <div class="ip-sc-value" style="color:#17a2b8;">{{ Formatters.currency(summaryPaymentAmount) }}</div>
          </div>
          <div class="ip-summary-card" :class="summaryUnpaidAmount > 0 ? 'accent-orange' : ''">
            <div class="ip-sc-label">未収入金</div>
            <div class="ip-sc-value">{{ Formatters.currency(summaryUnpaidAmount) }}</div>
          </div>
        </div>

        <!-- アクションバー -->
        <div style="display:flex; gap:10px; margin-bottom:16px; align-items:center;">
          <button class="btn" @click="exportCsv" :disabled="results.length === 0" style="border:1px solid var(--border-color); background:var(--bg-primary); font-size:13px; display:flex; align-items:center; gap:6px;">
            <span style="font-size:15px;">📥</span> CSV出力
          </button>
          <button class="btn" @click="lockAll" :disabled="lockLoading || !hasUnlockedResults" style="border:1px solid #e67e22; color:#e67e22; background:#fff; font-size:13px; display:flex; align-items:center; gap:6px;">
            <span style="font-size:15px;">🔒</span> {{ lockLoading ? 'ロック中...' : '一括ロック' }}
          </button>
          <div style="flex:1;"></div>
          <span style="font-size:12px; color:#999;">{{ results.filter(r => r.locked).length }}/{{ results.length }} 件ロック済</span>
        </div>

        <!-- 結果テーブル -->
        <div class="ip-table-wrap">
          <table v-if="results.length > 0">
            <thead>
              <tr>
                <th style="width:36px;"></th>
                <th>工事番号</th>
                <th>工事名</th>
                <th>顧客名</th>
                <th>竣工日</th>
                <th style="text-align:right;">請負金額</th>
                <th style="text-align:right;">原価合計</th>
                <th style="text-align:right;">粗利</th>
                <th style="text-align:right;">粗利率</th>
                <th style="text-align:right;">入金合計</th>
                <th style="text-align:right;">未収入金</th>
                <th style="width:70px; text-align:center;">操作</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="row in results" :key="row.constructionId" :style="{ opacity: row.locked ? 0.7 : 1 }">
                <td style="text-align:center; font-size:14px;">
                  <span v-if="row.locked" title="決算確定済">🔒</span>
                </td>
                <td style="font-family:monospace; font-size:12px; color:#666;">{{ row.constructionId }}</td>
                <td style="font-weight:500;">{{ row.constructionName }}</td>
                <td>{{ row.customerName }}</td>
                <td>{{ formatDate(row.endDate) }}</td>
                <td style="text-align:right;" class="ip-amount">{{ Formatters.currency(row.contractAmount) }}</td>
                <td style="text-align:right; color:#e67e22;" class="ip-amount">{{ Formatters.currency(row.costAmount) }}</td>
                <td style="text-align:right; font-weight:600;" class="ip-amount" :style="{ color: row.grossProfit < 0 ? 'var(--danger-color)' : 'var(--success-color)' }">{{ Formatters.currency(row.grossProfit) }}</td>
                <td style="text-align:right; font-size:12px;" :style="{ color: row.contractAmount > 0 ? (row.grossProfit / row.contractAmount * 100 < 10 ? 'var(--danger-color)' : '#666') : '#999' }">
                  {{ row.contractAmount > 0 ? (row.grossProfit / row.contractAmount * 100).toFixed(1) + '%' : '-' }}
                </td>
                <td style="text-align:right; color:#17a2b8; font-weight:600;" class="ip-amount">{{ Formatters.currency(row.paymentAmount) }}</td>
                <td style="text-align:right; font-weight:600;" class="ip-amount" :style="{ color: row.unpaidAmount > 0 ? '#e67e22' : '#999' }">{{ Formatters.currency(row.unpaidAmount) }}</td>
                <td style="text-align:center;">
                  <button v-if="row.locked" class="ip-btn-icon" @click="unlockConstruction(row)" title="ロック解除" style="font-size:13px;">🔓</button>
                </td>
              </tr>
            </tbody>
            <tfoot>
              <tr style="font-weight:700; background:#f8f9fa; border-top:2px solid #333;">
                <td></td>
                <td colspan="4" style="font-size:13px;">合計（{{ results.length }}件）</td>
                <td style="text-align:right;" class="ip-amount">{{ Formatters.currency(summaryContractAmount) }}</td>
                <td style="text-align:right; color:#e67e22;" class="ip-amount">{{ Formatters.currency(summaryCostAmount) }}</td>
                <td style="text-align:right;" class="ip-amount" :style="{ color: summaryGrossProfit >= 0 ? 'var(--success-color)' : 'var(--danger-color)' }">{{ Formatters.currency(summaryGrossProfit) }}</td>
                <td style="text-align:right; font-size:12px;">{{ summaryGrossProfitRate }}%</td>
                <td style="text-align:right; color:#17a2b8;" class="ip-amount">{{ Formatters.currency(summaryPaymentAmount) }}</td>
                <td style="text-align:right; color:#e67e22;" class="ip-amount">{{ Formatters.currency(summaryUnpaidAmount) }}</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
          <div v-else class="ip-empty-state">
            <div class="ip-empty-icon">📊</div>
            <p>該当する工事がありません</p>
          </div>
        </div>
      </template>

      <!-- 未検索状態 -->
      <div v-else class="ip-empty-state" style="margin-top:40px;">
        <div class="ip-empty-icon" style="font-size:56px;">📊</div>
        <p style="font-size:15px; color:#888; margin-top:12px;">竣工日の期間を指定して検索してください</p>
      </div>

      <div v-if="loading" class="loading-overlay"><div class="spinner"></div></div>
    </div>
  `
};
</script>
<script>
/**
 * InvoicePayment - 請求・支払管理画面
 *
 * 顧客請求タブと協力会社支払タブを持つ統合管理画面
 */
const InvoicePayment = {
  name: 'InvoicePayment',

  props: {
    projects: {
      type: Array,
      default: () => []
    },
    customers: {
      type: Array,
      default: () => []
    },
    vendors: {
      type: Array,
      default: () => []
    },
    allConstructions: {
      type: Array,
      default: () => []
    }
  },

  emits: ['save-invoice', 'save-payment', 'show-toast'],

  data() {
    return {
      activeTab: 'invoice',

      // 請求データ
      invoices: [],
      invoiceFilter: {
        keyword: '',
        projectId: '',
        status: '',
        invoiceType: '',
        dateFrom: '',
        dateTo: '',
        overdueOnly: false
      },
      invoiceStatuses: ['未入金', '一部入金', '入金済'],
      showInvoiceModal: false,
      editingInvoice: null,

      // 支払データ
      payments: [],
      paymentFilter: {
        keyword: '',
        projectId: '',
        yearMonth: '',
        status: '',
        overdueOnly: false
      },
      paymentStatuses: ['未払', '承認済', '一部支払済', '支払済'],
      showPaymentModal: false,
      editingPayment: null,

      // 支払実行モーダル
      showPaymentExecModal: false,
      paymentExecData: {
        paymentId: '', vendorName: '', projectName: '', amountIncludingTax: 0, totalPaid: 0,
        remainingAmount: 0, remainingCash: 0, remainingNote: 0,
        executionDate: '', cashAmount: 0, noteAmount: 0, noteSite: '', noteDueDate: '', notes: ''
      },

      // 支払履歴モーダル
      showPaymentHistoryModal: false,
      paymentHistoryData: {
        paymentId: '', vendorName: '', amountIncludingTax: 0, totalPaid: 0, remainingAmount: 0,
        histories: []
      },

      // 入金記録モーダル
      showPaymentRecordModal: false,
      paymentRecordData: {
        invoiceId: '', customerName: '', projectName: '', invoiceType: '',
        amountIncludingTax: 0, alreadyPaid: 0, remainingAmount: 0,
        paymentDate: '', paymentAmount: 0, notes: ''
      },

      // 入金履歴モーダル
      showInvoiceHistoryModal: false,
      invoiceHistoryData: {
        invoiceId: '', customerName: '', amountIncludingTax: 0, totalPaid: 0, remainingAmount: 0,
        histories: []
      },

      // 出来高査定モーダル
      showProgressModal: false,
      progressData: {
        paymentId: '',
        approvedAmount: 0
      },

      // 請求タイプ
      invoiceTypes: ['着手金', '中間請求', '最終請求', '追加工事', 'その他'],

      // ローディング
      loading: false,

      // キャッシュフラグ（重複読み込み防止）
      invoicesLoaded: false,
      paymentsLoaded: false
    };
  },

  mounted() {
    // 初回マウント時にデフォルトタブ（請求）のデータをロード
    console.log('[InvoicePayment] mounted');
    this.loadInvoices();
  },

  computed: {
    todayStr() {
      return new Date().toISOString().split('T')[0];
    },

    /** 案件ID → 工事番号の配列 マッピング */
    constructionNumberMap() {
      const map = {};
      (this.allConstructions || []).forEach(c => {
        const pid = c.projectId || c['関連案件ID'];
        if (pid) {
          if (!map[pid]) map[pid] = [];
          const cid = c.constructionId || c['工事番号'] || '';
          if (cid && !map[pid].includes(cid)) map[pid].push(cid);
        }
      });
      return map;
    },

    filteredInvoices() {
      let result = [...this.invoices];
      const f = this.invoiceFilter;
      if (f.keyword) {
        const kw = f.keyword.toLowerCase();
        result = result.filter(inv =>
          (inv.customerName || '').toLowerCase().includes(kw) ||
          (inv.invoiceId || '').toLowerCase().includes(kw) ||
          (this.getProjectName(inv.projectId) || '').toLowerCase().includes(kw)
        );
      }
      if (f.projectId) result = result.filter(inv => inv.projectId === f.projectId);
      if (f.status) result = result.filter(inv => inv.paymentStatus === f.status);
      if (f.invoiceType) result = result.filter(inv => inv.invoiceType === f.invoiceType);
      if (f.dateFrom) result = result.filter(inv => inv.invoiceDate >= f.dateFrom);
      if (f.dateTo) result = result.filter(inv => inv.invoiceDate <= f.dateTo);
      if (f.overdueOnly) {
        result = result.filter(inv => inv.paymentStatus !== '入金済' && inv.dueDate && inv.dueDate < this.todayStr);
      }
      return result;
    },

    filteredPayments() {
      let result = [...this.payments];
      const f = this.paymentFilter;
      if (f.keyword) {
        const kw = f.keyword.toLowerCase();
        result = result.filter(pay =>
          (pay.vendorName || '').toLowerCase().includes(kw) ||
          (pay.paymentId || '').toLowerCase().includes(kw)
        );
      }
      if (f.projectId) result = result.filter(pay => pay.projectId === f.projectId);
      if (f.yearMonth) result = result.filter(pay => pay.invoiceMonth === f.yearMonth);
      if (f.status) result = result.filter(pay => pay.paymentStatus === f.status);
      if (f.overdueOnly) {
        result = result.filter(pay => pay.paymentStatus !== '支払済' && pay.dueDate && pay.dueDate < this.todayStr);
      }
      return result;
    },

    invoiceSummary() {
      const invs = this.filteredInvoices;
      const total = invs.reduce((sum, inv) => sum + (inv.amountIncludingTax || 0), 0);
      const paid = invs.reduce((sum, inv) => sum + (inv.paymentAmount || 0), 0);
      const unpaid = total - paid;
      const count = invs.length;
      const unpaidCount = invs.filter(inv => inv.paymentStatus !== '入金済').length;
      const overdueCount = invs.filter(inv => inv.paymentStatus !== '入金済' && inv.dueDate && inv.dueDate < this.todayStr).length;
      return { total, paid, unpaid, count, unpaidCount, overdueCount };
    },

    paymentSummary() {
      const pays = this.filteredPayments;
      const total = pays.reduce((sum, pay) => sum + (pay.amountIncludingTax || 0), 0);
      const count = pays.length;
      const overdueCount = pays.filter(pay => pay.paymentStatus !== '支払済' && pay.dueDate && pay.dueDate < this.todayStr).length;
      const totalCash = pays.reduce((sum, pay) => sum + (pay.cashPayment || 0), 0);
      const totalNote = pays.reduce((sum, pay) => sum + (pay.notePayment || 0), 0);
      const totalPaid = pays.reduce((sum, pay) => sum + (pay.totalPaid || 0), 0);
      const totalRemaining = pays.reduce((sum, pay) => sum + (pay.remainingAmount || 0), 0);
      return { total, count, overdueCount, totalCash, totalNote, totalPaid, totalRemaining };
    },

    yearMonthOptions() {
      const options = [];
      const today = new Date();
      for (let i = -1; i < 12; i++) {
        const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
        const value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        const label = `${d.getFullYear()}年${d.getMonth() + 1}月`;
        options.push({ value, label });
      }
      return options;
    },

    invoiceFilterActive() {
      const f = this.invoiceFilter;
      return !!(f.keyword || f.projectId || f.status || f.invoiceType || f.dateFrom || f.dateTo || f.overdueOnly);
    },

    paymentFilterActive() {
      const f = this.paymentFilter;
      return !!(f.keyword || f.projectId || f.yearMonth || f.status || f.overdueOnly);
    }
  },

  watch: {
    activeTab: {
      handler(newTab) {
        // タブ切り替え時、未ロードの場合のみ読み込み
        if (newTab === 'invoice' && !this.invoicesLoaded) {
          this.loadInvoices();
        } else if (newTab === 'payment' && !this.paymentsLoaded) {
          this.loadPayments();
        }
      }
      // immediate: true を削除（mountedで初回ロード）
    }
  },

  methods: {
    getCurrentYearMonth() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    },

    async loadInvoices(forceReload = false) {
      // キャッシュがあり、強制リロードでなければスキップ
      if (this.invoicesLoaded && !forceReload) {
        console.log('[InvoicePayment] 請求データはキャッシュ済み');
        return;
      }
      this.loading = true;
      try {
        console.log('[InvoicePayment] 請求データを読み込み中...');
        // 初回はフィルターなしで全件取得（nullの場合は空配列）
        const result = await GasApi.getInvoices({});
        this.invoices = Array.isArray(result) ? result : [];
        this.invoicesLoaded = true;
        console.log('[InvoicePayment] 請求データ読み込み完了:', this.invoices.length, '件');
      } catch (e) {
        console.error('請求読み込みエラー:', e);
        this.invoices = [];  // エラー時も空配列を設定
        this.$emit('show-toast', '請求データの読み込みに失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    async loadPayments(forceReload = false) {
      // キャッシュがあり、強制リロードでなければスキップ
      if (this.paymentsLoaded && !forceReload) {
        console.log('[InvoicePayment] 支払データはキャッシュ済み');
        return;
      }
      this.loading = true;
      try {
        console.log('[InvoicePayment] 支払データを読み込み中...');
        console.log('[InvoicePayment] GasApi.getPayments を呼び出します');
        // 初回はフィルターなしで全件取得（nullの場合は空配列）
        const result = await GasApi.getPayments({});
        console.log('[InvoicePayment] GasApi.getPayments 結果:', result);
        this.payments = Array.isArray(result) ? result : [];
        this.paymentsLoaded = true;
        console.log('[InvoicePayment] 支払データ読み込み完了:', this.payments.length, '件');
      } catch (e) {
        console.error('[InvoicePayment] 支払読み込みエラー:', e);
        console.error('[InvoicePayment] エラー詳細:', e.message, e.stack);
        this.payments = [];  // エラー時も空配列を設定
        this.$emit('show-toast', '支払データの読み込みに失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    newInvoice() {
      this.editingInvoice = {
        invoiceId: '', projectId: '', customerId: '', customerName: '',
        invoiceType: '', invoiceDate: new Date().toISOString().split('T')[0],
        amountExcludingTax: 0, tax: 0, amountIncludingTax: 0, dueDate: '',
        paymentStatus: '未入金', paymentDate: '', paymentAmount: 0, paymentDifference: 0, notes: ''
      };
      this.showInvoiceModal = true;
    },

    editInvoice(invoice) {
      this.editingInvoice = { ...invoice };
      this.showInvoiceModal = true;
    },

    async saveInvoice() {
      this.loading = true;
      try {
        const result = await GasApi.saveInvoice(this.editingInvoice);
        if (result.success) {
          this.$emit('show-toast', '請求を保存しました', 'success');
          this.showInvoiceModal = false;
          await this.loadInvoices(true);
        } else {
          this.$emit('show-toast', result.error || '保存に失敗しました', 'error');
        }
      } catch (e) {
        console.error('請求保存エラー:', e);
        this.$emit('show-toast', '保存に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    openPaymentRecord(invoice) {
      const alreadyPaid = Number(invoice.paymentAmount || 0);
      const remaining = Number(invoice.amountIncludingTax || 0) - alreadyPaid;
      this.paymentRecordData = {
        invoiceId: invoice.invoiceId,
        customerName: invoice.customerName || '',
        projectName: this.getProjectName(invoice.projectId),
        invoiceType: invoice.invoiceType || '',
        amountIncludingTax: Number(invoice.amountIncludingTax || 0),
        alreadyPaid: alreadyPaid,
        remainingAmount: remaining,
        paymentDate: new Date().toISOString().split('T')[0],
        paymentAmount: 0,
        notes: ''
      };
      this.showPaymentRecordModal = true;
    },

    onInvoiceRowClick(inv) {
      if (inv.paymentStatus !== '入金済') {
        this.openPaymentRecord(inv);
      } else {
        this.editInvoice(inv);
      }
    },

    async recordPayment() {
      const d = this.paymentRecordData;
      const thisAmount = Number(d.paymentAmount || 0);
      if (thisAmount <= 0) {
        this.$emit('show-toast', '入金金額を入力してください', 'error');
        return;
      }
      if (thisAmount > d.remainingAmount + 1) {
        this.$emit('show-toast', '入金金額が残額を超えています', 'error');
        return;
      }
      this.loading = true;
      try {
        const result = await GasApi.recordInvoicePayment(d.invoiceId, {
          paymentDate: d.paymentDate,
          thisAmount: thisAmount,
          notes: d.notes || ''
        });
        if (result.success) {
          this.$emit('show-toast', '入金を記録しました', 'success');
          this.showPaymentRecordModal = false;
          await this.loadInvoices(true);
        } else {
          this.$emit('show-toast', result.error || '入金記録に失敗しました', 'error');
        }
      } catch (e) {
        console.error('入金消込エラー:', e);
        this.$emit('show-toast', '入金記録に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    // === 入金履歴モーダル ===
    async openInvoiceHistory(inv) {
      this.invoiceHistoryData = {
        invoiceId: inv.invoiceId,
        customerName: inv.customerName,
        amountIncludingTax: inv.amountIncludingTax,
        totalPaid: inv.paymentAmount || 0,
        remainingAmount: inv.amountIncludingTax - (inv.paymentAmount || 0),
        histories: []
      };
      this.showInvoiceHistoryModal = true;
      try {
        const result = await GasApi.getInvoicePaymentHistory(inv.invoiceId);
        this.invoiceHistoryData.histories = Array.isArray(result) ? result : [];
      } catch (e) {
        console.error('入金履歴取得エラー:', e);
        this.invoiceHistoryData.histories = [];
      }
    },

    async deleteInvoiceHistory(historyId) {
      if (!confirm('この入金履歴を削除しますか？\n削除すると残額が増加します。')) return;
      this.loading = true;
      try {
        const result = await GasApi.deleteInvoicePaymentHistory(historyId);
        if (result.success) {
          this.$emit('show-toast', '入金履歴を削除しました', 'success');
          this.invoiceHistoryData.histories = this.invoiceHistoryData.histories.filter(h => h.historyId !== historyId);
          const newTotal = this.invoiceHistoryData.histories.reduce((sum, h) => sum + (h.paymentAmount || 0), 0);
          this.invoiceHistoryData.totalPaid = newTotal;
          this.invoiceHistoryData.remainingAmount = this.invoiceHistoryData.amountIncludingTax - newTotal;
          await this.loadInvoices(true);
        }
      } catch (e) {
        console.error('入金履歴削除エラー:', e);
        this.$emit('show-toast', '削除に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    newPayment() {
      this.editingPayment = {
        paymentId: '', orderId: '', projectId: '', vendorId: '', vendorName: '',
        invoiceMonth: this.getCurrentYearMonth(), closingDay: '', dueDate: '',
        amountExcludingTax: 0, tax: 0, amountIncludingTax: 0, progressConfirmed: false,
        progressAmount: 0, cashPayment: 0, notePayment: 0, noteSite: '',
        paymentStatus: '未払', paymentDate: '', notes: '',
        orderCategory: 'その他', safetyFee: 0, paymentBase: 0, costAmount: 0,
        settlementType: '通常', safetyFeeExempt: false
      };
      this.showPaymentModal = true;
    },

    editPayment(payment) {
      this.editingPayment = { ...payment };
      this.showPaymentModal = true;
    },

    async savePayment() {
      this.loading = true;
      try {
        const result = await GasApi.savePayment(this.editingPayment);
        if (result.success) {
          this.$emit('show-toast', '支払を保存しました', 'success');
          this.showPaymentModal = false;
          await this.loadPayments();
        } else {
          this.$emit('show-toast', result.error || '保存に失敗しました', 'error');
        }
      } catch (e) {
        console.error('支払保存エラー:', e);
        this.$emit('show-toast', '保存に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    async onVendorSelectForPayment(vendorId) {
      if (!vendorId) return;
      try {
        const result = await GasApi.applyVendorPaymentTerms(
          vendorId,
          this.editingPayment.amountExcludingTax,
          this.editingPayment.orderCategory || 'その他'
        );
        if (result.success) {
          const data = result.data;
          this.editingPayment.vendorId = data.vendorId;
          this.editingPayment.vendorName = data.vendorName;
          this.editingPayment.closingDay = data.closingDay;
          this.editingPayment.noteSite = data.noteSite;
          this.editingPayment.safetyFee = data.safetyFee;
          this.editingPayment.costAmount = data.costAmount;
          this.editingPayment.cashPayment = data.cashPayment;
          this.editingPayment.notePayment = data.notePayment;
        }
      } catch (e) {
        console.error('支払条件適用エラー:', e);
      }
    },

    async recalculatePaymentSplit() {
      if (!this.editingPayment?.vendorId || !this.editingPayment?.amountExcludingTax) return;
      try {
        const result = await GasApi.applyVendorPaymentTerms(
          this.editingPayment.vendorId,
          this.editingPayment.amountExcludingTax,
          this.editingPayment.orderCategory || 'その他'
        );
        if (result.success) {
          const data = result.data;
          this.editingPayment.tax = data.tax;
          this.editingPayment.amountIncludingTax = data.amountIncludingTax;
          this.editingPayment.safetyFee = data.safetyFee;
          this.editingPayment.costAmount = data.costAmount;
          this.editingPayment.cashPayment = data.cashPayment;
          this.editingPayment.notePayment = data.notePayment;
        }
      } catch (e) {
        console.error('支払配分計算エラー:', e);
      }
    },

    openProgressApproval(payment) {
      this.progressData = { paymentId: payment.paymentId, approvedAmount: payment.amountIncludingTax };
      this.showProgressModal = true;
    },

    async approveProgress() {
      this.loading = true;
      try {
        const result = await GasApi.approvePayment(this.progressData.paymentId, this.progressData.approvedAmount);
        if (result.success) {
          this.$emit('show-toast', '出来高を承認しました', 'success');
          this.showProgressModal = false;
          await this.loadPayments();
        } else {
          this.$emit('show-toast', result.error || '承認に失敗しました', 'error');
        }
      } catch (e) {
        console.error('出来高査定エラー:', e);
        this.$emit('show-toast', '承認に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    getProjectName(projectId) {
      const project = this.projects.find(p => p['案件ID'] === projectId || p.projectId === projectId);
      return project ? (project['案件名'] || project.projectName) : projectId;
    },

    getStatusClass(status) {
      const classMap = {
        '未入金': 'status-badge pending', '一部入金': 'status-badge warning', '入金済': 'status-badge active',
        '未払': 'status-badge pending', '承認済': 'status-badge warning', '一部支払済': 'status-badge warning', '支払済': 'status-badge active'
      };
      return classMap[status] || 'status-badge';
    },

    getInvoiceBadgeClass(inv) {
      if (inv.paymentStatus === '入金済') return 'ip-badge paid';
      if (inv.dueDate && inv.dueDate < this.todayStr) return 'ip-badge overdue';
      if (inv.paymentStatus === '一部入金') return 'ip-badge partial';
      return 'ip-badge unpaid';
    },

    getInvoiceBadgeLabel(inv) {
      if (inv.paymentStatus !== '入金済' && inv.dueDate && inv.dueDate < this.todayStr) return '期限超過';
      return inv.paymentStatus;
    },

    getPaymentBadgeClass(pay) {
      if (pay.paymentStatus === '支払済') return 'ip-badge paid';
      if (pay.paymentStatus !== '支払済' && pay.dueDate && pay.dueDate < this.todayStr) return 'ip-badge overdue';
      if (pay.paymentStatus === '一部支払済') return 'ip-badge partial';
      if (pay.paymentStatus === '承認済') return 'ip-badge approved';
      return 'ip-badge unpaid';
    },

    getPaymentBadgeLabel(pay) {
      if (pay.paymentStatus !== '支払済' && pay.paymentStatus !== '一部支払済' && pay.dueDate && pay.dueDate < this.todayStr) return '期限超過';
      return pay.paymentStatus;
    },

    resetInvoiceFilter() {
      this.invoiceFilter = { keyword: '', projectId: '', status: '', invoiceType: '', dateFrom: '', dateTo: '', overdueOnly: false };
    },

    resetPaymentFilter() {
      this.paymentFilter = { keyword: '', projectId: '', yearMonth: '', status: '', overdueOnly: false };
    },

    daysUntilDue(dueDate) {
      if (!dueDate) return null;
      const diff = Math.ceil((new Date(dueDate) - new Date(this.todayStr)) / 86400000);
      return diff;
    },

    // === 行クリック → 残額があれば支払実行、なければ履歴 ===
    onPaymentRowClick(pay) {
      if ((pay.remainingAmount || 0) > 0) {
        this.openPaymentExec(pay);
      } else if ((pay.totalPaid || 0) > 0) {
        this.openPaymentHistory(pay);
      } else {
        this.editPayment(pay);
      }
    },

    // === 支払実行モーダル ===
    openPaymentExec(pay) {
      const remaining = pay.remainingAmount || (pay.amountIncludingTax - (pay.totalPaid || 0));
      // 計画上の現金・手形の内訳（参考表示用）
      const planCash = pay.cashPayment || 0;
      const planNote = pay.notePayment || 0;
      const planTotal = planCash + planNote;
      // 残額に対する計画上の内訳（按分）
      const remainingCash = planTotal > 0 ? Math.round(remaining * planCash / planTotal) : remaining;
      const remainingNote = planTotal > 0 ? remaining - remainingCash : 0;
      this.paymentExecData = {
        paymentId: pay.paymentId,
        vendorName: pay.vendorName,
        projectName: pay.projectName || this.getProjectName(pay.projectId),
        amountIncludingTax: pay.amountIncludingTax,
        totalPaid: pay.totalPaid || 0,
        remainingAmount: remaining,
        remainingCash: remainingCash,
        remainingNote: remainingNote,
        executionDate: new Date().toISOString().split('T')[0],
        cashAmount: 0,
        noteAmount: 0,
        noteSite: pay.noteSite || '',
        noteDueDate: '',
        notes: ''
      };
      this.showPaymentExecModal = true;
    },

    async submitPaymentExec() {
      const d = this.paymentExecData;
      const total = Number(d.cashAmount || 0) + Number(d.noteAmount || 0);
      if (total <= 0) {
        this.$emit('show-toast', '支払金額を入力してください', 'error');
        return;
      }
      if (total > d.remainingAmount + 1) {
        this.$emit('show-toast', '支払金額が残額を超えています', 'error');
        return;
      }
      this.loading = true;
      try {
        const result = await GasApi.recordPaymentExecution({
          paymentId: d.paymentId,
          executionDate: d.executionDate,
          cashAmount: Number(d.cashAmount || 0),
          noteAmount: Number(d.noteAmount || 0),
          noteSite: d.noteSite,
          noteDueDate: d.noteDueDate,
          notes: d.notes
        });
        if (result.success) {
          this.$emit('show-toast', '支払を記録しました', 'success');
          this.showPaymentExecModal = false;
          await this.loadPayments(true);
        } else {
          this.$emit('show-toast', result.error || '支払記録に失敗しました', 'error');
        }
      } catch (e) {
        console.error('支払実行エラー:', e);
        this.$emit('show-toast', '支払記録に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    // === 支払履歴モーダル ===
    async openPaymentHistory(pay) {
      this.paymentHistoryData = {
        paymentId: pay.paymentId,
        vendorName: pay.vendorName,
        amountIncludingTax: pay.amountIncludingTax,
        totalPaid: pay.totalPaid || 0,
        remainingAmount: pay.remainingAmount || 0,
        histories: []
      };
      this.showPaymentHistoryModal = true;
      try {
        const result = await GasApi.getPaymentHistory(pay.paymentId);
        this.paymentHistoryData.histories = Array.isArray(result) ? result : [];
      } catch (e) {
        console.error('支払履歴取得エラー:', e);
        this.paymentHistoryData.histories = [];
      }
    },

    async deleteHistory(historyId) {
      if (!confirm('この支払履歴を削除しますか？\n削除すると残額が増加します。')) return;
      this.loading = true;
      try {
        const result = await GasApi.deletePaymentHistory(historyId);
        if (result.success) {
          this.$emit('show-toast', '支払履歴を削除しました', 'success');
          // 履歴リストから削除
          this.paymentHistoryData.histories = this.paymentHistoryData.histories.filter(h => h.historyId !== historyId);
          // 合計を再計算
          const newTotal = this.paymentHistoryData.histories.reduce((sum, h) => sum + (h.totalAmount || 0), 0);
          this.paymentHistoryData.totalPaid = newTotal;
          this.paymentHistoryData.remainingAmount = this.paymentHistoryData.amountIncludingTax - newTotal;
          await this.loadPayments(true);
        } else {
          this.$emit('show-toast', result.error || '削除に失敗しました', 'error');
        }
      } catch (e) {
        console.error('支払履歴削除エラー:', e);
        this.$emit('show-toast', '削除に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    }
  },

                  <input type="text" :value="Formatters.forInput(paymentExecData.noteAmount)" @input="Formatters.liveFormat($event)" @blur="paymentExecData.noteAmount = Formatters.parseNumber($event.target.value)" class="text-right" inputmode="numeric" placeholder="0">
                </div>
                <div class="form-group" style="margin-bottom:8px;">
                  <label>手形サイト</label>
                  <input type="text" v-model="paymentExecData.noteSite" placeholder="例: 90日">
                </div>
                <div class="form-group" style="margin-bottom:8px;">
                  <label>手形期日</label>
                  <input type="date" v-model="paymentExecData.noteDueDate">
                </div>
                <div class="form-group full-width" style="margin-bottom:0;">
                  <label>備考</label>
                  <textarea v-model="paymentExecData.notes" rows="2" placeholder="支払メモ"></textarea>
                </div>
              </div>
            </div>

            <!-- 結果プレビュー -->
            <div style="margin-top:12px; font-size:13px;" v-if="(Number(paymentExecData.cashAmount || 0) + Number(paymentExecData.noteAmount || 0)) > paymentExecData.remainingAmount">
              <div style="background:#fff3cd; padding:10px 14px; border-radius:6px;">
                <span style="color:#856404; font-weight:600;">支払金額が残額を超えています</span>
              </div>
            </div>
            <div style="margin-top:12px; font-size:13px;" v-else-if="(Number(paymentExecData.cashAmount || 0) + Number(paymentExecData.noteAmount || 0)) > 0">
              <div style="background:#e8f5e9; padding:10px 14px; border-radius:6px; display:flex; justify-content:space-between; align-items:center;">
                <span style="color:#2e7d32;">今回合計 <b>{{ Formatters.currency(Number(paymentExecData.cashAmount || 0) + Number(paymentExecData.noteAmount || 0)) }}</b></span>
                <span style="color:#2e7d32;">→ 支払後残額 <b>{{ Formatters.currency(paymentExecData.remainingAmount - Number(paymentExecData.cashAmount || 0) - Number(paymentExecData.noteAmount || 0)) }}</b></span>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn" @click="showPaymentExecModal = false">キャンセル</button>
            <button class="btn btn-primary" @click="submitPaymentExec" :disabled="loading || (Number(paymentExecData.cashAmount || 0) + Number(paymentExecData.noteAmount || 0)) <= 0 || (Number(paymentExecData.cashAmount || 0) + Number(paymentExecData.noteAmount || 0)) > paymentExecData.remainingAmount + 1" style="background:var(--success-color);">支払実行</button>
          </div>
        </div>
      </div>

      <!-- 入金履歴モーダル -->
      <div v-if="showInvoiceHistoryModal" class="modal-overlay" @click.self="showInvoiceHistoryModal = false">
        <div class="modal-content" style="max-width:600px;">
          <div class="modal-header">
            <h3>入金履歴 - {{ invoiceHistoryData.invoiceId }}</h3>
            <button class="modal-close" @click="showInvoiceHistoryModal = false">&times;</button>
          </div>
          <div class="modal-body">
            <div style="font-size:13px; color:#666; margin-bottom:12px;">{{ invoiceHistoryData.customerName }}</div>
            <!-- 入金サマリー -->
            <div style="display:flex; gap:16px; margin-bottom:16px;">
              <div style="flex:1; background:#f8f9fa; padding:12px; border-radius:8px; text-align:center;">
                <div style="font-size:12px; color:#666;">請求金額(税込)</div>
                <div style="font-size:16px; font-weight:700; margin-top:4px;">{{ Formatters.currency(invoiceHistoryData.amountIncludingTax) }}</div>
              </div>
              <div style="flex:1; background:#e3f2fd; padding:12px; border-radius:8px; text-align:center;">
                <div style="font-size:12px; color:#666;">入金済合計</div>
                <div style="font-size:16px; font-weight:700; color:#17a2b8; margin-top:4px;">{{ Formatters.currency(invoiceHistoryData.totalPaid) }}</div>
              </div>
              <div style="flex:1; padding:12px; border-radius:8px; text-align:center;" :style="{ background: invoiceHistoryData.remainingAmount > 0 ? '#fff3cd' : '#d4edda' }">
                <div style="font-size:12px; color:#666;">残額</div>
                <div style="font-size:16px; font-weight:700; margin-top:4px;" :style="{ color: invoiceHistoryData.remainingAmount > 0 ? '#856404' : '#155724' }">{{ Formatters.currency(invoiceHistoryData.remainingAmount) }}</div>
              </div>
            </div>

            <!-- 履歴テーブル -->
            <table v-if="invoiceHistoryData.histories.length > 0" style="width:100%;">
              <thead>
                <tr>
                  <th style="width:30px;">#</th>
                  <th>入金日</th>
                  <th style="text-align:right;">入金金額</th>
                  <th>備考</th>
                  <th style="width:40px;"></th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="(h, idx) in invoiceHistoryData.histories" :key="h.historyId">
                  <td style="color:#999;">{{ idx + 1 }}</td>
                  <td>{{ h.paymentDate }}</td>
                  <td style="text-align:right; font-weight:600;">{{ Formatters.currency(h.paymentAmount) }}</td>
                  <td style="font-size:12px; color:#666; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ h.notes || '-' }}</td>
                  <td style="text-align:center;">
                    <button class="ip-btn-icon" @click="deleteInvoiceHistory(h.historyId)" title="削除" style="color:var(--danger-color); font-size:14px;">🗑</button>
                  </td>
                </tr>
              </tbody>
              <tfoot>
                <tr style="border-top:2px solid #333; font-weight:700;">
                  <td colspan="2">合計</td>
                  <td style="text-align:right;">{{ Formatters.currency(invoiceHistoryData.histories.reduce((s, h) => s + (h.paymentAmount || 0), 0)) }}</td>
                  <td colspan="2"></td>
                </tr>
              </tfoot>
            </table>
            <div v-else style="text-align:center; padding:24px; color:#999;">
              入金履歴はありません
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn" @click="showInvoiceHistoryModal = false">閉じる</button>
          </div>
        </div>
      </div>

      <!-- 支払履歴モーダル -->
      <div v-if="showPaymentHistoryModal" class="modal-overlay" @click.self="showPaymentHistoryModal = false">
        <div class="modal-content" style="max-width:700px;">
          <div class="modal-header">
            <h3>支払履歴 - {{ paymentHistoryData.paymentId }}</h3>
            <button class="modal-close" @click="showPaymentHistoryModal = false">&times;</button>
          </div>
          <div class="modal-body">
            <!-- 支払サマリー -->
            <div style="display:flex; gap:16px; margin-bottom:16px;">
              <div style="flex:1; background:#f8f9fa; padding:12px; border-radius:8px; text-align:center;">
                <div style="font-size:12px; color:#666;">請求金額(税込)</div>
                <div style="font-size:16px; font-weight:700; margin-top:4px;">{{ Formatters.currency(paymentHistoryData.amountIncludingTax) }}</div>
              </div>
              <div style="flex:1; background:#e3f2fd; padding:12px; border-radius:8px; text-align:center;">
                <div style="font-size:12px; color:#666;">支払済合計</div>
                <div style="font-size:16px; font-weight:700; color:#17a2b8; margin-top:4px;">{{ Formatters.currency(paymentHistoryData.totalPaid) }}</div>
              </div>
              <div style="flex:1; padding:12px; border-radius:8px; text-align:center;" :style="{ background: paymentHistoryData.remainingAmount > 0 ? '#fff3cd' : '#d4edda' }">
                <div style="font-size:12px; color:#666;">残額</div>
                <div style="font-size:16px; font-weight:700; margin-top:4px;" :style="{ color: paymentHistoryData.remainingAmount > 0 ? '#856404' : '#155724' }">{{ Formatters.currency(paymentHistoryData.remainingAmount) }}</div>
              </div>
            </div>

            <!-- 履歴テーブル -->
            <table v-if="paymentHistoryData.histories.length > 0" style="width:100%;">
              <thead>
                <tr>
                  <th style="width:30px;">#</th>
                  <th>支払日</th>
                  <th style="text-align:right;">現金</th>
                  <th style="text-align:right;">手形</th>
                  <th style="text-align:right;">合計</th>
                  <th>備考</th>
                  <th style="width:40px;"></th>
                </tr>
              </thead>
              <tbody>
                <tr v-for="(h, idx) in paymentHistoryData.histories" :key="h.historyId">
                  <td style="color:#999;">{{ idx + 1 }}</td>
                  <td>{{ h.executionDate }}</td>
                  <td style="text-align:right;">{{ Formatters.currency(h.cashAmount) }}</td>
                  <td style="text-align:right;">{{ Formatters.currency(h.noteAmount) }}</td>
                  <td style="text-align:right; font-weight:600;">{{ Formatters.currency(h.totalAmount) }}</td>
                  <td style="font-size:12px; color:#666; max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ h.notes || '-' }}</td>
                  <td style="text-align:center;">
                    <button class="ip-btn-icon" @click="deleteHistory(h.historyId)" title="削除" style="color:var(--danger-color); font-size:14px;">🗑</button>
                  </td>
                </tr>
              </tbody>
              <tfoot>
                <tr style="border-top:2px solid #333; font-weight:700;">
                  <td colspan="2">合計</td>
                  <td style="text-align:right;">{{ Formatters.currency(paymentHistoryData.histories.reduce((s, h) => s + (h.cashAmount || 0), 0)) }}</td>
                  <td style="text-align:right;">{{ Formatters.currency(paymentHistoryData.histories.reduce((s, h) => s + (h.noteAmount || 0), 0)) }}</td>
                  <td style="text-align:right;">{{ Formatters.currency(paymentHistoryData.histories.reduce((s, h) => s + (h.totalAmount || 0), 0)) }}</td>
                  <td colspan="2"></td>
                </tr>
              </tfoot>
            </table>
            <div v-else style="text-align:center; padding:24px; color:#999;">
              支払履歴はありません
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn" @click="showPaymentHistoryModal = false">閉じる</button>
          </div>
        </div>
      </div>

      <div v-if="loading" class="loading-overlay"><div class="spinner"></div></div>
    </div>
  `
};
</script>
<script>
/**
 * BudgetManagement - 実行予算管理画面
 *
 * 工事サマリー、工事別詳細、予算対比の3タブ構成
 */
const BudgetManagement = {
  name: 'BudgetManagement',

  props: {
    projects: {
      type: Array,
      default: () => []
    }
  },

  emits: ['save-budget', 'show-toast'],

  data() {
    return {
      activeTab: 'summary',
      tabs: [
        { id: 'summary', label: '予算サマリー' },
        { id: 'detail', label: '工事別詳細' },
        { id: 'comparison', label: '予算対比' }
      ],
      selectedProjectId: '',
      summary: {
        projectId: '', projectName: '', contractAmount: 0, totalEstimate: 0,
        totalBudget: 0, totalOrdered: 0, totalDifference: 0, averageReductionRate: '0.0', itemCount: 0
      },
      budgetItems: [],
      showBudgetModal: false,
      editingBudget: null,
      workTypes: ['電気設備工事', '空調設備工事', '衛生設備工事', '消防設備工事', '建築工事', '土木工事', '仮設工事', '解体工事', 'その他'],
      loading: false
    };
  },

  computed: {
    selectedProject() {
      return this.projects.find(p => (p['案件ID'] || p.projectId) === this.selectedProjectId);
    },
    achievementRate() {
      if (this.summary.totalBudget === 0) return '0.0';
      return ((this.summary.totalBudget - this.summary.totalOrdered) / this.summary.totalBudget * 100).toFixed(1);
    },
    consumptionRate() {
      if (this.summary.totalBudget === 0) return '0.0';
      return (this.summary.totalOrdered / this.summary.totalBudget * 100).toFixed(1);
    },
    budgetVsContract() {
      return this.summary.contractAmount - this.summary.totalBudget;
    },
    comparisonData() {
      return this.budgetItems.map(item => ({
        workType: item.workType, estimate: item.estimateAmount, budget: item.budgetAmount, ordered: item.orderedAmount,
        estimateVsBudget: item.estimateAmount - item.budgetAmount, budgetVsOrdered: item.budgetAmount - item.orderedAmount
      }));
    }
  },

  watch: {
    selectedProjectId: {
      async handler(newId) {
        if (newId) await this.loadBudgetData();
      }
    }
  },

  methods: {
    async loadBudgetData() {
      if (!this.selectedProjectId) return;
      this.loading = true;
      try {
        const [summaryResult, budgets] = await Promise.all([
          GasApi.getBudgetSummary(this.selectedProjectId),
          GasApi.getBudgets({ projectId: this.selectedProjectId })
        ]);
        if (summaryResult.success !== false) this.summary = summaryResult;
        this.budgetItems = budgets || [];
      } catch (e) {
        console.error('予算データ読み込みエラー:', e);
        this.$emit('show-toast', '予算データの読み込みに失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    async refreshActualData() {
      if (!this.selectedProjectId) return;
      this.loading = true;
      try {
        const result = await GasApi.updateBudgetActual(this.selectedProjectId);
        if (result.success) {
          this.$emit('show-toast', `${result.updatedCount}件の予算を更新しました`, 'success');
          await this.loadBudgetData();
        } else {
          this.$emit('show-toast', result.error || '更新に失敗しました', 'error');
        }
      } catch (e) {
        console.error('予算更新エラー:', e);
        this.$emit('show-toast', '更新に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    newBudget() {
      this.editingBudget = { budgetId: '', projectId: this.selectedProjectId, workId: '', workType: '', estimateAmount: 0, budgetAmount: 0, orderedAmount: 0, notes: '' };
      this.showBudgetModal = true;
    },

    editBudget(budget) {
      this.editingBudget = { ...budget };
      this.showBudgetModal = true;
    },

    async saveBudget() {
      this.loading = true;
      try {
        const result = await GasApi.saveBudget(this.editingBudget);
        if (result.success) {
          this.$emit('show-toast', '予算を保存しました', 'success');
          this.showBudgetModal = false;
          await this.loadBudgetData();
        } else {
          this.$emit('show-toast', result.error || '保存に失敗しました', 'error');
        }
      } catch (e) {
        console.error('予算保存エラー:', e);
        this.$emit('show-toast', '保存に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    getDiffClass(diff) {
      if (diff > 0) return 'text-success';
      if (diff < 0) return 'text-danger';
      return '';
    },

    getProgressWidth(value, max) {
      if (max === 0) return '0%';
      return `${Math.min((value / max) * 100, 100)}%`;
    },

    getProgressColor(ratio) {
      if (ratio <= 80) return 'bg-success';
      if (ratio <= 100) return 'bg-warning';
      return 'bg-danger';
    }
  },

  template: `
    <div class="budget-management">
      <div class="project-selector">
        <label>工事を選択</label>
        <select v-model="selectedProjectId" class="form-control"><option value="">選択してください</option><option v-for="p in projects" :key="p['案件ID'] || p.projectId" :value="p['案件ID'] || p.projectId">{{ p['案件名'] || p.projectName }}</option></select>
      </div>

      <div v-if="selectedProjectId">
        <div class="tab-header"><button v-for="tab in tabs" :key="tab.id" :class="['tab-btn', { active: activeTab === tab.id }]" @click="activeTab = tab.id">{{ tab.label }}</button></div>

        <div v-if="activeTab === 'summary'" class="tab-content">
          <div class="summary-header"><h3>{{ summary.projectName }}</h3><button class="btn btn-secondary" @click="refreshActualData" :disabled="loading">発注額を更新</button></div>
          <div class="summary-cards budget-summary">
            <div class="summary-card large"><div class="summary-label">契約金額</div><div class="summary-value">{{ Formatters.currency(summary.contractAmount) }}</div></div>
            <div class="summary-card large"><div class="summary-label">実行予算総額</div><div class="summary-value">{{ Formatters.currency(summary.totalBudget) }}</div><div class="summary-sub" :class="getDiffClass(budgetVsContract)">契約比: {{ Formatters.currency(budgetVsContract) }}</div></div>
            <div class="summary-card large"><div class="summary-label">発注済額</div><div class="summary-value">{{ Formatters.currency(summary.totalOrdered) }}</div><div class="summary-sub">消化率: {{ consumptionRate }}%</div></div>
            <div class="summary-card large" :class="summary.totalDifference >= 0 ? 'success' : 'danger'"><div class="summary-label">残額（予算-発注）</div><div class="summary-value">{{ Formatters.currency(summary.totalDifference) }}</div><div class="summary-sub">原価低減率: {{ achievementRate }}%</div></div>
          </div>
          <div class="budget-progress-section"><h4>予算消化状況</h4><div class="progress-bar-container"><div class="progress-labels"><span>発注済: {{ Formatters.currency(summary.totalOrdered) }}</span><span>予算: {{ Formatters.currency(summary.totalBudget) }}</span></div><div class="progress-bar"><div class="progress-fill" :class="getProgressColor(parseFloat(consumptionRate))" :style="{ width: getProgressWidth(summary.totalOrdered, summary.totalBudget) }"></div></div><div class="progress-percentage">{{ consumptionRate }}%</div></div></div>
          <div class="budget-items-summary"><h4>工事別予算 ({{ summary.itemCount }}件)</h4><div class="list-table"><table><thead><tr><th>工事種別</th><th class="text-right">見積金額</th><th class="text-right">実行予算</th><th class="text-right">発注済額</th><th class="text-right">差額</th><th class="text-right">低減率</th></tr></thead><tbody><tr v-for="item in budgetItems" :key="item.budgetId"><td>{{ item.workType }}</td><td class="text-right">{{ Formatters.currency(item.estimateAmount) }}</td><td class="text-right">{{ Formatters.currency(item.budgetAmount) }}</td><td class="text-right">{{ Formatters.currency(item.orderedAmount) }}</td><td class="text-right" :class="getDiffClass(item.difference)">{{ Formatters.currency(item.difference) }}</td><td class="text-right">{{ item.reductionRate }}%</td></tr></tbody><tfoot><tr class="total-row"><th>合計</th><th class="text-right">{{ Formatters.currency(summary.totalEstimate) }}</th><th class="text-right">{{ Formatters.currency(summary.totalBudget) }}</th><th class="text-right">{{ Formatters.currency(summary.totalOrdered) }}</th><th class="text-right" :class="getDiffClass(summary.totalDifference)">{{ Formatters.currency(summary.totalDifference) }}</th><th class="text-right">{{ summary.averageReductionRate }}%</th></tr></tfoot></table></div></div>
        </div>

        <div v-if="activeTab === 'detail'" class="tab-content">
          <div class="detail-header"><h3>工事別実行予算</h3><button class="btn btn-primary" @click="newBudget">新規登録</button></div>
          <div class="list-table"><table><thead><tr><th>予算ID</th><th>工事ID</th><th>工事種別</th><th class="text-right">見積金額(契約時)</th><th class="text-right">実行予算額</th><th class="text-right">発注済額</th><th class="text-right">差額</th><th>備考</th><th>操作</th></tr></thead><tbody><tr v-for="item in budgetItems" :key="item.budgetId"><td>{{ item.budgetId }}</td><td>{{ item.workId }}</td><td>{{ item.workType }}</td><td class="text-right">{{ Formatters.currency(item.estimateAmount) }}</td><td class="text-right">{{ Formatters.currency(item.budgetAmount) }}</td><td class="text-right">{{ Formatters.currency(item.orderedAmount) }}</td><td class="text-right" :class="getDiffClass(item.difference)">{{ Formatters.currency(item.difference) }}</td><td>{{ item.notes }}</td><td><button class="btn btn-sm" @click="editBudget(item)">編集</button></td></tr><tr v-if="budgetItems.length === 0"><td colspan="9" class="text-center">データがありません</td></tr></tbody></table></div>
        </div>

        <div v-if="activeTab === 'comparison'" class="tab-content">
          <h3>予算対比</h3>
          <div class="comparison-section"><h4>見積金額 vs 実行予算</h4><p class="comparison-desc">契約時の見積金額と実行予算の比較。実行予算が見積を下回れば原価低減に成功。</p><div class="comparison-bars"><div v-for="item in comparisonData" :key="item.workType" class="comparison-row"><div class="comparison-label">{{ item.workType }}</div><div class="comparison-bar-group"><div class="comparison-bar estimate"><div class="bar-fill" :style="{ width: getProgressWidth(item.estimate, summary.totalEstimate) }"></div><span class="bar-value">{{ Formatters.currency(item.estimate) }}</span></div><div class="comparison-bar budget"><div class="bar-fill" :style="{ width: getProgressWidth(item.budget, summary.totalEstimate) }"></div><span class="bar-value">{{ Formatters.currency(item.budget) }}</span></div></div><div class="comparison-diff" :class="getDiffClass(item.estimateVsBudget)">{{ Formatters.currency(item.estimateVsBudget) }}</div></div></div></div>
          <div class="comparison-section"><h4>実行予算 vs 発注済額</h4><p class="comparison-desc">実行予算と発注済額の比較。発注済額が予算を下回れば予算内で収まっている。</p><div class="comparison-bars"><div v-for="item in comparisonData" :key="item.workType + '-ordered'" class="comparison-row"><div class="comparison-label">{{ item.workType }}</div><div class="comparison-bar-group"><div class="comparison-bar budget"><div class="bar-fill" :style="{ width: getProgressWidth(item.budget, summary.totalBudget) }"></div><span class="bar-value">{{ Formatters.currency(item.budget) }}</span></div><div class="comparison-bar ordered"><div class="bar-fill" :style="{ width: getProgressWidth(item.ordered, summary.totalBudget) }"></div><span class="bar-value">{{ Formatters.currency(item.ordered) }}</span></div></div><div class="comparison-diff" :class="getDiffClass(item.budgetVsOrdered)">{{ Formatters.currency(item.budgetVsOrdered) }}</div></div></div></div>
          <div class="comparison-legend"><div class="legend-item"><span class="legend-color estimate"></span> 見積金額</div><div class="legend-item"><span class="legend-color budget"></span> 実行予算</div><div class="legend-item"><span class="legend-color ordered"></span> 発注済額</div></div>
        </div>
      </div>

      <div v-else class="empty-state"><p>工事を選択してください</p></div>

      <div v-if="showBudgetModal" class="modal-overlay" @click.self="showBudgetModal = false"><div class="modal-content"><div class="modal-header"><h3>{{ editingBudget.budgetId ? '予算編集' : '新規予算登録' }}</h3><button class="modal-close" @click="showBudgetModal = false">&times;</button></div><div class="modal-body"><div class="form-grid"><div class="form-group"><label>工事ID</label><input type="text" v-model="editingBudget.workId" placeholder="例: C-00001"></div><div class="form-group"><label>工事種別</label><select v-model="editingBudget.workType"><option value="">選択してください</option><option v-for="t in workTypes" :key="t" :value="t">{{ t }}</option></select></div><div class="form-group"><label>見積金額（契約時）</label><input type="text" :value="Formatters.forInput(editingBudget.estimateAmount)" @input="Formatters.liveFormat($event)" @blur="editingBudget.estimateAmount = Formatters.parseNumber($event.target.value)" class="text-right" inputmode="numeric"></div><div class="form-group"><label>実行予算額</label><input type="text" :value="Formatters.forInput(editingBudget.budgetAmount)" @input="Formatters.liveFormat($event)" @blur="editingBudget.budgetAmount = Formatters.parseNumber($event.target.value)" class="text-right" inputmode="numeric"></div><div class="form-group"><label>発注済額</label><input type="text" :value="Formatters.forInput(editingBudget.orderedAmount)" class="text-right" readonly><small>※発注データから自動計算されます</small></div><div class="form-group full-width"><label>備考</label><textarea v-model="editingBudget.notes" rows="3"></textarea></div></div></div><div class="modal-footer"><button class="btn" @click="showBudgetModal = false">キャンセル</button><button class="btn btn-primary" @click="saveBudget" :disabled="loading">保存</button></div></div></div>

      <div v-if="loading" class="loading-overlay"><div class="spinner"></div></div>
    </div>
  `
};
</script>
<script>
/**
 * MasterManagement - マスタ管理画面
 *
 * 顧客マスタ、協力会社マスタ、社員マスタの管理
 */
const MasterManagement = {
  name: 'MasterManagement',

  props: {
    customers: {
      type: Array,
      default: () => []
    },
    vendors: {
      type: Array,
      default: () => []
    },
    employees: {
      type: Array,
      default: () => []
    }
  },

  emits: ['save-customer', 'save-vendor', 'save-employee'],

  data() {
    return {
      activeTab: 'customers',
      tabs: [
        { id: 'customers', label: '顧客マスタ' },
        { id: 'vendors', label: '協力会社マスタ' },
        { id: 'employees', label: '社員マスタ' }
      ],

      // 検索
      searchKeyword: '',

      // 選択中のアイテム
      selectedCustomer: null,
      selectedVendor: null,
      selectedEmployee: null,

      // 編集フォーム
      customerForm: this.getEmptyCustomer(),
      vendorForm: this.getEmptyVendor(),
      employeeForm: this.getEmptyEmployee(),

      // 編集モード
      isEditing: false,

      // 協力会社カテゴリ
      vendorCategories: ['電気', '空調', '衛生', '消防', '建築', '土木', 'その他'],

      // 支払条件
      paymentTermsOptions: [
        { value: 'immediate', label: '即日' },
        { value: 'end_of_month', label: '当月末' },
        { value: 'next_month_end', label: '翌月末' },
        { value: 'next_next_month_end', label: '翌々月末' },
        { value: 'note_60', label: '手形60日' },
        { value: 'note_90', label: '手形90日' },
        { value: 'note_120', label: '手形120日' }
      ],

      // 役割
      roles: [
        { value: 'manager', label: '管理者' },
        { value: 'staff', label: '一般' }
      ]
    };
  },

  computed: {
    /**
     * 社員データから部門の選択肢を動的生成
     */
    departments() {
      const deptSet = new Set();
      this.employees.forEach(emp => {
        if (emp.department) deptSet.add(emp.department);
      });
      return Array.from(deptSet).sort().map(d => ({ value: d, label: d }));
    },

    /**
     * フィルタリング済み顧客一覧
     */
    filteredCustomers() {
      if (!this.searchKeyword) return this.customers;
      const kw = this.searchKeyword;
      return this.customers.filter(c =>
        prefixMatch(c.customerName, kw) ||
        prefixMatch(c.customerId, kw) ||
        prefixMatch(c.furigana, kw)
      );
    },

    /**
     * フィルタリング済み協力会社一覧
     */
    filteredVendors() {
      if (!this.searchKeyword) return this.vendors;
      const kw = this.searchKeyword;
      return this.vendors.filter(v =>
        prefixMatch(v.vendorName, kw) ||
        prefixMatch(v.vendorId, kw) ||
        prefixMatch(v.shortName, kw) ||
        prefixMatch(v.kana, kw)
      );
    },

    /**
     * フィルタリング済み社員一覧
     */
    filteredEmployees() {
      if (!this.searchKeyword) return this.employees;
      const keyword = this.searchKeyword.toLowerCase();
      return this.employees.filter(e =>
        String(e.employeeName || '').toLowerCase().includes(keyword) ||
        String(e.employeeId || '').toLowerCase().includes(keyword)
      );
    }
  },

  methods: {
    // ========================================
    // 空フォームの生成
    // ========================================
    getEmptyCustomer() {
      return {
        customerId: '',
        customerName: '',
        furigana: '',
        address: '',
        category: '',
        phone: ''
      };
    },

    getEmptyVendor() {
      return {
        vendorId: '',
        vendorName: '',
        shortName: '',
        kana: '',
        address: '',
        phone: '',
        fax: '',
        representativeName: '',
        contactName: '',
        closingDay: '',
        paymentMonth: '',
        paymentDay: '',
        cashRatio: '',
        noteRatio: '',
        noteSite: '',
        invoiceNumber: '',
        permitType: '',
        permitExpiry: '',
        vendorRank: '',
        safetyFeeRate: ''
      };
    },

    getEmptyEmployee() {
      return {
        employeeId: '',
        employeeName: '',
        email: '',
        department: '',
        role: ''
      };
    },

    // ========================================
    // 顧客マスタ
    // ========================================
    selectCustomer(customer) {
      this.selectedCustomer = customer;
      this.customerForm = { ...customer };
      this.isEditing = true;
    },

    newCustomer() {
      this.selectedCustomer = null;
      this.customerForm = this.getEmptyCustomer();
      this.isEditing = true;
    },

    saveCustomer() {
      this.$emit('save-customer', { ...this.customerForm });
      this.cancelEdit();
    },

    // ========================================
    // 協力会社マスタ
    // ========================================
    selectVendor(vendor) {
      this.selectedVendor = vendor;
      this.vendorForm = { ...vendor };
      this.isEditing = true;
    },

    newVendor() {
      this.selectedVendor = null;
      this.vendorForm = this.getEmptyVendor();
      this.isEditing = true;
    },

    saveVendor() {
      this.$emit('save-vendor', { ...this.vendorForm });
      this.cancelEdit();
    },

    // ========================================
    // 社員マスタ
    // ========================================
    selectEmployee(employee) {
      this.selectedEmployee = employee;
      this.employeeForm = { ...employee };
      this.isEditing = true;
    },

    newEmployee() {
      this.selectedEmployee = null;
      this.employeeForm = this.getEmptyEmployee();
      this.isEditing = true;
    },

    saveEmployee() {
      this.$emit('save-employee', { ...this.employeeForm });
      this.cancelEdit();
    },

    // ========================================
    // 共通
    // ========================================
    cancelEdit() {
      this.isEditing = false;
      this.selectedCustomer = null;
      this.selectedVendor = null;
      this.selectedEmployee = null;
      this.customerForm = this.getEmptyCustomer();
      this.vendorForm = this.getEmptyVendor();
      this.employeeForm = this.getEmptyEmployee();
    },

    /**
     * 支払条件のラベル取得
     */
    getPaymentTermsLabel(value) {
      const option = this.paymentTermsOptions.find(o => o.value === value);
      return option ? option.label : value;
    },

    /**
     * 部門のラベル取得
     */
    getDepartmentLabel(value) {
      const dept = this.departments.find(d => d.value === value);
      return dept ? dept.label : value;
    },

    /**
     * タブ変更時
     */
    onTabChange() {
      this.cancelEdit();
      this.searchKeyword = '';
    }
  },

  watch: {
    activeTab() {
      this.onTabChange();
    }
  },

  template: `
    <div class="master-management">

                </div>
