<script>
/**
 * ConstructionLedger - 工事台帳コンポーネント
 * 5タブ構成で工事の詳細情報を集約表示
 */
const ConstructionLedger = {
  name: 'ConstructionLedger',

  props: {
    currentUser: {
      type: Object,
      default: () => ({})
    }
  },

  emits: ['show-toast'],

  data() {
    return {
      constructions: [],
      selectedConstructionId: '',
      ledgerData: null,
      isLoading: false,
      constructionsLoading: false,
      activeTab: 'overview',
      tabs: [
        { id: 'overview', label: '工事概要', icon: '📋' },
        { id: 'staff', label: '元請体制', icon: '👥' },
        { id: 'subcontractors', label: '下請一覧', icon: '🏗️' },
        { id: 'payments', label: '支払記録', icon: '💰' },
        { id: 'completion', label: '完成記録', icon: '✅' }
      ],
      isSaving: false
    };
  },

  computed: {
    selectedConstruction() {
      if (!this.ledgerData) return null;
      return this.ledgerData.overview?.construction || null;
    },
    statusBadgeClass() {
      if (!this.ledgerData?.ledger) return '';
      const status = this.ledgerData.ledger['ステータス'];
      switch (status) {
        case '確定': return 'status-completed';
        case '確認中': return 'status-review';
        default: return 'status-draft';
      }
    }
  },

  async created() {
    await this.loadConstructions();
  },

  methods: {
    async loadConstructions() {
      this.constructionsLoading = true;
      try {
        this.constructions = await GasApi.getConstructions();
      } catch (e) {
        console.error('工事一覧取得エラー:', e);
        this.constructions = [];
      } finally {
        this.constructionsLoading = false;
      }
    },

    async onSelectConstruction() {
      if (!this.selectedConstructionId) {
        this.ledgerData = null;
        return;
      }

      this.isLoading = true;
      try {
        const result = await GasApi.getLedgerByConstructionId(this.selectedConstructionId);
        if (result.success) {
          this.ledgerData = result;
          this.activeTab = 'overview';
        } else {
          this.$emit('show-toast', result.error || '工事台帳の取得に失敗しました', 'error');
        }
      } catch (e) {
        console.error('工事台帳取得エラー:', e);
        this.$emit('show-toast', '工事台帳の取得に失敗しました', 'error');
      } finally {
        this.isLoading = false;
      }
    },

    async saveLedger() {
      if (!this.ledgerData) return;

      this.isSaving = true;
      try {
        const result = await GasApi.saveLedger(this.ledgerData.ledger);
        if (result.success) {
          this.ledgerData.ledger = result.ledger;
          this.ledgerData.isNew = false;
          this.$emit('show-toast', '工事台帳を保存しました', 'success');
        } else {
          this.$emit('show-toast', result.error || '保存に失敗しました', 'error');
        }
      } catch (e) {
        console.error('工事台帳保存エラー:', e);
        this.$emit('show-toast', '保存に失敗しました', 'error');
      } finally {
        this.isSaving = false;
      }
    },

    async changeStatus(newStatus) {
      if (!this.ledgerData?.ledger?.['台帳ID']) {
        this.ledgerData.ledger['ステータス'] = newStatus;
        await this.saveLedger();
        return;
      }

      this.isSaving = true;
      try {
        const result = await GasApi.updateLedgerStatus(this.ledgerData.ledger['台帳ID'], newStatus);
        if (result.success) {
          this.ledgerData.ledger = result.ledger;
          this.$emit('show-toast', 'ステータスを更新しました', 'success');
        } else {
          this.$emit('show-toast', result.error || 'ステータス更新に失敗しました', 'error');
        }
      } catch (e) {
        this.$emit('show-toast', 'ステータス更新に失敗しました', 'error');
      } finally {
        this.isSaving = false;
      }
    },

    formatCurrency(value) {
      if (typeof Formatters !== 'undefined') return Formatters.currency(value);
      if (!value && value !== 0) return '-';
      return '¥' + Number(value).toLocaleString('ja-JP');
    },

    formatDate(value) {
      if (!value) return '-';
      return String(value).substring(0, 10);
    }
  },

  template: `
    <div class="construction-ledger">
      <div class="page-header">
        <h2>工事台帳</h2>
        <p style="color: var(--text-secondary); font-size: 14px;">工事の詳細情報を集約して管理します</p>
      </div>

      <div class="card" style="margin-bottom: 16px;">
        <div class="card-body">
          <div style="display: flex; align-items: center; gap: 16px;">
            <div style="flex: 1;">
              <label class="form-label">工事を選択</label>
              <select v-model="selectedConstructionId" @change="onSelectConstruction" class="form-control" :disabled="constructionsLoading">
                <option value="">{{ constructionsLoading ? '工事一覧を読み込み中...' : '選択してください' }}</option>
                <option v-for="c in constructions" :key="c['工事番号']" :value="c['工事番号']">
                  {{ c['工事番号'] }} - {{ c['工事名称'] || '（名称未設定）' }}
                </option>
              </select>
            </div>
            <div v-if="ledgerData">
              <span :class="['status-badge', statusBadgeClass]">{{ ledgerData.ledger['ステータス'] || '作成中' }}</span>
              <span v-if="ledgerData.isNew" class="status-badge" style="background: #cce5ff; color: #004085; margin-left: 8px;">新規</span>
            </div>
          </div>
        </div>
      </div>

      <div v-if="isLoading" style="text-align: center; padding: 60px;">読み込み中...</div>

      <div v-else-if="ledgerData" class="ledger-content">
        <div class="ledger-tabs" style="display: flex; gap: 4px; border-bottom: 1px solid var(--border-color); margin-bottom: 16px;">
          <button v-for="tab in tabs" :key="tab.id" @click="activeTab = tab.id"
            :style="{ padding: '12px 16px', border: 'none', background: 'none', cursor: 'pointer', color: activeTab === tab.id ? 'var(--primary-color)' : 'var(--text-secondary)', borderBottom: activeTab === tab.id ? '2px solid var(--primary-color)' : '2px solid transparent' }">
            {{ tab.icon }} {{ tab.label }}
          </button>
        </div>

        <div v-if="activeTab === 'overview'" class="card">
          <div class="card-header"><span class="card-title">工事概要</span></div>
          <div class="card-body">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px;">
              <div>
                <h4 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;">基本情報</h4>
                <table style="width: 100%;">
                  <tr><td style="color: var(--text-muted); padding: 6px 0;">工事番号</td><td>{{ ledgerData.overview.construction?.['工事番号'] || '-' }}</td></tr>
                  <tr><td style="color: var(--text-muted); padding: 6px 0;">工事名称</td><td>{{ ledgerData.overview.construction?.['工事名称'] || '-' }}</td></tr>
                  <tr><td style="color: var(--text-muted); padding: 6px 0;">関連工事</td><td>{{ ledgerData.overview.project?.['案件名'] || '-' }}</td></tr>
                  <tr><td style="color: var(--text-muted); padding: 6px 0;">顧客名</td><td>{{ ledgerData.overview.customer?.['顧客名'] || '-' }}</td></tr>
                </table>
              </div>
              <div>
                <h4 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;">工期</h4>
                <table style="width: 100%;">
                  <tr><td style="color: var(--text-muted); padding: 6px 0;">着工日</td><td>{{ formatDate(ledgerData.overview.construction?.['着工日']) }}</td></tr>
                  <tr><td style="color: var(--text-muted); padding: 6px 0;">完工日</td><td>{{ formatDate(ledgerData.overview.construction?.['完工日']) }}</td></tr>
                  <tr><td style="color: var(--text-muted); padding: 6px 0;">進捗率</td><td>{{ ledgerData.overview.construction?.['進捗率'] || 0 }}%</td></tr>
                </table>
              </div>
              <div>
                <h4 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;">金額情報</h4>
                <table style="width: 100%;">
                  <tr><td style="color: var(--text-muted); padding: 6px 0;">契約金額</td><td>{{ formatCurrency(ledgerData.overview.contract?.['請負金額']) }}</td></tr>
                  <tr><td style="color: var(--text-muted); padding: 6px 0;">受注金額</td><td>{{ formatCurrency(ledgerData.overview.project?.['受注金額']) }}</td></tr>
                </table>
              </div>
            </div>
          </div>
        </div>

        <div v-if="activeTab === 'staff'" class="card">
          <div class="card-header"><span class="card-title">元請体制</span></div>
          <div class="card-body">
            <div v-if="!ledgerData.staff.employees.length" style="text-align: center; padding: 40px; color: var(--text-muted);">担当社員が登録されていません</div>
            <table v-else class="list-table">
              <thead><tr><th>社員ID</th><th>氏名</th><th>部門</th><th>役職</th><th>連絡先</th></tr></thead>
              <tbody>
                <tr v-for="emp in ledgerData.staff.employees" :key="emp['社員ID']">
                  <td>{{ emp['社員ID'] }}</td><td>{{ emp['氏名'] }}</td><td>{{ emp['部門'] || '-' }}</td><td>{{ emp['役職'] || '-' }}</td><td>{{ emp['メールアドレス'] || '-' }}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div v-if="activeTab === 'subcontractors'" class="card">
          <div class="card-header"><span class="card-title">下請一覧</span></div>
          <div class="card-body">
            <div v-if="!ledgerData.subcontractors.orders.length" style="text-align: center; padding: 40px; color: var(--text-muted);">発注業者が登録されていません</div>
            <table v-else class="list-table">
              <thead><tr><th>発注ID</th><th>協力会社名</th><th>工事内容</th><th>発注金額</th><th>ステータス</th></tr></thead>
              <tbody>
                <tr v-for="order in ledgerData.subcontractors.orders" :key="order['発注ID']">
                  <td>{{ order['発注ID'] }}</td><td>{{ order['協力会社名'] || order['仕入先名称'] || '-' }}</td><td>{{ order['工事内容'] || '-' }}</td><td>{{ formatCurrency(order['発注金額']) }}</td>
                  <td><span class="status-badge" :style="{ background: order['ステータス'] === '完了' ? '#d4edda' : '#cce5ff', color: order['ステータス'] === '完了' ? '#155724' : '#004085' }">{{ order['ステータス'] || '進行中' }}</span></td>
                </tr>
              </tbody>
            </table>
            <div style="margin-top: 16px; padding: 12px; background: var(--bg-secondary); border-radius: 4px;">
              <strong>発注合計:</strong> {{ formatCurrency(ledgerData.subcontractors.orders.reduce((sum, o) => sum + (Number(o['発注金額']) || 0), 0)) }} （{{ ledgerData.subcontractors.orders.length }}件）
            </div>
          </div>
        </div>

        <div v-if="activeTab === 'payments'" class="card">
          <div class="card-header"><span class="card-title">支払記録</span></div>
          <div class="card-body">
            <div style="display: flex; gap: 24px; margin-bottom: 16px;">
              <div style="text-align: center;"><div style="font-size: 12px; color: var(--text-muted);">支払総額</div><div style="font-size: 20px; font-weight: 700;">{{ formatCurrency(ledgerData.payments.summary.totalAmount) }}</div></div>
              <div style="text-align: center;"><div style="font-size: 12px; color: var(--text-muted);">支払済</div><div style="font-size: 20px; font-weight: 700; color: var(--success-color);">{{ ledgerData.payments.summary.paidCount }}件</div></div>
              <div style="text-align: center;"><div style="font-size: 12px; color: var(--text-muted);">未払い</div><div style="font-size: 20px; font-weight: 700; color: var(--warning-color);">{{ ledgerData.payments.summary.pendingCount }}件</div></div>
            </div>
            <div v-if="!ledgerData.payments.payments.length" style="text-align: center; padding: 40px; color: var(--text-muted);">支払記録がありません</div>
            <table v-else class="list-table">
              <thead><tr><th>支払ID</th><th>協力会社</th><th>支払金額</th><th>請求月</th><th>支払予定日</th><th>ステータス</th></tr></thead>
              <tbody>
                <tr v-for="p in ledgerData.payments.payments" :key="p['支払ID']">
                  <td>{{ p['支払ID'] }}</td><td>{{ p['協力会社名'] || '-' }}</td><td>{{ formatCurrency(p['支払金額']) }}</td><td>{{ p['請求月'] || '-' }}</td><td>{{ formatDate(p['支払予定日']) }}</td>
                  <td><span class="status-badge" :style="{ background: p['支払ステータス'] === '支払済' ? '#d4edda' : '#fff3cd', color: p['支払ステータス'] === '支払済' ? '#155724' : '#856404' }">{{ p['支払ステータス'] || '未払い' }}</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div v-if="activeTab === 'completion'" class="card">
          <div class="card-header"><span class="card-title">完成記録</span></div>
          <div class="card-body">
            <div style="margin-bottom: 24px;">
              <h4 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;">進捗状況</h4>
              <div style="display: flex; align-items: center; gap: 16px;">
                <div style="flex: 1; height: 24px; background: var(--bg-tertiary); border-radius: 12px; overflow: hidden;">
                  <div :style="{ width: ledgerData.completion.progress + '%', height: '100%', background: 'var(--success-color)' }"></div>
                </div>
                <div style="font-size: 24px; font-weight: 700;">{{ ledgerData.completion.progress }}%</div>
              </div>
              <div v-if="ledgerData.completion.progressMemo" style="margin-top: 8px; color: var(--text-secondary);">{{ ledgerData.completion.progressMemo }}</div>
            </div>
            <div>
              <h4 style="font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;">添付ファイル</h4>
              <div v-if="!ledgerData.completion.attachments.length" style="text-align: center; padding: 20px; color: var(--text-muted);">添付ファイルはありません</div>
              <div v-else>
                <div v-for="att in ledgerData.completion.attachments" :key="att['ファイルID']" style="display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg-secondary); border-radius: 4px; margin-bottom: 4px;">
                  <span>📎</span><span style="flex: 1;">{{ att['ファイル名'] }}</span><span style="font-size: 12px; color: var(--text-muted);">{{ att['カテゴリ'] }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 16px;">
          <button @click="saveLedger" :disabled="isSaving" class="btn btn-primary">{{ isSaving ? '保存中...' : '台帳を保存' }}</button>
          <div style="flex: 1;"></div>
          <select v-model="ledgerData.ledger['ステータス']" @change="changeStatus(ledgerData.ledger['ステータス'])" class="form-control" style="width: 150px;">
            <option value="作成中">作成中</option>
            <option value="確認中">確認中</option>
            <option value="確定">確定</option>
          </select>
        </div>
      </div>

      <div v-else style="text-align: center; padding: 60px; color: var(--text-muted);">
        <div style="font-size: 48px; margin-bottom: 16px;">📋</div>
        <p>工事を選択して台帳を表示してください</p>
      </div>
    </div>
  `
};
</script>
<script>
/**
 * ScheduleManagement - スケジュール・進捗管理コンポーネント
 * ガントチャート、カレンダー、マイルストーン管理を統合
 */
const ScheduleManagement = {
  name: 'ScheduleManagement',

  props: {
    currentUser: {
      type: Object,
      default: () => ({})
    }
  },

  emits: ['show-toast'],

  data() {
    return {
      activeView: 'gantt',
      views: [
        { id: 'gantt', label: 'ガントチャート', icon: '📊' },
        { id: 'calendar', label: 'カレンダー', icon: '📅' },
        { id: 'milestones', label: 'マイルストーン', icon: '🎯' }
      ],

      // ガントチャート
      ganttData: [],
      ganttFilter: { projectId: '', status: '' },
      ganttStatusFilter: '',

      // カレンダー
      currentYearMonth: '',
      calendarEvents: [],

      // マイルストーン
      milestones: [],
      delayedMilestones: [],
      selectedConstructionId: '',
      constructions: [],
      constructionsLoading: false,
      milestonesLoading: false,

      // マイルストーン編集モーダル
      milestoneModal: {
        show: false,
        isNew: true,
        data: {}
      },

      isLoading: false
    };
  },

  computed: {
    calendarDays() {
      if (!this.currentYearMonth) return [];
      const [year, month] = this.currentYearMonth.split('-').map(Number);
      const firstDay = new Date(year, month - 1, 1);
      const lastDay = new Date(year, month, 0);
      const daysInMonth = lastDay.getDate();
      const startWeekday = firstDay.getDay();

      const days = [];
      // 前月の日
      for (let i = 0; i < startWeekday; i++) {
        days.push({ date: '', isCurrentMonth: false });
      }
      // 当月の日
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = this.currentYearMonth + '-' + String(d).padStart(2, '0');
        const dayEvents = this.calendarEvents.filter(e => e.date === dateStr);
        days.push({
          date: d,
          dateStr: dateStr,
          isCurrentMonth: true,
          events: dayEvents,
          isToday: dateStr === new Date().toISOString().slice(0, 10)
        });
      }
      return days;
    },

    formattedYearMonth() {
      if (!this.currentYearMonth) return '';
      const [year, month] = this.currentYearMonth.split('-');
      return year + '年' + month + '月';
    },

    ganttYear() {
      return new Date().getFullYear();
    },

    ganttMonths() {
      return Array.from({ length: 12 }, (_, i) => (i + 1) + '月');
    },

    todayPercent() {
      const now = new Date();
      const base = new Date(now.getFullYear(), 0, 1);
      const end = new Date(now.getFullYear(), 11, 31);
      return ((now - base) / (end - base)) * 100;
    },

    filteredGanttData() {
      if (!this.ganttStatusFilter) return this.ganttData;
      return this.ganttData.filter(item => item.status === this.ganttStatusFilter);
    },

    ganttStatusOptions() {
      const statuses = [...new Set(this.ganttData.map(d => d.status).filter(Boolean))];
      return statuses.sort();
    }
  },

  async created() {
    const now = new Date();
    this.currentYearMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    await this.loadConstructions();
    await this.loadGanttData();
    await this.loadCalendarEvents();
    await this.loadDelayedMilestones();
  },

  methods: {
    async loadConstructions() {
      this.constructionsLoading = true;
      try {
        this.constructions = await GasApi.getConstructions();
      } catch (e) {
        console.error('工事一覧取得エラー:', e);
      } finally {
        this.constructionsLoading = false;
      }
    },

    async loadGanttData() {
      this.isLoading = true;
      try {
        const result = await GasApi.getGanttChartData(this.ganttFilter);
        if (result.success) {
          this.ganttData = result.items;
        }
      } catch (e) {
        console.error('ガントチャートデータ取得エラー:', e);
      } finally {
        this.isLoading = false;
      }
    },

    async loadCalendarEvents() {
      try {
        const result = await GasApi.getCalendarEvents(this.currentYearMonth);
        if (result.success) {
          this.calendarEvents = result.events;
        }
      } catch (e) {
        console.error('カレンダーイベント取得エラー:', e);
      }
    },

    async loadMilestones() {
      if (!this.selectedConstructionId) {
        this.milestones = [];
        return;
      }
      this.milestonesLoading = true;
      try {
        this.milestones = await GasApi.getMilestones(this.selectedConstructionId);
      } catch (e) {
        console.error('マイルストーン取得エラー:', e);
      } finally {
        this.milestonesLoading = false;
      }
    },

    async loadDelayedMilestones() {
      try {
        this.delayedMilestones = await GasApi.getDelayedMilestones();
      } catch (e) {
        console.error('遅延マイルストーン取得エラー:', e);
      }
    },

    prevMonth() {
      const [year, month] = this.currentYearMonth.split('-').map(Number);
      const newDate = new Date(year, month - 2, 1);
      this.currentYearMonth = newDate.getFullYear() + '-' + String(newDate.getMonth() + 1).padStart(2, '0');
      this.loadCalendarEvents();
    },

    nextMonth() {
      const [year, month] = this.currentYearMonth.split('-').map(Number);
      const newDate = new Date(year, month, 1);
      this.currentYearMonth = newDate.getFullYear() + '-' + String(newDate.getMonth() + 1).padStart(2, '0');
      this.loadCalendarEvents();
    },

    openMilestoneModal(milestone = null) {
      if (milestone) {
        this.milestoneModal = {
          show: true,
          isNew: false,
          data: { ...milestone }
        };
      } else {
        this.milestoneModal = {
          show: true,
          isNew: true,
          data: {
            '工事番号': this.selectedConstructionId,
            '名称': '',
            '予定日': '',
            '実績日': '',
            'ステータス': '予定'
          }
        };
      }
    },

    async saveMilestone() {
      try {
        const result = await GasApi.saveMilestone(this.milestoneModal.data);
        if (result.success) {
          this.$emit('show-toast', 'マイルストーンを保存しました', 'success');
          this.milestoneModal.show = false;
          await this.loadMilestones();
          await this.loadDelayedMilestones();
        } else {
          this.$emit('show-toast', result.error || '保存に失敗しました', 'error');
        }
      } catch (e) {
        this.$emit('show-toast', '保存に失敗しました', 'error');
      }
    },

    async deleteMilestone(milestoneId) {
      if (!confirm('このマイルストーンを削除しますか？')) return;
      try {
        const result = await GasApi.deleteMilestone(milestoneId);
        if (result.success) {
          this.$emit('show-toast', 'マイルストーンを削除しました', 'success');
          await this.loadMilestones();
          await this.loadDelayedMilestones();
        } else {
          this.$emit('show-toast', result.error || '削除に失敗しました', 'error');
        }
      } catch (e) {
        this.$emit('show-toast', '削除に失敗しました', 'error');
      }
    },

    getGanttBarStyle(item) {
      if (!item.startDate || !item.endDate) return { display: 'none' };
      const start = new Date(item.startDate);
      const end = new Date(item.endDate);
      const today = new Date();
      const baseDate = new Date(today.getFullYear(), 0, 1);
      const yearEnd = new Date(today.getFullYear(), 11, 31);
      const totalDays = (yearEnd - baseDate) / (1000 * 60 * 60 * 24);

      // 年の範囲内にクリップ
      const clippedStart = start < baseDate ? baseDate : (start > yearEnd ? yearEnd : start);
      const clippedEnd = end > yearEnd ? yearEnd : (end < baseDate ? baseDate : end);

      // クリップ後の範囲が無効（年外の工期）の場合は非表示
      if (clippedStart >= clippedEnd) return { display: 'none' };

      const startOffset = (clippedStart - baseDate) / (1000 * 60 * 60 * 24);
      const duration = (clippedEnd - clippedStart) / (1000 * 60 * 60 * 24);

      return {
        left: (startOffset / totalDays * 100) + '%',
        width: Math.max(1, (duration / totalDays * 100)) + '%',
        background: item.progress >= 100 ? 'var(--success-color)' : 'var(--primary-color)'
      };
    },

    formatDate(value) {
      if (!value) return '-';
      return String(value).substring(0, 10);
    }
  },

  template: `
    <div class="schedule-management">
      <div class="page-header">
        <h2>スケジュール管理</h2>
        <p style="color: var(--text-secondary); font-size: 14px;">工事のスケジュールと進捗を管理します</p>
      </div>

      <!-- ビュー切り替え -->
      <div style="display: flex; gap: 8px; margin-bottom: 16px;">
        <button v-for="view in views" :key="view.id" @click="activeView = view.id"
          :class="['btn', activeView === view.id ? 'btn-primary' : 'btn-secondary']">
          {{ view.icon }} {{ view.label }}
        </button>
      </div>

      <!-- 遅延アラート -->
      <div v-if="delayedMilestones.length > 0" class="card" style="margin-bottom: 16px; border-left: 4px solid var(--danger-color);">
        <div class="card-body" style="padding: 12px 16px;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
            <span style="font-size: 20px;">⚠️</span>
            <strong style="color: var(--danger-color);">{{ delayedMilestones.length }}件の遅延マイルストーンがあります</strong>
          </div>
          <div style="margin-left: 28px;">
            <div v-for="(dm, idx) in delayedMilestones" :key="idx" style="padding: 6px 0; border-top: 1px solid var(--border-color); font-size: 13px;">
              <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                <span style="font-weight: 600; color: var(--danger-color);">{{ dm.milestone ? (dm.milestone['名称'] || dm.milestone['マイルストーン名'] || '-') : '-' }}</span>
                <span style="color: var(--text-secondary);">工事: {{ dm.construction ? (dm.construction['工事名'] || dm.construction['工事名称'] || '-') : '-' }}</span>
                <span style="color: var(--text-secondary);">工事: {{ dm.project ? (dm.project['案件名'] || '-') : '-' }}</span>
                <span style="color: var(--text-muted);">予定日: {{ dm.milestone ? formatDate(dm.milestone['予定日']) : '-' }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ガントチャート -->
      <div v-if="activeView === 'gantt'" class="gantt-view card">
        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
          <div style="display: flex; align-items: center; gap: 12px;">
            <span class="card-title">ガントチャート</span>
            <span style="font-size: 12px; color: var(--text-muted);">{{ ganttYear }}年</span>
          </div>
          <div style="display: flex; align-items: center; gap: 12px;">
            <select v-model="ganttStatusFilter" style="font-size: 12px; padding: 4px 8px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-primary);">
              <option value="">全ステータス ({{ ganttData.length }}件)</option>
              <option v-for="s in ganttStatusOptions" :key="s" :value="s">{{ s }}</option>
            </select>
            <div style="display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-secondary);">
              <span style="display: flex; align-items: center; gap: 3px;"><span style="display: inline-block; width: 12px; height: 8px; background: var(--primary-color); border-radius: 2px;"></span>進行中</span>
              <span style="display: flex; align-items: center; gap: 3px;"><span style="display: inline-block; width: 12px; height: 8px; background: var(--success-color); border-radius: 2px;"></span>完了</span>
              <span style="display: flex; align-items: center; gap: 3px;"><span style="display: inline-block; width: 1px; height: 12px; background: #e53935;"></span>今日</span>
            </div>
          </div>
        </div>
        <div class="card-body" style="padding: 0;">
          <div v-if="isLoading" style="text-align: center; padding: 40px;">読み込み中...</div>
          <div v-else-if="ganttData.length === 0" style="text-align: center; padding: 40px; color: var(--text-muted);">工事データがありません</div>
          <div v-else style="max-height: 520px; overflow: auto;">
            <!-- ヘッダー行（sticky） -->
            <div style="display: flex; position: sticky; top: 0; z-index: 2; background: var(--bg-primary); border-bottom: 2px solid var(--border-color);">
              <div style="width: 180px; min-width: 180px; padding: 8px 12px; font-size: 12px; font-weight: 600; color: var(--text-muted); position: sticky; left: 0; background: var(--bg-primary); z-index: 3; border-right: 1px solid var(--border-color);">工事名</div>
              <div style="flex: 1; min-width: 600px; display: flex; position: relative;">
                <div v-for="(m, mi) in ganttMonths" :key="mi" :style="{ width: (100/12)+'%', textAlign: 'center', fontSize: '11px', fontWeight: '500', color: 'var(--text-muted)', padding: '8px 0', borderLeft: mi > 0 ? '1px solid var(--border-color)' : 'none' }">{{ m }}</div>
              </div>
              <div style="width: 56px; min-width: 56px; padding: 8px 4px; font-size: 11px; font-weight: 600; color: var(--text-muted); text-align: center; border-left: 1px solid var(--border-color);">進捗</div>
            </div>
            <!-- データ行 -->
            <div v-for="item in filteredGanttData" :key="item.id" style="display: flex; border-bottom: 1px solid var(--border-color);">
              <div style="width: 180px; min-width: 180px; padding: 8px 12px; position: sticky; left: 0; background: var(--bg-primary); z-index: 1; border-right: 1px solid var(--border-color);">
                <div style="font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 156px;" :title="item.name">{{ item.name }}</div>
                <div style="font-size: 10px; color: var(--text-muted); margin-top: 2px;">{{ item.startDate ? item.startDate.slice(5) : '' }} ~ {{ item.endDate ? item.endDate.slice(5) : '' }}</div>
              </div>
              <div style="flex: 1; min-width: 600px; position: relative; display: flex;">
                <!-- 月グリッド線 -->
                <div v-for="mi in 12" :key="'g'+mi" :style="{ width: (100/12)+'%', borderLeft: mi > 1 ? '1px dashed #e0e0e0' : 'none' }"></div>
                <!-- 今日マーカー -->
                <div :style="{ position: 'absolute', left: todayPercent+'%', top: 0, bottom: 0, width: '1px', background: '#e53935', zIndex: 1, pointerEvents: 'none' }"></div>
                <!-- バー -->
                <div :style="[getGanttBarStyle(item), { position: 'absolute', height: '16px', top: '50%', marginTop: '-8px', borderRadius: '3px', overflow: 'hidden', zIndex: 1 }]">
                  <div :style="{ width: item.progress + '%', height: '100%', background: 'rgba(255,255,255,0.3)' }"></div>
                </div>
              </div>
              <div style="width: 56px; min-width: 56px; padding: 8px 4px; font-size: 12px; font-weight: 600; text-align: center; border-left: 1px solid var(--border-color);" :style="{ color: item.progress >= 100 ? 'var(--success-color)' : item.progress > 0 ? 'var(--primary-color)' : 'var(--text-muted)' }">{{ item.progress }}%</div>
            </div>
            <!-- フッター件数 -->
            <div style="padding: 8px 12px; font-size: 11px; color: var(--text-muted); text-align: right; position: sticky; bottom: 0; background: var(--bg-secondary);">
              {{ filteredGanttData.length }} / {{ ganttData.length }} 件表示
            </div>
          </div>
        </div>
      </div>

      <!-- カレンダー -->
      <div v-if="activeView === 'calendar'" class="calendar-view card">
        <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
          <button @click="prevMonth" class="btn btn-sm">&lt;</button>
          <span class="card-title">{{ formattedYearMonth }}</span>
          <button @click="nextMonth" class="btn btn-sm">&gt;</button>
        </div>
        <div class="card-body" style="padding: 0;">
          <div class="calendar-header" style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; padding: 8px 0; border-bottom: 1px solid var(--border-color); font-weight: 500; font-size: 12px;">
            <div style="color: var(--danger-color);">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div style="color: var(--primary-color);">土</div>
          </div>
          <div class="calendar-body" style="display: grid; grid-template-columns: repeat(7, 1fr);">
            <div v-for="(day, index) in calendarDays" :key="index"
              :style="{ minHeight: '80px', padding: '4px', borderRight: '1px solid var(--border-color)', borderBottom: '1px solid var(--border-color)', background: day.isToday ? '#fff3cd' : (day.isCurrentMonth ? 'var(--bg-primary)' : 'var(--bg-secondary)') }">
              <div style="font-size: 12px; font-weight: 500;">{{ day.date }}</div>
              <div v-if="day.events" style="margin-top: 4px;">
                <div v-for="event in day.events.slice(0, 3)" :key="event.id"
                  :style="{ fontSize: '10px', padding: '2px 4px', marginBottom: '2px', borderRadius: '2px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', background: event.type === 'milestone' ? '#e3f2fd' : (event.type === 'construction-start' ? '#e8f5e9' : '#fff3e0'), color: 'var(--text-primary)' }">
                  {{ event.title }}
                </div>
                <div v-if="day.events.length > 3" style="font-size: 10px; color: var(--text-muted);">+{{ day.events.length - 3 }}件</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- マイルストーン -->
      <div v-if="activeView === 'milestones'" class="milestones-view">
        <div class="card" style="margin-bottom: 16px;">
          <div class="card-body">
            <div style="display: flex; align-items: center; gap: 16px;">
              <div style="flex: 1;">
                <label class="form-label">工事を選択</label>
                <select v-model="selectedConstructionId" class="form-control" :disabled="constructionsLoading">
                  <option value="">{{ constructionsLoading ? '工事一覧を読み込み中...' : '選択してください' }}</option>
                  <option v-for="c in constructions" :key="c['工事番号']" :value="c['工事番号']">
                    {{ c['工事番号'] }} - {{ c['工事名称'] || '（名称未設定）' }}
                  </option>
                </select>
              </div>
              <button v-if="selectedConstructionId" @click="loadMilestones" class="btn btn-primary" style="align-self: flex-end;" :disabled="milestonesLoading">
                {{ milestonesLoading ? '検索中...' : '検索' }}
              </button>
              <button v-if="selectedConstructionId && !milestonesLoading" @click="openMilestoneModal()" class="btn btn-primary" style="align-self: flex-end;">
                + マイルストーン追加
              </button>
            </div>
          </div>
        </div>

        <div v-if="milestonesLoading" style="text-align: center; padding: 40px;">
          <div style="color: var(--text-secondary); font-size: 14px;">マイルストーンを検索中...</div>
        </div>
        <div v-else-if="selectedConstructionId" class="card">
          <div class="card-header"><span class="card-title">マイルストーン一覧</span></div>
          <div class="card-body" style="padding: 0;">
            <div v-if="milestones.length === 0" style="text-align: center; padding: 40px; color: var(--text-muted);">マイルストーンが登録されていません</div>
            <table v-else class="list-table">
              <thead><tr><th>名称</th><th>予定日</th><th>実績日</th><th>ステータス</th><th>操作</th></tr></thead>
              <tbody>
                <tr v-for="ms in milestones" :key="ms['マイルストーンID']">
                  <td>{{ ms['名称'] }}</td>
                  <td>{{ formatDate(ms['予定日']) }}</td>
                  <td>{{ formatDate(ms['実績日']) }}</td>
                  <td>
                    <span class="status-badge" :style="{ background: ms['ステータス'] === '完了' ? '#d4edda' : (ms['ステータス'] === '遅延' ? '#f8d7da' : '#fff3cd'), color: ms['ステータス'] === '完了' ? '#155724' : (ms['ステータス'] === '遅延' ? '#721c24' : '#856404') }">
                      {{ ms['ステータス'] }}
                    </span>
                  </td>
                  <td>
                    <button @click="openMilestoneModal(ms)" class="btn btn-sm">編集</button>
                    <button @click="deleteMilestone(ms['マイルストーンID'])" class="btn btn-sm btn-danger">削除</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- マイルストーン編集モーダル -->
      <div v-if="milestoneModal.show" class="modal-overlay" @click.self="milestoneModal.show = false">
        <div class="modal-content" style="max-width: 500px;">
          <div class="modal-header">
            <h3 class="modal-title">{{ milestoneModal.isNew ? 'マイルストーン追加' : 'マイルストーン編集' }}</h3>
            <button class="modal-close" @click="milestoneModal.show = false">&times;</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label class="form-label required">名称</label>
              <input v-model="milestoneModal.data['名称']" type="text" class="form-control" placeholder="例: 着工、中間検査、完了検査" />
            </div>
            <div class="form-group">
              <label class="form-label required">予定日</label>
              <input v-model="milestoneModal.data['予定日']" type="date" class="form-control" />
            </div>
            <div class="form-group">
              <label class="form-label">実績日</label>
              <input v-model="milestoneModal.data['実績日']" type="date" class="form-control" />
            </div>
            <div class="form-group">
              <label class="form-label">ステータス</label>
              <select v-model="milestoneModal.data['ステータス']" class="form-control">
                <option value="予定">予定</option>
                <option value="完了">完了</option>
                <option value="遅延">遅延</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button @click="milestoneModal.show = false" class="btn btn-secondary">キャンセル</button>
            <button @click="saveMilestone" class="btn btn-primary">保存</button>
          </div>
        </div>
      </div>
    </div>
  `
};
</script>
<script>
/**
 * AttachmentManager - 添付ファイル管理コンポーネント
 * ファイルアップロード、一覧表示、プレビュー、ダウンロード、削除を提供
 */
const AttachmentManager = {
  name: 'AttachmentManager',

  props: {
    entityType: { type: String, required: true },
    entityId: { type: String, required: true },
    readonly: { type: Boolean, default: false }
  },

  emits: ['show-toast'],

  data() {
    return {
      attachments: [],
      categories: ['契約書', '図面', '写真', '見積書', '報告書', 'その他'],
      isLoading: false,
      isUploading: false,
      isDragging: false,
      filterCategory: '',
      uploadForm: { file: null, category: 'その他', fileName: '' },
      deleteConfirm: { show: false, attachment: null },
      busyFileIds: {}  // { fileId: 'previewing' | 'downloading' | 'deleting' }
    };
  },

  computed: {
    filteredAttachments() {
      const list = this.attachments || [];
      if (!this.filterCategory) return list;
      return list.filter(a => a.category === this.filterCategory);
    },
    categoryCounts() {
      const counts = {};
      (this.attachments || []).forEach(a => {
        const cat = a.category || 'その他';
        counts[cat] = (counts[cat] || 0) + 1;
      });
      return counts;
    }
  },

  watch: {
    entityId: {
      immediate: true,
      handler(newVal) {
        if (newVal) this.loadAttachments();
      }
    }
  },

  async created() {
    await this.loadCategories();
  },

  errorCaptured(err) {
    console.error('[AttachmentManager] render error:', err);
    return false;
  },

  methods: {
    async loadCategories() {
      try {
        const result = await GasApi.getAttachmentCategories();
        this.categories = Array.isArray(result) ? result : ['契約書', '図面', '写真', '見積書', '報告書', 'その他'];
      } catch (e) {
        this.categories = ['契約書', '図面', '写真', '見積書', '報告書', 'その他'];
      }
    },

    async loadAttachments() {
      if (!this.entityId) return;
      this.isLoading = true;
      try {
        const result = await GasApi.getAttachmentsByEntity(this.entityType, this.entityId);
        this.attachments = Array.isArray(result) ? result : [];
      } catch (e) {
        console.error('[AttachmentManager] loadAttachments error:', e);
        this.attachments = [];
      } finally {
        this.isLoading = false;
      }
    },

    onFileSelect(event) {
      const file = event.target.files[0];
      if (file) {
        this.uploadForm.file = file;
        this.uploadForm.fileName = file.name;
      }
    },

    onDragOver(event) {
      event.preventDefault();
      this.isDragging = true;
    },

    onDragLeave(event) {
      event.preventDefault();
      this.isDragging = false;
    },

    onDrop(event) {
      event.preventDefault();
      this.isDragging = false;
      const file = event.dataTransfer.files[0];
      if (file) {
        this.uploadForm.file = file;
        this.uploadForm.fileName = file.name;
      }
    },

    async uploadFile() {
      if (!this.uploadForm.file) {
        this.$emit('show-toast', 'ファイルを選択してください', 'error');
        return;
      }
      const maxSize = 10 * 1024 * 1024; // 10MB
      if (this.uploadForm.file.size > maxSize) {
        this.$emit('show-toast', 'ファイルサイズが10MBを超えています', 'error');
        return;
      }
      this.isUploading = true;
      try {
        const base64Data = await this.fileToBase64(this.uploadForm.file);
        const result = await GasApi.uploadAttachment({
          entityType: this.entityType,
          entityId: this.entityId,
          category: this.uploadForm.category,
          fileName: this.uploadForm.fileName,
          mimeType: this.uploadForm.file.type,
          base64Data: base64Data
        });
        if (result.success) {
          this.$emit('show-toast', 'ファイルをアップロードしました', 'success');
          this.resetUploadForm();
          await this.loadAttachments();
        } else {
          this.$emit('show-toast', result.error || 'アップロードに失敗しました', 'error');
        }
      } catch (e) {
        this.$emit('show-toast', 'アップロードに失敗しました', 'error');
      } finally {
        this.isUploading = false;
      }
    },

    fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = error => reject(error);
      });
    },

    resetUploadForm() {
      this.uploadForm = { file: null, category: 'その他', fileName: '' };
      if (this.$refs.fileInput) this.$refs.fileInput.value = '';
    },

    isBusy(fileId) {
      return !!this.busyFileIds[fileId];
    },

    getBusyLabel(fileId) {
      const state = this.busyFileIds[fileId];
      if (state === 'previewing') return '開いています...';
      if (state === 'downloading') return 'ダウンロード中...';
      if (state === 'deleting') return '削除中...';
      return '';
    },

    async previewFile(attachment) {
      if (this.isBusy(attachment.fileId)) return;
      this.busyFileIds = { ...this.busyFileIds, [attachment.fileId]: 'previewing' };
      try {
        window.open('https://drive.google.com/file/d/' + attachment.driveFileId + '/view', '_blank');
      } finally {
        setTimeout(() => {
          const copy = { ...this.busyFileIds };
          delete copy[attachment.fileId];
          this.busyFileIds = copy;
        }, 1000);
      }
    },

    async downloadFile(attachment) {
      if (this.isBusy(attachment.fileId)) return;
      this.busyFileIds = { ...this.busyFileIds, [attachment.fileId]: 'downloading' };
      try {
        const result = await GasApi.getAttachmentDownloadUrl(attachment.fileId);
        if (result.success) {
          window.open(result.downloadUrl, '_blank');
        } else {
          this.$emit('show-toast', result.error || 'ダウンロードURLの取得に失敗しました', 'error');
        }
      } catch (e) {
        this.$emit('show-toast', 'ダウンロードに失敗しました', 'error');
      } finally {
        const copy = { ...this.busyFileIds };
        delete copy[attachment.fileId];
        this.busyFileIds = copy;
      }
    },

    confirmDelete(attachment) {
      if (this.isBusy(attachment.fileId)) return;
      this.deleteConfirm = { show: true, attachment: attachment };
    },

    async executeDelete() {
      const attachment = this.deleteConfirm.attachment;
      if (!attachment) return;
      this.busyFileIds = { ...this.busyFileIds, [attachment.fileId]: 'deleting' };
      try {
        const result = await GasApi.deleteAttachment(attachment.fileId, false);
        if (result.success) {
          this.$emit('show-toast', 'ファイルを削除しました', 'success');
          await this.loadAttachments();
        } else {
          this.$emit('show-toast', result.error || '削除に失敗しました', 'error');
        }
      } catch (e) {
        this.$emit('show-toast', '削除に失敗しました', 'error');
      } finally {
        const copy = { ...this.busyFileIds };
        delete copy[attachment.fileId];
        this.busyFileIds = copy;
        this.deleteConfirm = { show: false, attachment: null };
      }
    },

    formatFileSize(bytes) {
      if (!bytes) return '-';
      const units = ['B', 'KB', 'MB', 'GB'];
      let i = 0, size = bytes;
      while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
      return size.toFixed(1) + ' ' + units[i];
    },

    getFileIcon(mimeType) {
      if (!mimeType) return '📎';
      if (mimeType.startsWith('image/')) return '🖼️';
      if (mimeType.includes('pdf')) return '📕';
      if (mimeType.includes('word') || mimeType.includes('document')) return '📝';
      if (mimeType.includes('excel') || mimeType.includes('spreadsheet')) return '📊';
      return '📎';
    }
  },

  template: `
    <div class="attachment-manager">
      <div v-if="!readonly" class="card" style="margin-bottom: 16px;">
        <div class="card-header"><span class="card-title">ファイルアップロード</span></div>
        <div class="card-body">
          <div
            :class="['file-upload', { dragging: isDragging }]"
            @dragover="onDragOver"
            @dragleave="onDragLeave"
            @drop="onDrop"
            @click="$refs.fileInput && $refs.fileInput.click()"
          >
            <input type="file" ref="fileInput" @change="onFileSelect" style="display: none;" :disabled="isUploading" />
            <div v-if="!uploadForm.file" class="file-upload-icon">📁</div>
            <div v-if="!uploadForm.file" class="file-upload-text">
              ドラッグ&ドロップ、または<strong>クリック</strong>してファイルを選択<br>
              <span style="font-size: 12px; color: var(--text-muted);">最大ファイルサイズ: 10MB</span>
            </div>
            <div v-else class="file-upload-text">
              <strong>{{ uploadForm.fileName }}</strong>（{{ formatFileSize(uploadForm.file.size) }}）
              <br><span style="font-size: 12px; color: var(--text-muted);">別のファイルをドラッグまたはクリックで変更</span>
            </div>
          </div>
          <div style="display: flex; gap: 16px; align-items: flex-end; margin-top: 12px;">
            <div style="min-width: 120px;">
              <label class="form-label">カテゴリ</label>
              <select v-model="uploadForm.category" class="form-control" :disabled="isUploading">
                <option v-for="cat in categories" :key="cat" :value="cat">{{ cat }}</option>
              </select>
            </div>
            <button @click="uploadFile" class="btn btn-primary" :disabled="!uploadForm.file || isUploading">
              {{ isUploading ? 'アップロード中...' : 'アップロード' }}
            </button>
            <button v-if="uploadForm.file" @click="resetUploadForm" class="btn btn-secondary" :disabled="isUploading">
              クリア
            </button>
          </div>
        </div>
      </div>

      <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
        <button @click="filterCategory = ''" :class="['btn', filterCategory === '' ? 'btn-primary' : 'btn-secondary']" style="font-size: 13px;">
          すべて ({{ (attachments || []).length }})
        </button>
        <button v-for="cat in categories" :key="cat" @click="filterCategory = cat"
          :class="['btn', filterCategory === cat ? 'btn-primary' : 'btn-secondary']" style="font-size: 13px;">
          {{ cat }} ({{ categoryCounts[cat] || 0 }})
        </button>
      </div>

      <div class="card">
        <div class="card-body" style="padding: 0;">
          <table class="list-table">
            <thead><tr><th style="width: 40px;"></th><th>ファイル名</th><th style="width: 100px;">カテゴリ</th><th style="width: 80px;">サイズ</th><th style="width: 150px;">アップロード日時</th><th style="width: 120px;">操作</th></tr></thead>
            <tbody>
              <tr v-if="isLoading"><td colspan="6" style="text-align: center; padding: 40px;">読み込み中...</td></tr>
              <tr v-else-if="filteredAttachments.length === 0"><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">添付ファイルはありません</td></tr>
              <tr v-for="att in filteredAttachments" :key="att.fileId">
                <td style="text-align: center; font-size: 20px;">{{ getFileIcon(att.mimeType) }}</td>
                <td><div style="font-weight: 500;">{{ att.fileName }}</div><div style="font-size: 12px; color: var(--text-muted);">{{ att.fileId }}</div></td>
                <td><span class="status-badge" style="background: #e3f2fd; color: #1565c0;">{{ att.category }}</span></td>
                <td style="font-size: 12px;">{{ formatFileSize(att.fileSize) }}</td>
                <td style="font-size: 12px; color: var(--text-secondary);">{{ att.uploadedAt }}</td>
                <td>
                  <div v-if="isBusy(att.fileId)" style="font-size: 12px; color: var(--primary-color); white-space: nowrap;">
                    <span style="display: inline-block; animation: spin 1s linear infinite;">⏳</span> {{ getBusyLabel(att.fileId) }}
                  </div>
                  <div v-else style="display: flex; gap: 4px;">
                    <button @click="previewFile(att)" class="btn btn-sm" title="プレビュー">👁️</button>
                    <button @click="downloadFile(att)" class="btn btn-sm" title="ダウンロード">⬇️</button>
                    <button v-if="!readonly" @click="confirmDelete(att)" class="btn btn-sm btn-danger" title="削除">🗑️</button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div v-if="deleteConfirm.show" class="modal-overlay" @click.self="deleteConfirm.show = false">
        <div class="modal-content" style="max-width: 400px;">
          <div class="modal-header"><h3 class="modal-title">ファイル削除の確認</h3><button class="modal-close" @click="deleteConfirm.show = false">&times;</button></div>
          <div class="modal-body">
            <p>このファイルを削除しますか？</p>
            <div v-if="deleteConfirm.attachment" style="background: var(--bg-secondary); padding: 12px; border-radius: 4px; margin-top: 12px;">
              <div><strong>{{ deleteConfirm.attachment.fileName }}</strong></div>
              <div style="font-size: 12px; color: var(--text-muted);">{{ deleteConfirm.attachment.category }}</div>
            </div>
          </div>
          <div class="modal-footer">
            <button @click="deleteConfirm.show = false" class="btn btn-secondary" :disabled="deleteConfirm.attachment && isBusy(deleteConfirm.attachment.fileId)">キャンセル</button>
            <button @click="executeDelete" class="btn btn-danger" :disabled="deleteConfirm.attachment && isBusy(deleteConfirm.attachment.fileId)">
              {{ deleteConfirm.attachment && isBusy(deleteConfirm.attachment.fileId) ? '削除中...' : '削除する' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  `
};
</script>
<script>
/**
 * GasApi - Google Apps Script API通信層
 *
 * フロントエンドからGAS関数を呼び出すための統一インターフェース
 * google.script.run をPromiseでラップ
 */
/**
 * 全角半角の揺らぎを吸収する正規化（フロントエンド用）
 * NFKC正規化: 半角ｶﾀｶﾅ→全角カタカナ、全角英数→半角英数
 */
function normalizeWidth(str) {
  if (!str) return '';
  return String(str).normalize('NFKC').toLowerCase();
}

const COMPANY_PREFIXES = [
  '株式会社', '有限会社', '合同会社', '合資会社', '合名会社',
  '一般社団法人', '一般財団法人', '公益社団法人', '公益財団法人',
  '特定非営利活動法人', '医療法人', '社会福祉法人', '学校法人',
  '(株)', '(有)', '(合)', '（株）', '（有）', '（合）'
];

function stripCompanyType(name) {
  if (!name) return '';
  let s = String(name).normalize('NFKC').trim();
  for (const prefix of COMPANY_PREFIXES) {
    if (s.startsWith(prefix)) return s.substring(prefix.length).trim();
    if (s.endsWith(prefix)) return s.substring(0, s.length - prefix.length).trim();
  }
  return s;
}

function prefixMatch(value, keyword) {
  try {
    if (!value || !keyword) return false;
    const v = normalizeWidth(value);
    const kw = normalizeWidth(keyword);
    // 1. 全体の先頭一致
    if (v.startsWith(kw)) return true;
    // 2. 法人格除去後の社名先頭一致
    const stripped = stripCompanyType(value).toLowerCase();
    if (stripped.startsWith(kw)) return true;
    // 3. 末尾の法人格部分
    if (v.startsWith(stripped) && stripped.length < v.length) {
      const suffix = v.substring(stripped.length);
      if (suffix.startsWith(kw)) return true;
      if (suffix.replace(/[()（）]/g, '').startsWith(kw)) return true;
    }
    // 4. 先頭の法人格（括弧除去）
    const idx = v.indexOf(stripped);
    if (stripped.length < v.length && idx > 0) {
      const prefix = v.substring(0, idx);
      if (prefix.replace(/[()（）]/g, '').startsWith(kw)) return true;
    }
    return false;
  } catch (e) {
    return false;
  }
}

const GasApi = {
  /**
   * GAS関数を呼び出す共通メソッド
   * @param {string} functionName - GAS側の関数名
   * @param {any} params - パラメータ（オプション）

<script>
/**
 * Calculators - 金額計算ユーティリティ
 *
 * 消費税、合計金額、粗利率などをリアルタイム計算
 */
const Calculators = {
  /**
   * 消費税率（10%）
   */
  TAX_RATE: 0.10,

  /**
   * 税込金額を計算
   * @param {number} amount - 税抜金額
   * @returns {number} 税込金額
   */
  calcTaxIncluded(amount) {
    return Math.floor(amount * (1 + this.TAX_RATE));
  },

  /**
   * 消費税を計算
   * @param {number} amount - 税抜金額
   * @returns {number} 消費税額
   */
  calcTax(amount) {
    return Math.floor(amount * this.TAX_RATE);
  },

  /**
   * 税抜金額を計算（税込から逆算）
   * @param {number} taxIncludedAmount - 税込金額
   * @returns {number} 税抜金額
   */
  calcTaxExcluded(taxIncludedAmount) {
    return Math.floor(taxIncludedAmount / (1 + this.TAX_RATE));
  },

  /**
   * 明細の小計を計算
   * @param {Array} items - 明細配列
   * @param {string} amountKey - 金額キー（デフォルト: 'amount'）
   * @returns {number} 小計
   */
  calcSubtotal(items, amountKey = 'amount') {
    if (!Array.isArray(items)) return 0;
    return items.reduce((sum, item) => {
      return sum + (Number(item[amountKey]) || 0);
    }, 0);
  },

  /**
   * 行の金額を計算（数量 × 単価）
   * @param {Object} row - 行データ
   * @param {string} quantityKey - 数量キー
   * @param {string} priceKey - 単価キー
   * @param {string} amountKey - 金額キー
   * @returns {Object} 計算済み行データ
   */
  calcRowAmount(row, quantityKey = 'quantity', priceKey = 'price', amountKey = 'amount') {
    const quantity = Number(row[quantityKey]) || 0;
    const price = Number(row[priceKey]) || 0;
    return {
      ...row,
      [amountKey]: quantity * price
    };
  },

  /**
   * 粗利を計算
   * @param {number} revenue - 売上
   * @param {number} cost - 原価
   * @returns {number} 粗利
   */
  calcGrossProfit(revenue, cost) {
    return revenue - cost;
  },

  /**
   * 粗利率を計算
   * @param {number} revenue - 売上
   * @param {number} cost - 原価
   * @returns {string} 粗利率（%表記、小数点1桁）
   */
  calcGrossProfitRate(revenue, cost) {
    if (revenue === 0) return '0.0';
    return ((revenue - cost) / revenue * 100).toFixed(1);
  },

  /**
   * 原価低減率を計算
   * @param {number} budget - 予算額
   * @param {number} actual - 実績額
   * @returns {string} 原価低減率（%表記、小数点1桁）
   */
  calcCostReductionRate(budget, actual) {
    if (budget === 0) return '0.0';
    return ((budget - actual) / budget * 100).toFixed(1);
  },

  /**
   * 契約協議書の明細行計算関数
   * DataGridのrowCalculatorとして使用
   */
  contractRowCalculator(row) {
    const quantity = Number(row.quantity) || 0;
    const price = Number(row.price) || 0;
    return {
      ...row,
      amount: quantity * price
    };
  },

  /**
   * 契約金額サマリーを計算
   * @param {Array} items - 明細配列
   * @returns {Object} { subtotal, tax, total }
   */
  calcContractSummary(items) {
    const subtotal = this.calcSubtotal(items, 'amount');
    const tax = this.calcTax(subtotal);
    const total = subtotal + tax;
    return { subtotal, tax, total };
  },

  /**
   * 相見積もり比較で最安値を特定
   * @param {Array} vendors - 業者配列 [{ name, amount }, ...]
   * @returns {Object} 最安値の業者
   */
  findLowestBid(vendors) {
    if (!vendors || vendors.length === 0) return null;
    return vendors.reduce((lowest, vendor) => {
      const vendorAmount = Number(vendor.amount) || Infinity;
      const lowestAmount = Number(lowest.amount) || Infinity;
      return vendorAmount < lowestAmount ? vendor : lowest;
    });
  },

  /**
   * 予算対比を計算
   * @param {number} budget - 予算額
   * @param {number} orderAmount - 発注額
   * @returns {Object} { difference, reductionRate, isAchieved }
   */
  calcBudgetComparison(budget, orderAmount) {
    const difference = budget - orderAmount;
    const reductionRate = this.calcCostReductionRate(budget, orderAmount);
    const isAchieved = difference >= 0;
    return { difference, reductionRate, isAchieved };
  }
};

      initialProjectTab: null,
      projectConstructions: [],
      projectOrders: [],
      allConstructions: [],
      customers: [],
      vendors: [],
      employees: [],

      // サマリー
      summary: {
        inProgress: 0,
        negotiating: 0,
        contracted: 0,
        completed: 0
      },

      // キャッシュフラグ（プリフェッチ済みかどうか）
      _contractsLoaded: false,
      // 訪問済みメニュー（一度訪問したらコンポーネントをDOMに保持して高速化）
      // Vue 3はSetのリアクティビティを追跡しないため、オブジェクトで管理
      visitedMenus: { project: true },  // 初期画面は最初から訪問済み

      // UI状態
      loading: false,
      toast: {
        show: false,
        type: 'success',
        message: ''
      },

      // ドキュメントプレビューモーダル
      previewModal: {
        show: false,
        title: '',
        fileId: '',
        downloadUrl: '',
        filename: ''
      },

      // 権限
      userPermissions: {
        role: 'staff',
        permissions: {}
      }
    };
  },

  // ========================================
  // 算出プロパティ
  // ========================================
  computed: {
    /**
     * サイドバーのアクティブメニューを算出
     * 詳細画面の場合は親メニューを返してサイドバーのハイライトを維持
     */
    sidebarActiveMenu() {
      if (this.activeMenu === 'contractForm') {
        return 'contract';
      }
      if (this.activeMenu === 'projectDetail') {
        return 'project';
      }
      return this.activeMenu;
    },

    /**
     * 権限に応じてフィルタリングされたメニュー項目
     */
    filteredMenuItems() {
      const perms = this.userPermissions.permissions;
      return this.menuItems.filter(item => {
        if (item.type === 'divider') return true;
        // メニューごとの権限チェック
        switch (item.id) {
          case 'audit':
            return perms['audit.view'] !== false;
          case 'archive':
            return perms['archive.view'] !== false;
          case 'master':
            return perms['master.view'] !== false;
          default:
            return true;
        }
      });
    },

    /**
     * 権限チェックヘルパー
     */
    canCreate() {
      return this.userPermissions.permissions['project.create'] !== false;
    },
    canDelete() {
      return this.userPermissions.permissions['project.delete'] === true;
    },
    canApprove() {
      return this.userPermissions.role === 'manager' || this.userPermissions.role === 'admin';
    },
    isAdmin() {
      return this.userPermissions.role === 'admin';
    },
    isManager() {
      return this.userPermissions.role === 'manager' || this.userPermissions.role === 'admin';
    }
  },

  // ========================================
  // ライフサイクル
  // ========================================
  async created() {
    await this.initialize();
  },

  // ========================================
  // メソッド
  // ========================================
  methods: {
    /**
     * 初期化処理
     */
    async initialize() {
      console.log('[App] 初期化開始');
      this.loading = true;
      try {
        // 1回のサーバー呼び出しで全初期データを取得（高速化）
        const result = await GasApi.initializeApp();

        if (result.error) {
          throw new Error(result.error);
        }

        // ユーザー情報
        this.currentUser = result.currentUser;
        console.log('[App] ユーザー情報:', this.currentUser);
        if (this.currentUser?.department) {
          this.currentDepartment = this.currentUser.department;
        }

        // 権限
        if (result.permissions) {
          this.userPermissions = result.permissions;
        }

        // 工事・マスタデータ（すべてinitializeAppの1回で取得済み）
        this.projects = result.projects || [];
        this.allConstructions = result.constructions || [];
        this.customers = result.customers || [];
        this.vendors = result.vendors || [];
        this.employees = result.employees || [];

        // 契約データもinitializeAppで取得済み
        if (result.contracts) {
          this.contracts = result.contracts;
          this._contractsLoaded = true;
        }

        this.updateSummary();

        console.log('[App] 初期化完了 - projects:', this.projects.length, '件, constructions:', this.allConstructions.length, '件, contracts:', this.contracts.length, '件');

        // バックグラウンドで請求・支払等をプリフェッチ（画面遷移高速化）
        this.prefetchRemainingData();
      } catch (error) {
        console.error('初期化エラー:', error);
        // フォールバック：個別呼び出し
        try {
          console.log('[App] フォールバック：個別API呼び出し');
          const [currentUser, permissions] = await Promise.all([
            GasApi.getCurrentUser(),
            GasApi.getUserPermissions()
          ]);
          this.currentUser = currentUser;
          if (this.currentUser?.department) {
            this.currentDepartment = this.currentUser.department;
          }
          if (permissions) {
            this.userPermissions = permissions;
          }
          await Promise.all([
            this.loadProjects(),
            this.loadMasters(),
            GasApi.getConstructions().then(c => { this.allConstructions = c || []; }).catch(() => { this.allConstructions = []; }),
            this.loadContracts().catch(() => {})
          ]);
          this.prefetchRemainingData();
        } catch (fallbackError) {
          console.error('フォールバック初期化エラー:', fallbackError);
          this.showToast('データの読み込みに失敗しました', 'error');
        }
      } finally {
        this.loading = false;
      }
    },

    /**
     * 工事一覧を読み込み
     */
    async loadProjects() {
      console.log('[App] loadProjects開始');
      const projects = await GasApi.getProjects({
        department: this.currentDepartment
      });
      console.log('[App] loadProjects結果:', projects);
      this.projects = projects || [];
      console.log('[App] projects件数:', this.projects.length);
      this.updateSummary();
    },

    /**
     * マスタデータを読み込み
     */
    async loadMasters() {
      const [customers, vendors, employees] = await Promise.all([
        GasApi.getCustomers(),
        GasApi.getVendors(),
        GasApi.getEmployees()
      ]);
      this.customers = customers || [];
      this.vendors = vendors || [];
      this.employees = employees || [];
    },

    /**
     * 発注一覧を読み込み
     */
    async loadOrders() {
      console.log('[App] loadOrders開始');
      const orders = await GasApi.getOrders();
      console.log('[App] loadOrders結果:', orders);
      this.orders = orders || [];
      console.log('[App] orders件数:', this.orders.length);
    },

    /**
     * 契約協議一覧を取得
     */
    async loadContracts() {
      console.log('[App] loadContracts開始');
      const contracts = await GasApi.getContracts('ソリューション事業部');
      console.log('[App] loadContracts結果:', contracts);
      this.contracts = contracts || [];
      this._contractsLoaded = true;
      console.log('[App] contracts件数:', this.contracts.length);
    },

    /**
     * 契約データをバックグラウンドでプリフェッチ（初期化後に呼ばれる）
     */
    prefetchContracts() {
      if (this._contractsLoaded) return;
      console.log('[App] 契約データをバックグラウンドでプリフェッチ開始');
      this.loadContracts().catch(e => {
        console.warn('[App] 契約データプリフェッチ失敗（次回画面遷移時に再取得）:', e);
      });
    },

    /**
     * 初期化完了後に残りのデータをバックグラウンドでプリフェッチ
     * GASへの同時リクエストを避けるため、順番に間隔を空けて実行
     */
    prefetchRemainingData() {
      // 契約データ（initializeAppで取得済みならスキップ）
      if (!this._contractsLoaded) {
        this.prefetchContracts();
      }

      // 請求・支払・発注データを遅延プリフェッチ
      // InvoicePaymentコンポーネントに直接アクセスできないため、
      // visitedMenusにフラグを立ててコンポーネントをDOMに生成し、
      // コンポーネント自身のmounted/createdでデータ取得させる
      const self = this;
      setTimeout(function() {
        // 請求・支払ビューをプリフェッチ（DOMに追加するとmountedが発火しデータ取得される）
        if (!self.visitedMenus.invoice) {
          console.log('[App] 請求・支払データをバックグラウンドでプリフェッチ');
          self.visitedMenus.invoice = true;
        }
      }, 2000);

      setTimeout(function() {
        // 発注データもプリフェッチ
        if (!self.visitedMenus.ledger) {
          console.log('[App] 工事台帳データをバックグラウンドでプリフェッチ');
          self.visitedMenus.ledger = true;
        }
      }, 4000);

      setTimeout(function() {
        // スケジュールデータもプリフェッチ
        if (!self.visitedMenus.schedule) {
          console.log('[App] スケジュールデータをバックグラウンドでプリフェッチ');
          self.visitedMenus.schedule = true;
        }
      }, 6000);
    },

    /**
     * 契約協議一覧に戻る
     * データは既に保持されているので再取得しない（高速化）
     */
    backToContractList() {
      this.selectedContract = null;
      this.activeMenu = 'contract';
    },

    /**
     * サマリーを更新
     */
    updateSummary() {
      const statusCount = {
        '施工中': 0,
        '契約協議中': 0,
        '契約済': 0,
        '完工': 0
      };

      this.projects.forEach(p => {
        const status = p['案件ステータス'];
        if (statusCount.hasOwnProperty(status)) {
          statusCount[status]++;
        }
      });

      this.summary = {
        inProgress: statusCount['施工中'],
        negotiating: statusCount['契約協議中'],
        contracted: statusCount['契約済'],
        completed: statusCount['完工']
      };
    },

    /**
     * メニューを選択
     */
    async selectMenu(menuId) {
      this.activeMenu = menuId;
      // 訪問済みメニューを記録（v-if + v-show パターンで2回目以降の表示を高速化）
      this.visitedMenus[menuId] = true;
      // 必要に応じて画面遷移時のデータ読み込み
      if (menuId === 'project') {
        this.selectedProject = null;
        this.selectedContract = null;
      }
      // 契約協議一覧画面を開いた場合
      if (menuId === 'contract') {
        this.selectedContract = null;
        if (this._contractsLoaded) {
          // キャッシュ済み → 即表示、バックグラウンドでリフレッシュ
          this.loadContracts().catch(e => console.warn('[App] 契約データリフレッシュ失敗:', e));
        } else {
          // 未取得 → ローディング表示して待つ
          this.loading = true;
          try {
            await this.loadContracts();
          } finally {
            this.loading = false;
          }
        }
      }
    },

    /**
     * 工事を選択して契約協議書画面へ（旧動作）
     */
    async viewProject(project) {
      this.selectedProject = project;
      this.loading = true;
      try {
        // 工事IDで契約協議書を取得（なければ工事情報から新規作成用データを生成）
        const projectId = project['案件ID'];
        const contract = await GasApi.getContractById(projectId, 'solution');
        if (contract && contract['協議書ID']) {
          this.selectedContract = contract;
        } else {
          // 契約協議書が見つからない場合は工事情報から新規作成用データを生成
          const today = new Date().toISOString().split('T')[0];
          this.selectedContract = {
            '協議書ID': '',
            '作成日': today,
            '契約協議書日付': today,
            '区分': '',
            '作成者': this.currentUser?.name || '',
            '担当者': project['担当者名'] || '',
            '工事名': project['案件名'] || '',
            '工事場所': '',
            '発注者': project['顧客名'] || '',
            '電話番号': '',
            '契約金額': project['契約金額'] || 0,
            '承認ステータス': '作成中'
          };
        }
        this.activeMenu = 'contractForm';
      } catch (error) {
        console.error('契約協議書取得エラー:', error);
        this.showToast('契約協議書の取得に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    /**
     * 工事を選択して工事詳細画面へ（新動作）
     */
    async viewProjectDetail(project) {
      console.log('[App] viewProjectDetail:', project);
      this.selectedProject = project;
      this.loading = true;
      try {
        const projectId = project['案件ID'];
        // 工事一覧と発注一覧を並列取得（高速化）
        const [constructions, orders] = await Promise.all([
          GasApi.getConstructionsByProjectId(projectId),
          GasApi.getOrdersByProjectId(projectId)
        ]);
        this.projectConstructions = constructions || [];
        this.projectOrders = orders || [];
        console.log('[App] 工事取得:', this.projectConstructions.length, '件, 発注取得:', this.projectOrders.length, '件');

        this.activeMenu = 'projectDetail';
      } catch (error) {
        console.error('工事詳細取得エラー:', error);
        this.showToast('工事詳細の取得に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    /**
     * 工事一覧に戻る
     * データは既に保持されているので再取得しない（高速化）
     */
    backToProjectList() {
      this.selectedProject = null;
      this.projectConstructions = [];
      this.projectOrders = [];
      this.initialProjectTab = null;
      this.activeMenu = 'project';
    },

    /**
     * 発注フォームから工事詳細（工事一覧）に戻る
     * データは既に保持されているので再取得しない（高速化）
     */
    backToProjectDetail() {
      this.selectedOrder = null;
      this.activeMenu = 'projectDetail';
    },

    /**
     * 追加工事を保存
     */
    async saveProjectConstruction(constructionData) {
      console.log('[App] saveProjectConstruction:', constructionData);
      this.loading = true;
      try {
        const result = await GasApi.saveConstruction(constructionData);
        if (result?.success) {
          this.showToast('工事を保存しました', 'success');
          // 工事一覧を再読み込み
          const projectId = this.selectedProject['案件ID'];
          const constructions = await GasApi.getConstructionsByProjectId(projectId);
          this.projectConstructions = constructions || [];
          // 全工事一覧も更新（工事番号表示用）
          GasApi.getConstructions().then(c => { this.allConstructions = c || []; }).catch(() => {});
        } else {
          this.showToast('工事の保存に失敗しました: ' + (result?.error || ''), 'error');
        }
      } catch (error) {
        console.error('工事保存エラー:', error);
        this.showToast('工事の保存に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

    /**
     * 工事削除後に一覧を再読み込み
     */
    async onDeleteConstruction(constructionId) {
      console.log('[App] onDeleteConstruction:', constructionId);
      try {
        const projectId = this.selectedProject['案件ID'];
        const constructions = await GasApi.getConstructionsByProjectId(projectId);
        this.projectConstructions = constructions || [];
        // 全工事一覧も更新（工事番号表示用）
        GasApi.getConstructions().then(c => { this.allConstructions = c || []; }).catch(() => {});
      } catch (error) {
        console.error('工事一覧再読み込みエラー:', error);
      }
    },

    /**
     * 工事から発注を作成
     * @param {Object|string} data - { projectId, constructionId } または projectId
     */
    newOrderForProject(data) {
      // オブジェクトでも単一値でも対応
      const projectId = typeof data === 'object' ? data.projectId : data;
      const constructionId = typeof data === 'object' ? data.constructionId : '';

      console.log('[App] newOrderForProject:', { projectId, constructionId });

      // 発注管理画面に遷移し、工事ID・工事番号を設定
      this.selectedOrder = {
        '発注ID': '',
        '関連案件ID': projectId || '',
        '関連工事番号': constructionId || '',
        '施主名(注文決定業者名)': '',
        '注文内容': '',
        '注文金額': 0,
        '実行予算金額': 0,
        '支払ステータス(協力会社への)': '未発注'

      this.activeMenu = 'order';
    },

    /**

     */
    async viewOrder(order) {
      console.log('[App] viewOrder:', order);

        console.error('[App] viewOrder: 発注IDがありません');
        this.showToast('発注IDが取得できませんでした', 'error');

      this.loading = true;
      try {
        // APIで全フィールドを持つ発注データを取得
        const fullOrder = await GasApi.getOrderById(orderId);
        if (fullOrder) {
          this.selectedOrder = fullOrder;
          this.activeMenu = 'order';
          console.log('[App] viewOrder: 発注詳細取得成功', fullOrder['発注ID']);

          console.error('[App] viewOrder: 発注が見つかりません', orderId);
          this.showToast('発注データが見つかりませんでした', 'error');

    /**
     * 契約協議を保存
     */
    async saveContract(data) {
      this.loading = true;
      try {
        const department = 'ソリューション事業部';
        const result = await GasApi.saveContract(data, department);
        if (result?.id) {
          // 保存後、取得して最新データを表示
          this.selectedContract = { ...data, '協議書ID': result.id };
        }
        this.showToast('保存しました', 'success');
        await this.loadProjects();
        await this.loadContracts();

        // 承認済かつプロジェクト作成成功時
        if (data['承認ステータス'] === '承認済' && result?.projectId) {
          // 顧客請求データを自動作成
          try {
            const invResult = await GasApi.createInvoiceFromContract(result.id, result.projectId);
            if (invResult && invResult.success) {
              console.log('[saveContract] 顧客請求データ自動作成成功:', invResult.id);
            } else {
              console.warn('[saveContract] 顧客請求データ自動作成失敗:', invResult?.error);
            }
          } catch (invErr) {
            console.warn('[saveContract] 顧客請求データ自動作成エラー:', invErr);
          }

          // 全工事一覧も更新（工事番号表示用）
          GasApi.getConstructions().then(c => { this.allConstructions = c || []; }).catch(() => {});

          // 工事詳細（工事一覧タブ）に自動遷移
          const project = this.projects.find(p => p['案件ID'] === result.projectId);
          if (project) {
            this.initialProjectTab = 'constructions';
            await this.viewProjectDetail(project);
            return;
          }
        }

        // 承認済み以外 → 契約協議一覧に戻る
        this.backToContractList();
      } catch (error) {
        console.error('保存エラー:', error);
        this.showToast('保存に失敗しました', 'error');
      } finally {
        this.loading = false;
      }
    },

     */
    async saveOrder(data) {
      this.loading = true;
      try {
        // OrderFormで既に保存済みの場合（_savedフラグあり）
        if (data._saved) {
          this.showToast('保存しました', 'success');
        } else {
          // 旧来の動作（直接呼び出しの場合）
          await GasApi.saveOrder(data);
          this.showToast('保存しました', 'success');
        }

        // 工事詳細に戻る（発注一覧を再読み込み）
        if (this.selectedProject) {
          const projectId = this.selectedProject['案件ID'];
          const constructions = await GasApi.getConstructionsByProjectId(projectId);
          this.projectConstructions = constructions || [];
          const orders = await GasApi.getOrdersByProjectId(projectId);
          this.projectOrders = orders || [];
          this.backToProjectDetail();
        }
      } catch (error) {
        console.error('保存エラー:', error);
        this.showToast('保存に失敗しました', 'error');

        this.loading = false;
      }
