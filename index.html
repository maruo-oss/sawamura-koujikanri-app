              </div>

              <div class="data-grid" style="max-height: 400px; overflow-y: auto;">
                <table class="list-table">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>顧客名</th>
                      <th>ふりがな</th>
                      <th>住所</th>
                      <th>電話番号</th>
                      <th>ふりわけ</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr
                      v-for="customer in filteredCustomers"
                      :key="customer.customerId"
                      :class="{ selected: selectedCustomer?.customerId === customer.customerId }"
                      @click="selectCustomer(customer)"
                    >
                      <td>{{ customer.customerId }}</td>
                      <td>{{ customer.customerName }}</td>
                      <td>{{ customer.furigana }}</td>
                      <td>{{ customer.address }}</td>
                      <td>{{ customer.phone }}</td>
                      <td>{{ customer.category }}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

            <!-- 編集パネル -->
            <div v-if="isEditing && activeTab === 'customers'" class="card" style="width: 400px;">
              <div class="card-header">
                <span class="card-title">{{ selectedCustomer ? '顧客編集' : '新規顧客' }}</span>
              </div>
              <div class="card-body">
                <div class="form-group">
                  <label class="form-label required">顧客名</label>
                  <input type="text" v-model="customerForm.customerName" class="form-control" />
                </div>
                <div class="form-group">
                  <label class="form-label">ふりがな</label>
                  <input type="text" v-model="customerForm.furigana" class="form-control" />
                </div>
                <div class="form-group">
                  <label class="form-label">住所</label>
                  <input type="text" v-model="customerForm.address" class="form-control" />
                </div>
                <div class="form-group">
                  <label class="form-label">ふりわけ</label>
                  <input type="text" v-model="customerForm.category" class="form-control" />
                </div>
                <div class="form-group">

                  <input type="text" v-model="customerForm.phone" class="form-control" />
                </div>

              <div class="card-footer">

                <button class="btn btn-primary" @click="saveCustomer">保存</button>

            </div>
          </div>
        </template>

        <!-- 協力会社マスタ -->
        <template #vendors>
          <div class="d-flex gap-3">
            <!-- 一覧 -->

              <div class="search-bar">

            <!-- 編集パネル -->
            <div v-if="isEditing && activeTab === 'vendors'" class="card" style="width: 450px;">

                <div class="form-group">
                  <label class="form-label">カナ</label>
                  <input type="text" v-model="vendorForm.kana" class="form-control" />

                <div class="form-group">

                  <input type="text" v-model="vendorForm.address" class="form-control" />

                <div class="form-group">

                </div>
              </div>
              <div class="card-footer">
                <button class="btn btn-secondary" @click="cancelEdit">キャンセル</button>

              </div>
            </div>

<script>
/**
 * AuditLogViewer - 監査ログビューアー コンポーネント
 * 操作履歴の閲覧、フィルタリング、変更差分表示を提供
 */
const AuditLogViewer = {
  name: 'AuditLogViewer',

  props: {
    currentUser: {
      type: Object,
      default: () => ({})
    }
  },

  data() {
    return {
      logs: [],
      isLoading: false,
      filter: {
        startDate: '',
        endDate: '',
        userEmail: '',
        operationType: '',
        targetSheet: '',
        targetId: '',
        limit: 100
      },
      operationTypes: ['CREATE', 'UPDATE', 'DELETE', 'EXPORT', 'IMPORT'],
      targetSheets: [],
      selectedLog: null,
      showDetailModal: false
    };
  },

  computed: {
    operationTypeLabels() {
      return {
        'CREATE': '作成',
        'UPDATE': '更新',
        'DELETE': '削除',
        'EXPORT': '出力',
        'IMPORT': '取込'
      };
    },
    operationTypeBadgeClass() {
      return {
        'CREATE': 'badge-success',
        'UPDATE': 'badge-primary',
        'DELETE': 'badge-danger',
        'EXPORT': 'badge-info',
        'IMPORT': 'badge-warning'
      };
    }
  },

  async created() {
    await this.initialize();
  },

  methods: {
    async initialize() {
      const today = new Date();
      const weekAgo = new Date(today);
      weekAgo.setDate(weekAgo.getDate() - 7);
      this.filter.endDate = this.formatDate(today);
      this.filter.startDate = this.formatDate(weekAgo);
      this.targetSheets = [
        '案件管理', '契約協議書', '工事管理',
        '発注業者管理', '請求管理', '支払管理', '実行予算',
        '顧客マスタ', '協力会社マスタ', '社員マスタ'
      ];
      await this.loadLogs();
    },
    formatDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    },
    async loadLogs() {
      this.isLoading = true;
      try {
        const filterParams = {};
        if (this.filter.startDate) filterParams.startDate = this.filter.startDate;
        if (this.filter.endDate) filterParams.endDate = this.filter.endDate;
        if (this.filter.userEmail) filterParams.userEmail = this.filter.userEmail;
        if (this.filter.operationType) filterParams.operationType = this.filter.operationType;
        if (this.filter.targetSheet) filterParams.targetSheet = this.filter.targetSheet;
        if (this.filter.targetId) filterParams.targetId = this.filter.targetId;
        filterParams.limit = this.filter.limit || 100;
        this.logs = await GasApi.getAuditLogs(filterParams);
      } catch (e) {
        console.error('監査ログ取得エラー:', e);
        this.logs = [];
      } finally {
        this.isLoading = false;
      }
    },
    resetFilter() {
      const today = new Date();
      const weekAgo = new Date(today);
      weekAgo.setDate(weekAgo.getDate() - 7);
      this.filter = {
        startDate: this.formatDate(weekAgo),
        endDate: this.formatDate(today),
        userEmail: '',
        operationType: '',
        targetSheet: '',
        targetId: '',
        limit: 100
      };
      this.loadLogs();
    },
    showDetail(log) {
      this.selectedLog = log;
      this.showDetailModal = true;
    },
    closeDetailModal() {
      this.showDetailModal = false;
      this.selectedLog = null;
    },
    parseJson(jsonStr) {
      if (!jsonStr) return null;
      try {
        return JSON.parse(jsonStr);
      } catch (e) {
        return null;
      }
    },
    getChangedFieldsArray(changedFields) {
      if (!changedFields) return [];
      return changedFields.split(',').filter(f => f.trim());
    },
    getDiff(beforeJson, afterJson, changedFields) {
      const before = this.parseJson(beforeJson) || {};
      const after = this.parseJson(afterJson) || {};
      const fields = this.getChangedFieldsArray(changedFields);
      return fields.map(field => ({
        field: field,
        before: before[field] !== undefined ? String(before[field]) : '',
        after: after[field] !== undefined ? String(after[field]) : ''
      }));
    },
    getOperationLabel(type) {
      return this.operationTypeLabels[type] || type;
    },
    getBadgeClass(type) {
      return this.operationTypeBadgeClass[type] || 'badge-secondary';
    }
  },

  template: `
    <div class="audit-log-viewer">
      <div class="page-header">
        <h2>操作履歴</h2>
        <p class="page-description">システムの操作履歴を確認できます</p>
      </div>
      <div class="filter-panel card">
        <div class="card-body">
          <div class="form-row">
            <div class="form-group" style="flex: 2;">
              <label class="form-label">期間</label>
              <div style="display: flex; gap: 8px; align-items: center;">
                <input type="date" v-model="filter.startDate" class="form-control">
                <span>〜</span>
                <input type="date" v-model="filter.endDate" class="form-control">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">操作種別</label>
              <select v-model="filter.operationType" class="form-control">
                <option value="">すべて</option>
                <option v-for="type in operationTypes" :key="type" :value="type">
                  {{ getOperationLabel(type) }}
                </option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">対象シート</label>
              <select v-model="filter.targetSheet" class="form-control">
                <option value="">すべて</option>
                <option v-for="sheet in targetSheets" :key="sheet" :value="sheet">
                  {{ sheet }}
                </option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">ユーザー</label>
              <input type="text" v-model="filter.userEmail" class="form-control" placeholder="メールアドレス">
            </div>
            <div class="form-group">
              <label class="form-label">対象ID</label>
              <input type="text" v-model="filter.targetId" class="form-control" placeholder="PJ-2024-0001など">
            </div>
            <div class="form-group">
              <label class="form-label">表示件数</label>
              <select v-model="filter.limit" class="form-control">
                <option :value="50">50件</option>
                <option :value="100">100件</option>
                <option :value="200">200件</option>
                <option :value="500">500件</option>
              </select>
            </div>
          </div>
          <div class="form-actions">
            <button @click="loadLogs" class="btn btn-primary" :disabled="isLoading">
              {{ isLoading ? '検索中...' : '検索' }}
            </button>
            <button @click="resetFilter" class="btn btn-secondary">リセット</button>
          </div>
        </div>
      </div>
      <div class="result-summary" style="margin: 16px 0; color: var(--text-secondary);">
        <span>{{ logs.length }}件の操作履歴</span>
      </div>
      <div class="card">
        <div class="card-body" style="padding: 0;">
          <table class="list-table">
            <thead>
              <tr>
                <th>日時</th>
                <th>操作</th>
                <th>対象</th>
                <th>対象ID</th>
                <th>ユーザー</th>
                <th>変更内容</th>
              </tr>
            </thead>
            <tbody>
              <tr v-if="isLoading">
                <td colspan="6" style="text-align: center; padding: 40px;">読み込み中...</td>
              </tr>
              <tr v-else-if="logs.length === 0">
                <td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">該当する操作履歴がありません</td>
              </tr>
              <tr v-for="log in logs" :key="log.logId" @click="showDetail(log)" style="cursor: pointer;">
                <td style="font-size: 12px; color: var(--text-secondary); white-space: nowrap;">{{ log.timestamp }}</td>
                <td>
                  <span :class="['status-badge', getBadgeClass(log.operationType)]">
                    {{ getOperationLabel(log.operationType) }}
                  </span>
                </td>
                <td>{{ log.targetSheet }}</td>
                <td style="font-family: monospace; font-size: 12px;">{{ log.targetId }}</td>
                <td>{{ log.userName || log.userEmail }}</td>
                <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                  <span v-if="log.changedFields" style="font-size: 12px; color: var(--text-secondary);">
                    {{ log.changedFields.split(',').slice(0, 3).join(', ') }}
                    <span v-if="log.changedFields.split(',').length > 3">...</span>

      <div v-if="showDetailModal && selectedLog" class="modal-overlay" @click.self="closeDetailModal">
        <div class="modal-content" style="max-width: 800px;">

            <h3 class="modal-title">操作詳細</h3>

          </div>

            <div style="margin-bottom: 24px;">
              <h4 style="font-size: 14px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">基本情報</h4>
              <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
                <div><label style="font-size: 11px; color: var(--text-muted);">ログID</label><div>{{ selectedLog.logId }}</div></div>
                <div><label style="font-size: 11px; color: var(--text-muted);">日時</label><div>{{ selectedLog.timestamp }}</div></div>
                <div><label style="font-size: 11px; color: var(--text-muted);">操作種別</label><div><span :class="['status-badge', getBadgeClass(selectedLog.operationType)]">{{ getOperationLabel(selectedLog.operationType) }}</span></div></div>
                <div><label style="font-size: 11px; color: var(--text-muted);">対象シート</label><div>{{ selectedLog.targetSheet }}</div></div>
                <div><label style="font-size: 11px; color: var(--text-muted);">対象ID</label><div>{{ selectedLog.targetId }}</div></div>
                <div><label style="font-size: 11px; color: var(--text-muted);">ユーザー</label><div>{{ selectedLog.userName }} ({{ selectedLog.userEmail }})</div></div>
                <div><label style="font-size: 11px; color: var(--text-muted);">部門</label><div>{{ selectedLog.department || '-' }}</div></div>
              </div>
            </div>
            <div v-if="selectedLog.operationType === 'UPDATE'" style="margin-bottom: 24px;">
              <h4 style="font-size: 14px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">変更内容</h4>
              <table class="list-table" style="font-size: 13px;">
                <thead>
                  <tr><th>フィールド</th><th style="background: #fce8e6;">変更前</th><th style="background: #e6f4ea;">変更後</th></tr>
                </thead>
                <tbody>
                  <tr v-for="diff in getDiff(selectedLog.beforeJson, selectedLog.afterJson, selectedLog.changedFields)" :key="diff.field">
                    <td style="font-weight: 500;">{{ diff.field }}</td>
                    <td style="background: #fce8e6;">{{ diff.before || '(空)' }}</td>
                    <td style="background: #e6f4ea;">{{ diff.after || '(空)' }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div v-if="selectedLog.operationType === 'CREATE'" style="margin-bottom: 24px;">
              <h4 style="font-size: 14px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">作成データ</h4>
              <pre style="background: var(--bg-secondary); padding: 16px; border-radius: 4px; font-size: 12px; overflow-x: auto; max-height: 300px; overflow-y: auto;">{{ JSON.stringify(parseJson(selectedLog.afterJson), null, 2) }}</pre>
            </div>
            <div v-if="selectedLog.operationType === 'DELETE'" style="margin-bottom: 24px;">
              <h4 style="font-size: 14px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">削除データ</h4>
              <pre style="background: var(--bg-secondary); padding: 16px; border-radius: 4px; font-size: 12px; overflow-x: auto; max-height: 300px; overflow-y: auto;">{{ JSON.stringify(parseJson(selectedLog.beforeJson), null, 2) }}</pre>
            </div>

<script>
/**
 * ArchiveList - アーカイブ一覧 コンポーネント
 * 削除済みデータの閲覧、復元、完全削除を提供
 */
const ArchiveList = {
  name: 'ArchiveList',

  props: {
    currentUser: {
      type: Object,
      default: () => ({})
    }
  },

  emits: ['show-toast'],

  data() {
    return {
      summary: null,
      isLoadingSummary: false,
      selectedSheet: null,
      archivedData: [],
      isLoadingData: false,
      confirmModal: {
        show: false,
        type: '',
        item: null
      },
      sheetConfigs: [
        { name: '案件管理', label: '工事', idColumn: '案件ID', displayColumns: ['案件ID', '案件名', '顧客名', '削除日時', '削除者'] },
        { name: '契約協議書', label: '契約協議書', idColumn: '協議書ID', displayColumns: ['協議書ID', '工事名', '顧客名', '削除日時', '削除者'] },
        { name: '工事管理', label: '工事', idColumn: '工事番号', displayColumns: ['工事番号', '工事名', '関連案件ID', '削除日時', '削除者'] },
        { name: '発注業者管理', label: '発注', idColumn: '発注ID', displayColumns: ['発注ID', '発注先業者名', '工種', '削除日時', '削除者'] },
        { name: '請求管理', label: '請求', idColumn: '請求ID', displayColumns: ['請求ID', '案件ID', '請求金額', '削除日時', '削除者'] },
        { name: '支払管理', label: '支払', idColumn: '支払ID', displayColumns: ['支払ID', '発注ID', '支払金額', '削除日時', '削除者'] },
        { name: '実行予算', label: '実行予算', idColumn: '予算ID', displayColumns: ['予算ID', '案件ID', '工種', '削除日時', '削除者'] }
      ]
    };
  },

  computed: {
    currentSheetConfig() {
      if (!this.selectedSheet) return null;
      return this.sheetConfigs.find(c => c.name === this.selectedSheet);
    },
    isAdmin() {
      return this.currentUser?.role === 'admin';
    }
  },

  async created() {
    await this.loadSummary();
  },

  methods: {
    async loadSummary() {
      this.isLoadingSummary = true;
      try {
        const result = await GasApi.getArchivedDataSummary();
        if (result.success) {
          this.summary = result;
        }
      } catch (e) {
        console.error('サマリー取得エラー:', e);
      } finally {
        this.isLoadingSummary = false;
      }
    },
    async selectSheet(sheetName) {
      this.selectedSheet = sheetName;
      this.isLoadingData = true;
      try {
        this.archivedData = await GasApi.getArchivedData(sheetName);
      } catch (e) {
        console.error('削除済みデータ取得エラー:', e);
        this.archivedData = [];
      } finally {
        this.isLoadingData = false;
      }
    },
    backToList() {
      this.selectedSheet = null;
      this.archivedData = [];
    },
    confirmRestore(item) {
      this.confirmModal = { show: true, type: 'restore', item: item };
    },
    confirmDelete(item) {
      this.confirmModal = { show: true, type: 'delete', item: item };
    },
    closeConfirmModal() {
      this.confirmModal = { show: false, type: '', item: null };
    },
    async executeAction() {
      const { type, item } = this.confirmModal;
      const config = this.currentSheetConfig;
      if (!config || !item) return;
      const idValue = item[config.idColumn];
      try {
        if (type === 'restore') {
          const result = await GasApi.restoreArchivedData(config.name, config.idColumn, idValue);
          if (result.success) {
            this.$emit('show-toast', 'データを復元しました', 'success');
            await this.selectSheet(this.selectedSheet);
            await this.loadSummary();
          } else {
            this.$emit('show-toast', result.error || '復元に失敗しました', 'error');
          }
        } else if (type === 'delete') {
          const result = await GasApi.permanentDelete(config.name, config.idColumn, idValue);
          if (result.success) {
            this.$emit('show-toast', 'データを完全に削除しました', 'success');
            await this.selectSheet(this.selectedSheet);
            await this.loadSummary();
          } else {
            this.$emit('show-toast', result.error || '削除に失敗しました', 'error');
          }
        }
      } catch (e) {
        console.error('アクションエラー:', e);
        this.$emit('show-toast', '処理に失敗しました', 'error');
      } finally {
        this.closeConfirmModal();
      }
    },
    getColumnValue(item, column) {
      return item[column] || '-';
    },
    getSheetCount(sheetName) {
      if (!this.summary?.summary) return 0;
      const sheet = this.summary.summary.find(s => s.sheetName === sheetName);
      return sheet ? sheet.count : 0;
    }
  },

  template: `
    <div class="archive-list">
      <div class="page-header">
        <h2>アーカイブ（削除済みデータ）</h2>
        <p class="page-description" style="color: var(--text-secondary); font-size: 14px;">削除されたデータを確認・復元できます</p>
      </div>
      <div v-if="!selectedSheet">
        <div v-if="isLoadingSummary" style="text-align: center; padding: 40px; color: var(--text-muted);">読み込み中...</div>
        <div v-else>
          <div class="card" style="text-align: center; padding: 24px; margin-bottom: 24px;">
            <div style="font-size: 48px; font-weight: 700; color: var(--primary-color);">{{ summary?.totalCount || 0 }}</div>
            <div style="font-size: 14px; color: var(--text-secondary);">件の削除済みデータ</div>
          </div>
          <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
            <div v-for="config in sheetConfigs" :key="config.name" class="card" @click="selectSheet(config.name)" style="cursor: pointer; text-align: center; padding: 20px; transition: all 0.15s ease;" :style="getSheetCount(config.name) > 0 ? 'border-left: 4px solid var(--warning-color);' : ''">
              <div style="font-size: 32px; margin-bottom: 8px;">📁</div>
              <div style="font-weight: 500; margin-bottom: 4px;">{{ config.label }}</div>
              <div :style="getSheetCount(config.name) > 0 ? 'color: var(--warning-color); font-weight: 500;' : 'color: var(--text-secondary);'" style="font-size: 14px;">{{ getSheetCount(config.name) }}件</div>
            </div>
          </div>
        </div>
      </div>
      <div v-else>
        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 16px;">
          <button @click="backToList" class="btn btn-secondary">← 戻る</button>
          <h3 style="margin: 0; font-size: 18px; font-weight: 500;">{{ currentSheetConfig?.label }}の削除済みデータ</h3>
        </div>
        <div class="card">
          <div class="card-body" style="padding: 0;">
            <table class="list-table">
              <thead>
                <tr>
                  <th v-for="col in currentSheetConfig?.displayColumns" :key="col">{{ col }}</th>
                  <th style="width: 150px;">操作</th>
                </tr>
              </thead>
              <tbody>
                <tr v-if="isLoadingData">
                  <td :colspan="(currentSheetConfig?.displayColumns?.length || 0) + 1" style="text-align: center; padding: 40px;">読み込み中...</td>
                </tr>
                <tr v-else-if="archivedData.length === 0">
                  <td :colspan="(currentSheetConfig?.displayColumns?.length || 0) + 1" style="text-align: center; padding: 40px; color: var(--text-muted);">削除済みデータはありません</td>
                </tr>
                <tr v-for="item in archivedData" :key="item[currentSheetConfig?.idColumn]">
                  <td v-for="col in currentSheetConfig?.displayColumns" :key="col">{{ getColumnValue(item, col) }}</td>
                  <td>
                    <div style="display: flex; gap: 8px;">
                      <button @click="confirmRestore(item)" class="btn btn-primary" style="padding: 4px 12px; font-size: 12px;">復元</button>
                      <button v-if="isAdmin" @click="confirmDelete(item)" class="btn btn-danger" style="padding: 4px 12px; font-size: 12px;">削除</button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div v-if="confirmModal.show" class="modal-overlay" @click.self="closeConfirmModal">
        <div class="modal-content" style="max-width: 400px;">
          <div class="modal-header">
            <h3 class="modal-title">{{ confirmModal.type === 'restore' ? '復元の確認' : '完全削除の確認' }}</h3>
            <button class="modal-close" @click="closeConfirmModal">&times;</button>
          </div>
          <div class="modal-body">
            <p v-if="confirmModal.type === 'restore'">このデータを復元しますか？<br>復元後は通常のデータとして表示されます。</p>
            <p v-else style="color: var(--danger-color);"><strong>警告:</strong> このデータを完全に削除しますか？<br>この操作は取り消せません。</p>
            <div v-if="confirmModal.item" style="background: var(--bg-secondary); padding: 12px; border-radius: 4px; margin-top: 12px;">
              <div><strong>ID:</strong> {{ confirmModal.item[currentSheetConfig?.idColumn] }}</div>
            </div>
          </div>
          <div class="modal-footer">
            <button @click="closeConfirmModal" class="btn btn-secondary">キャンセル</button>
            <button @click="executeAction" :class="['btn', confirmModal.type === 'restore' ? 'btn-primary' : 'btn-danger']">
              {{ confirmModal.type === 'restore' ? '復元する' : '完全に削除する' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  `
};
</script>
<script>
/**
 * DataImporter - データインポートコンポーネント
 * CSV/Excelファイルの読み込み、マッピング、バリデーション、インポート実行を提供
 */
const DataImporter = {
  name: 'DataImporter',

  props: {
    currentUser: {
      type: Object,
      default: () => ({})
    }
  },

  emits: ['show-toast'],

  data() {
    return {
      // ステップ管理
      currentStep: 1,
      steps: [
        { id: 1, label: 'ファイル選択', icon: '📁' },
        { id: 2, label: 'プレビュー', icon: '👁️' },
        { id: 3, label: 'マッピング', icon: '🔗' },
        { id: 4, label: 'バリデーション', icon: '✅' },
        { id: 5, label: '実行', icon: '🚀' }
      ],

      // シート選択
      importableSheets: [],
      selectedSheet: '',
      sheetColumns: [],

      // ファイル読み込み
      selectedFile: null,
      parsedData: null,

      // マッピング
      columnMapping: {},

      // バリデーション
      validationResult: null,
      isValidating: false,

      // インポート実行
      isImporting: false,
      importResult: null,

      // ローディング
      isLoading: false
    };
  },

  computed: {
    /**
     * 次へボタンを有効にするか
     */
    canGoNext() {
      switch (this.currentStep) {
        case 1:
          return this.selectedSheet && this.selectedFile;
        case 2:
          return this.parsedData && this.parsedData.rows && this.parsedData.rows.length > 0;
        case 3:
          return Object.keys(this.columnMapping).some(k => this.columnMapping[k]);
        case 4:
          return this.validationResult && this.validationResult.valid;
        default:
          return false;
      }
    },

    /**
     * プレビュー表示用の最初の10行
     */
    previewRows() {
      if (!this.parsedData || !this.parsedData.rows) return [];
      return this.parsedData.rows.slice(0, 10);
    }
  },

  async created() {
    await this.loadImportableSheets();
  },

  methods: {
    /**
     * インポート可能なシート一覧を読み込み
     */
    async loadImportableSheets() {
      try {
        const result = await GasApi.getImportableSheets();
        console.log('[DataImporter] getImportableSheets result:', result);
        if (Array.isArray(result)) {
          this.importableSheets = result;
        } else if (result && Array.isArray(result.sheets)) {
          this.importableSheets = result.sheets;
        } else {
          console.warn('[DataImporter] 予期しないレスポンス形式:', typeof result);
          this.importableSheets = [];
        }
      } catch (e) {
        console.error('シート一覧取得エラー:', e);
        this.importableSheets = [];
      }
    },

    /**
     * シート選択時の処理
     */
    async onSheetSelect() {
      if (!this.selectedSheet) {
        this.sheetColumns = [];
        return;
      }

      this.isLoading = true;
      try {
        const result = await GasApi.getSheetColumns(this.selectedSheet);
        if (result.success) {
          this.sheetColumns = result.columns;
        }
      } catch (e) {
        console.error('カラム取得エラー:', e);
      } finally {
        this.isLoading = false;
      }
    },

    /**
     * ファイル選択ハンドラ
     */
    onFileSelect(event) {
      const file = event.target.files[0];
      if (file) {
        this.selectedFile = file;
        this.parsedData = null;
      }
    },

    /**
     * 次のステップへ
     */
    async nextStep() {
      if (this.currentStep === 1) {
        // ファイル解析
        await this.parseFile();
      } else if (this.currentStep === 3) {
        // バリデーション実行
        await this.validate();
      } else if (this.currentStep === 4) {
        // インポート実行
        await this.executeImport();
      }

      if (this.currentStep < 5) {
        this.currentStep++;
      }
    },

    /**
     * 前のステップへ
     */
    prevStep() {
      if (this.currentStep > 1) {
        this.currentStep--;
      }
    },

    /**
     * ファイルを解析
     */
    async parseFile() {
      if (!this.selectedFile) return;

      this.isLoading = true;
      try {
        const content = await this.readFileAsText(this.selectedFile);
        const result = await GasApi.parseImportData(content);

        if (result.success) {
          this.parsedData = result;

          // 自動マッピングを試みる
          this.autoMapping();
        } else {
          this.$emit('show-toast', result.error || 'ファイルの解析に失敗しました', 'error');
        }
      } catch (e) {
        console.error('ファイル解析エラー:', e);
        this.$emit('show-toast', 'ファイルの読み込みに失敗しました', 'error');
      } finally {
        this.isLoading = false;
      }
    },

    /**
     * ファイルをテキストとして読み込み
     */
    readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsText(file, 'UTF-8');
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    },

    /**
     * 自動マッピングを試みる
     */
    autoMapping() {
      if (!this.parsedData || !this.parsedData.headers) return;

      this.columnMapping = {};

      this.parsedData.headers.forEach(csvCol => {
        // 完全一致
        if (this.sheetColumns.includes(csvCol)) {
          this.columnMapping[csvCol] = csvCol;
        }
      });
    },

    /**
     * バリデーション実行
     */
    async validate() {
      this.isValidating = true;
      try {
        const result = await GasApi.validateImportData(
          this.selectedSheet,
          this.parsedData.rows,
          this.columnMapping
        );

        this.validationResult = result;
      } catch (e) {
        console.error('バリデーションエラー:', e);
        this.$emit('show-toast', 'バリデーションに失敗しました', 'error');
      } finally {
        this.isValidating = false;
      }
    },

    /**
     * インポート実行
     */
    async executeImport() {
      this.isImporting = true;
      try {
        const result = await GasApi.executeImport(
          this.selectedSheet,
          this.parsedData.rows,
          this.columnMapping,
          {}
        );

        this.importResult = result;

        if (result.success) {
          this.$emit('show-toast', `インポートが完了しました（新規: ${result.insertedCount}件、更新: ${result.updatedCount}件）`, 'success');
        } else {
          this.$emit('show-toast', result.error || 'インポートに失敗しました', 'error');
        }
      } catch (e) {
        console.error('インポートエラー:', e);
        this.$emit('show-toast', 'インポートに失敗しました', 'error');
      } finally {
        this.isImporting = false;
      }
    },

    /**
     * 最初からやり直す
     */
    reset() {
      this.currentStep = 1;
      this.selectedSheet = '';
      this.sheetColumns = [];
      this.selectedFile = null;
      this.parsedData = null;
      this.columnMapping = {};
      this.validationResult = null;
      this.importResult = null;
    }
  },

  template: `
    <div class="data-importer">
      <div class="page-header">
        <h2>データインポート</h2>
        <p class="page-description" style="color: var(--text-secondary); font-size: 14px;">CSVファイルからデータを一括インポートします</p>
      </div>

      <!-- ステップインジケーター -->
      <div class="step-indicator">
        <div
          v-for="step in steps"
          :key="step.id"
          :class="['step-item', { active: currentStep === step.id, completed: currentStep > step.id }]"
        >
          <div class="step-icon">{{ step.icon }}</div>
          <div class="step-label">{{ step.label }}</div>
        </div>
      </div>

      <!-- ステップ1: ファイル選択 -->
      <div v-if="currentStep === 1" class="step-content card">
        <div class="card-header">
          <span class="card-title">ステップ1: インポート先とファイルを選択</span>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label required">インポート先シート</label>
            <select v-model="selectedSheet" @change="onSheetSelect" class="form-control">
              <option value="">選択してください</option>
              <option v-for="sheet in importableSheets" :key="sheet.name" :value="sheet.name">
                {{ sheet.name }}
              </option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label required">CSVファイル</label>
            <input type="file" @change="onFileSelect" accept=".csv" class="form-control" />
            <p style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">
              UTF-8エンコードのCSVファイルを選択してください
            </p>
          </div>
        </div>
      </div>

      <!-- ステップ2: プレビュー -->
      <div v-if="currentStep === 2" class="step-content card">
        <div class="card-header">
          <span class="card-title">ステップ2: データプレビュー</span>
        </div>
        <div class="card-body">
          <div v-if="isLoading" style="text-align: center; padding: 40px;">
            解析中...
          </div>
          <div v-else-if="parsedData">
            <p style="margin-bottom: 16px;">
              <strong>{{ parsedData.rowCount }}件</strong>のデータが読み込まれました（最初の10件を表示）
            </p>
            <div style="overflow-x: auto;">
              <table class="list-table" style="font-size: 12px;">
                <thead>
                  <tr>
                    <th v-for="header in parsedData.headers" :key="header">{{ header }}</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="(row, index) in previewRows" :key="index">
                    <td v-for="header in parsedData.headers" :key="header">{{ row[header] }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

      <!-- ステップ3: マッピング -->
      <div v-if="currentStep === 3" class="step-content card">
        <div class="card-header">
          <span class="card-title">ステップ3: カラムマッピング</span>
        </div>
        <div class="card-body">
          <p style="margin-bottom: 16px;">CSVのカラムをシートのカラムに対応付けてください</p>
          <table class="list-table">
            <thead>
              <tr>
                <th>CSVカラム</th>
                <th>→</th>
                <th>シートカラム</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="header in parsedData?.headers" :key="header">
                <td>{{ header }}</td>
                <td style="text-align: center;">→</td>
                <td>
                  <select v-model="columnMapping[header]" class="form-control">
                    <option value="">（マッピングしない）</option>
                    <option v-for="col in sheetColumns" :key="col" :value="col">{{ col }}</option>
                  </select>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ステップ4: バリデーション -->
      <div v-if="currentStep === 4" class="step-content card">
        <div class="card-header">
          <span class="card-title">ステップ4: バリデーション結果</span>
        </div>
        <div class="card-body">
          <div v-if="isValidating" style="text-align: center; padding: 40px;">
            検証中...
          </div>
          <div v-else-if="validationResult">
            <div v-if="validationResult.valid" class="validation-success">
              <span style="font-size: 48px;">✅</span>
              <h3>バリデーション成功</h3>
              <p>すべてのデータが正常です。インポートを実行できます。</p>
            </div>
            <div v-else class="validation-error">
              <span style="font-size: 48px;">❌</span>
              <h3>バリデーションエラー</h3>
              <p>{{ validationResult.errorCount }}件のエラーがあります</p>
              <div style="max-height: 300px; overflow-y: auto; margin-top: 16px;">
                <table class="list-table" style="font-size: 12px;">
                  <thead>
                    <tr><th>行</th><th>カラム</th><th>エラー内容</th></tr>
                  </thead>
                  <tbody>
                    <tr v-for="(error, index) in validationResult.errors.slice(0, 50)" :key="index">
                      <td>{{ error.row }}</td>
                      <td>{{ error.column || '-' }}</td>
                      <td>{{ error.message }}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ステップ5: 実行結果 -->
      <div v-if="currentStep === 5" class="step-content card">
        <div class="card-header">
          <span class="card-title">ステップ5: インポート結果</span>
        </div>
        <div class="card-body">
          <div v-if="isImporting" style="text-align: center; padding: 40px;">
            インポート実行中...
          </div>
          <div v-else-if="importResult">
            <div v-if="importResult.success" class="import-success">
              <span style="font-size: 48px;">🎉</span>
              <h3>インポート完了</h3>
              <div class="result-stats">
                <div class="stat-item">
                  <div class="stat-number" style="color: var(--success-color);">{{ importResult.insertedCount }}</div>
                  <div class="stat-label">件 新規登録</div>
                </div>
                <div class="stat-item">
                  <div class="stat-number" style="color: var(--primary-color);">{{ importResult.updatedCount }}</div>
                  <div class="stat-label">件 更新</div>
                </div>
                <div class="stat-item" v-if="importResult.skippedCount > 0">
                  <div class="stat-number" style="color: var(--warning-color);">{{ importResult.skippedCount }}</div>
                  <div class="stat-label">件 スキップ</div>
                </div>
              </div>
            </div>
            <div v-else class="import-error">
              <span style="font-size: 48px;">❌</span>
              <h3>インポート失敗</h3>
              <p>{{ importResult.error }}</p>
            </div>
          </div>
        </div>
      </div>

      <!-- ナビゲーションボタン -->
      <div class="step-navigation">
        <button v-if="currentStep > 1 && currentStep < 5" @click="prevStep" class="btn btn-secondary">
          ← 戻る
        </button>
        <div style="flex: 1;"></div>
        <button v-if="currentStep < 5" @click="nextStep" :disabled="!canGoNext || isLoading || isValidating" class="btn btn-primary">
          {{ currentStep === 4 ? 'インポート実行' : '次へ →' }}
        </button>
        <button v-if="currentStep === 5" @click="reset" class="btn btn-primary">
          新規インポート
        </button>
      </div>
    </div>
  `
};
</script>
<style>
