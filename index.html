                    <div class="rf-label">技術者資格条件 詳細</div>
                    <div class="rf-value">{{ contractModalData.technicianConditionDetail || '-' }}</div>
                  </div>
                  <div class="readonly-field">
                    <div class="rf-label">資金調達方法</div>
                    <div class="rf-value">{{ contractModalData.fundingMethod || '-' }}</div>
                  </div>
                  <div v-if="contractModalData.fundingMethodLoan" class="readonly-field">
                    <div class="rf-label">融資詳細</div>
                    <div class="rf-value">{{ contractModalData.fundingMethodLoan }}</div>
                  </div>
                  <div class="readonly-field">
                    <div class="rf-label">履行保証</div>
                    <div class="rf-value">{{ contractModalData.performanceGuaranteeExists ? 'あり' : 'なし' }}</div>
                  </div>
                  <div v-if="contractModalData.performanceGuaranteeExists" class="readonly-field">
                    <div class="rf-label">履行保証 詳細</div>
                    <div class="rf-value">{{ contractModalData.performanceGuaranteeDetail || '-' }}</div>
                  </div>
                  <div class="readonly-field">
                    <div class="rf-label">完成保証人</div>
                    <div class="rf-value">{{ contractModalData.completionGuarantorExists ? 'あり' : 'なし' }}</div>
                  </div>
                  <div v-if="contractModalData.completionGuarantorExists" class="readonly-field">
                    <div class="rf-label">完成保証人 詳細</div>
                    <div class="rf-value">{{ contractModalData.completionGuarantorDetail || '-' }}</div>
                  </div>
                </div>
              </div>

              <!-- 入金条件タブ -->
              <div v-if="contractModalTab === 'payment'">
                <table class="list-table" style="font-size: 13px; margin-bottom: 20px;">
                  <thead>
                    <tr>
                      <th style="width: 100px;">時期</th>
                      <th>入金タイミング</th>
                      <th style="text-align: right; width: 160px;">入金金額</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td style="font-weight: 600;">着工時</td>
                      <td>{{ contractModalData.paymentTimingStart || '-' }}</td>
                      <td style="text-align: right;">{{ formatCurrency(contractModalData.paymentAmountStart) }}</td>
                    </tr>
                    <tr>
                      <td style="font-weight: 600;">中間時</td>
                      <td>{{ contractModalData.paymentTimingMiddle || '-' }}</td>
                      <td style="text-align: right;">{{ formatCurrency(contractModalData.paymentAmountMiddle) }}</td>
                    </tr>
                    <tr>
                      <td style="font-weight: 600;">竣工時</td>
                      <td>{{ contractModalData.paymentTimingEnd || '-' }}</td>
                      <td style="text-align: right;">{{ formatCurrency(contractModalData.paymentAmountEnd) }}</td>
                    </tr>
                  </tbody>
                </table>
                <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 12px;">支払方法</h4>
                <div class="contract-readonly-grid">
                  <div class="readonly-field">
                    <div class="rf-label">現金</div>
                    <div class="rf-value">{{ contractModalData.paymentMethodCash }}%</div>
                  </div>
                  <div class="readonly-field">
                    <div class="rf-label">手形</div>
                    <div class="rf-value">{{ contractModalData.paymentMethodNote }}%</div>
                  </div>
                  <div class="readonly-field">
                    <div class="rf-label">サイト</div>
                    <div class="rf-value">{{ contractModalData.paymentMethodSite || '-' }}</div>
                  </div>
                </div>
              </div>

              <!-- 添付書類タブ -->
              <div v-if="contractModalTab === 'attachment'">
                <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 12px;">添付チェックリスト</h4>
                <div class="contract-readonly-grid" style="grid-template-columns: 1fr 1fr 1fr;">
                  <div class="readonly-field" v-for="item in [
                    {label: '契約書（写）', val: contractModalData.hasContractCopy},
                    {label: '設計図書', val: contractModalData.hasDesignDoc},
                    {label: '仕様書', val: contractModalData.hasSpecDoc},
                    {label: '見積書', val: contractModalData.hasEstimate},
                    {label: '打合せ記録', val: contractModalData.hasMeetingRecord},
                    {label: '現場説明書', val: contractModalData.hasSiteExplanation},
                    {label: '現場写真', val: contractModalData.hasSitePhoto},
                    {label: '図面', val: contractModalData.hasDrawing}
                  ]" :key="item.label">
                    <div class="rf-value" :style="{color: item.val ? '#188038' : '#999'}">
                      {{ item.val ? '✓' : '—' }} {{ item.label }}
                    </div>
                  </div>
                </div>
                <div v-if="contractModalData.attachDrawing || contractModalData.attachEstimate || contractModalData.attachContract" style="margin-top: 20px;">
                  <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 12px;">添付ファイルパス</h4>
                  <div class="contract-readonly-grid">
                    <div v-if="contractModalData.attachDrawing" class="readonly-field">
                      <div class="rf-label">図面</div>
                      <div class="rf-value" style="word-break: break-all;">{{ contractModalData.attachDrawing }}</div>
                    </div>
                    <div v-if="contractModalData.attachEstimate" class="readonly-field">
                      <div class="rf-label">見積書</div>
                      <div class="rf-value" style="word-break: break-all;">{{ contractModalData.attachEstimate }}</div>
                    </div>
                    <div v-if="contractModalData.attachContract" class="readonly-field">
                      <div class="rf-label">契約書</div>
                      <div class="rf-value" style="word-break: break-all;">{{ contractModalData.attachContract }}</div>
                    </div>
                  </div>
                </div>
                <div v-if="contractModalData.outputPath" style="margin-top: 20px;">
                  <div class="readonly-field">
                    <div class="rf-label">契約協議書（ソリューション）パス</div>
                    <div class="rf-value" style="word-break: break-all;">{{ contractModalData.outputPath }}</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="modal-footer">
              <button class="btn btn-secondary" @click="closeContractModal">閉じる</button>
            </div>
          </template>
        </div>
      </div>

      <!-- 工事編集モーダル（12カラム全対応） -->
      <div v-if="showConstructionModal" class="modal-overlay" @click.self="closeConstructionModal">
        <div class="modal-container" style="max-width: 900px; width: 90%;">
          <div class="modal-header">
            <h3 class="modal-title">{{ editingConstruction ? '工事を編集' : '工事を追加' }}</h3>
            <button class="modal-close" @click="closeConstructionModal">&times;</button>
          </div>
          <div class="modal-body">
            <!-- 基本情報 -->
            <div class="section" style="margin-bottom: 24px;">
              <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e0e0e0;">基本情報</h4>
              <div class="form-grid-3">
                <div class="form-group">
                  <label class="form-label">工事番号</label>
                  <input type="text" :value="constructionForm.constructionId || '（自動採番）'" class="form-control" disabled style="background-color: #f5f5f5; color: #666;" />
                </div>
                <div class="form-group" style="grid-column: 2 / -1;">
                  <label class="form-label required">工事名</label>
                  <input type="text" v-model="constructionForm.constructionName" class="form-control" placeholder="例: ○○ビル電気設備工事" :readonly="!!editingConstruction" :style="editingConstruction ? 'background-color: #f5f5f5; color: #666;' : ''" />
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                  <label class="form-label">工種・工事範囲</label>
                  <input type="text" v-model="constructionForm.workType" class="form-control" placeholder="例: 電気設備工事一式" :readonly="!!editingConstruction" :style="editingConstruction ? 'background-color: #f5f5f5; color: #666;' : ''" />
                </div>
              </div>
            </div>

            <!-- 担当者・日付 -->
            <div class="section" style="margin-bottom: 24px;">
              <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e0e0e0;">担当者・日付</h4>
              <div class="form-grid-3">
                <div class="form-group" style="position: relative;">
                  <label class="form-label">工事担当社員</label>
                  <input
                    type="text"
                    v-model="managerSearch"
                    @input="onManagerInput"
                    @focus="onManagerFocus"
                    @blur="onManagerBlur"
                    class="form-control"
                    placeholder="社員名を入力して検索"
                    autocomplete="off"
                  />
                  <ul v-if="showManagerSuggestions && filteredManagerEmployees.length > 0" class="suggestion-list">
                    <li v-for="emp in filteredManagerEmployees" :key="emp.employeeId" @mousedown="selectManager(emp)" class="suggestion-item">
                      <strong>{{ emp.employeeName }}</strong>
                      <span class="text-muted" style="margin-left: 8px; font-size: 12px;">{{ emp.department || '' }}</span>
                    </li>
                  </ul>
                </div>
                <div class="form-group" style="position: relative;">
                  <label class="form-label">営業担当社員</label>
                  <input
                    type="text"
                    v-model="salesPersonSearch"
                    @input="onSalesPersonInput"
                    @focus="onSalesPersonFocus"
                    @blur="onSalesPersonBlur"
                    class="form-control"
                    placeholder="社員名を入力して検索"
                    autocomplete="off"
                  />
                  <ul v-if="showSalesPersonSuggestions && filteredSalesPersonEmployees.length > 0" class="suggestion-list">
                    <li v-for="emp in filteredSalesPersonEmployees" :key="emp.employeeId" @mousedown="selectSalesPerson(emp)" class="suggestion-item">
                      <strong>{{ emp.employeeName }}</strong>
                      <span class="text-muted" style="margin-left: 8px; font-size: 12px;">{{ emp.department || '' }}</span>
                    </li>
                  </ul>
                </div>
                <div class="form-group">
                  <label class="form-label">記録日</label>
                  <input type="date" v-model="constructionForm.recordDate" class="form-control" />
                </div>
              </div>
            </div>

            <!-- 工期 -->
            <div class="section" style="margin-bottom: 24px;">
              <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e0e0e0;">工期・進捗</h4>
              <div class="form-grid-3">
                <div class="form-group">
                  <label class="form-label">工期始</label>
                  <input type="date" v-model="constructionForm.startDate" class="form-control" />
                </div>
                <div class="form-group">
                  <label class="form-label">工期終</label>
                  <input type="date" v-model="constructionForm.endDate" class="form-control" />
                </div>
                <div class="form-group">
                  <label class="form-label">進捗ステータス</label>
                  <select v-model="constructionForm.status" class="form-control">
                    <option v-for="opt in constructionStatusOptions" :key="opt" :value="opt">{{ opt }}</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- 注文協議書 -->
            <div class="section">
              <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #e0e0e0;">作業所注文協議書</h4>
              <div class="form-grid-2">
                <div class="form-group">
                  <label class="form-label">作業所注文協議書ＮＯ．</label>
                  <input type="text" v-model="constructionForm.orderAgreementNo" class="form-control" placeholder="例: AG-2024-0001" />
                </div>
                <div class="form-group">
                  <label class="form-label">提出日</label>
                  <input type="date" v-model="constructionForm.submissionDate" class="form-control" />
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" @click="closeConstructionModal">キャンセル</button>
            <button class="btn btn-primary" @click="saveConstruction">
              {{ editingConstruction ? '更新' : '登録' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  `
};
</script>
<script>
/**
 * ContractForm - 契約協議書入力画面
 *
 * スプレッドシート「契約協議書」シートの56列に対応
 * タブ構成: 基本情報 / 金額詳細 / 入金条件 / 工期・条件 / 添付書類 / 承認
 */
const ContractForm = {
  name: 'ContractForm',

  props: {
    contract: {
      type: Object,
      default: null
    },
    customers: {
      type: Array,
      default: () => []
    },
    employees: {
      type: Array,
      default: () => []
    },
    currentUser: {
      type: Object,
      default: () => ({})
    },
    allContracts: {
      type: Array,
      default: () => []
    }
  },

  emits: ['save', 'back', 'delete', 'export-excel', 'export-excel-small', 'export-pdf', 'show-toast', 'copy-contract'],

  data() {
    return {
      activeTab: 'basic',
      tabs: [
        { id: 'basic', label: '基本情報' },
        { id: 'amount', label: '金額詳細' },
        { id: 'terms', label: '工期・条件' },
        { id: 'payment', label: '入金条件' },
        { id: 'attachments', label: '添付書類' }
      ],

      // スプレッドシート56列対応フォームデータ
      form: {
        // === 基本情報 ===
        contractId: '',           // 協議書ID
        createdDate: '',          // 作成日
        contractDate: '',         // 契約協議書日付
        constructionCategory: '', // 工事区分
        category: '',             // 区分
        creator: '',              // 作成者
        contractRequired: '',     // 契約書（要/不要）
        customerContact: '',      // お客様のご担当者（自由テキスト）
        salesManager: '',         // 営業担当者
        constructionManager: '',  // 工事担当者
        designManager: '',        // 設計担当者
        projectName: '',          // 工事名
        location: '',             // 工事場所
        constructionOverview: '', // 工事概要
        customerRequirements: '', // 顧客要求事項・現場特有の環境側面等
        customer: '',             // 発注者（表示用）
        customerId: '',           // 発注者ID（保存用）
        customerPhone: '',        // 電話番号

        // === 追加工事関連 ===
        relatedOriginalContractId: '',  // 関連元協議書ID
        existingContractAmount: 0,      // 既契約金額（税込）

        // === 金額詳細 ===
        submittedEstimateAmount: 0, // 提出見積金額
        priceDecisionDate: '',    // 金額決定日
        settlementCategory: '',   // 精算カテゴリー
        constructionPrice: 0,     // 工事価格
        consumptionTax: 0,        // 消費税
        contractAmount: 0,        // 契約金額
        netDirectCost: 0,         // NET_直接原価
        netGrossProfit: 0,        // NET_粗付加金額

        // === 入金条件（9項目）===
        paymentTimingStart: '',   // 入金時期_着工時
        paymentAmountStart: 0,    // 入金金額_着工時
        paymentTimingMiddle: '',  // 入金時期_中間時
        paymentAmountMiddle: 0,   // 入金金額_中間時
        paymentTimingEnd: '',     // 入金時期_竣工時
        paymentAmountEnd: 0,      // 入金金額_竣工時
        paymentMethodCash: '',    // 入金方法_現金（%）
        paymentMethodNote: '',    // 入金方法_手形（%）
        paymentMethodSite: '',    // 入金方法_サイト

        // === 工期・条件 ===
        periodUndetermined: false, // 工期未定
        expectedCompletionDate: '', // 履行（予定）日/頃
        periodStart: '',          // 工期_開始
        periodEnd: '',            // 工期_終了
        separateOrderExists: false,    // 別途発注工事の有無
        separateOrderDetail: '',       // 別途発注工事_詳細
        ceremonyExists: false,         // 式典の有無
        technicianConditionExists: false, // 技術者資格条件の有無
        technicianConditionDetail: '',    // 技術者資格条件_詳細
        fundingMethod: '',             // 資金調達方法
        fundingMethodLoan: '',         // 資金調達方法_融資
        performanceGuaranteeExists: false, // 履行保証の有無
        performanceGuaranteeDetail: '',    // 履行保証_詳細
        completionGuarantorExists: false,  // 完成保証人の有無
        completionGuarantorDetail: '',     // 完成保証人_詳細

        // === 添付書類（12項目）===
        hasContractCopy: false,   // 契約書(写)の有無
        hasDesignDoc: false,      // 設計図書の有無
        hasSpecDoc: false,        // 仕様書の有無
        hasEstimate: false,       // 見積書の有無
        hasMeetingRecord: false,  // 打合せ記録の有無
        hasSiteExplanation: false, // 現場説明書の有無
        hasSitePhoto: false,      // 現場写真の有無
        hasDrawing: false,        // 図面の有無
        attachDrawing: '',        // 添付_図面
        attachEstimate: '',       // 添付_見積書
        attachContract: '',       // 添付_契約書

        // === 承認・備考（6項目）===
        remarks: '',              // 備考
        approvalStatus: '作成中', // 承認ステータス
        approver: '',             // 承認者
        approvalDate: '',         // 承認日
        comment: '',              // コメント
        outputTrigger: '',        // 出力トリガー
        outputPath: ''            // 契約協議書(ソリューション)パス
      },

      // 営業担当者オートコンプリート用
      salesManagerSearch: '',
      showSalesManagerSuggestions: false,
      // 工事担当者オートコンプリート用
      constructionManagerSearch: '',
      showConstructionManagerSuggestions: false,
      // 設計担当者オートコンプリート用
      designManagerSearch: '',
      showDesignManagerSuggestions: false,

      // 粗利入力方式: 'amount'(粗利額入力) or 'rate'(粗利率入力)
      grossProfitInputMode: 'amount',
      grossProfitRateInput: 0,

      // 顧客サジェスト用
      customerSearchKeyword: '',
      customerSuggestions: [],
      showCustomerSuggestions: false,
      isSearchingCustomers: false,

      // 工事区分選択肢
      constructionCategoryOptions: ['官庁建築', '官庁役務', '下請工事', '建築工事', '土木工事'],

      // 区分選択肢
      categoryOptions: ['新規', '追加', '変更', 'その他'],

      // 精算カテゴリー選択肢
      settlementOptions: ['精算', '未定', '契約'],

      // 承認ステータス選択肢
      approvalStatusOptions: ['作成中', '承認待ち', '承認済', '差戻し', '却下'],

      // DB保存済みの承認ステータス（編集ロック判定用）
      originalApprovalStatus: ''
    };
  },

  computed: {
    /**
     * 承認済みかどうか（DB保存済みの承認ステータスで判定し、今回承認済にする操作は許可する）
     */
    isApproved() {
      return this.originalApprovalStatus === '承認済';
    },

    /**
     * 消費税自動計算（10%）
     */
    calculatedTax() {
      return Math.floor(this.form.constructionPrice * 0.1);
    },

    /**
     * 契約金額自動計算（税込）
     */
    calculatedContractAmount() {
      return this.form.constructionPrice + this.calculatedTax;
    },

    /**
     * 粗利額（入力モードによらず常に計算）
     * 粗利額入力モード: form.netGrossProfit をそのまま使用
     * 粗利率入力モード: 工事価格 × 粗利率 / 100
     */
    calculatedGrossProfit() {
      if (this.grossProfitInputMode === 'rate') {
        return Math.round(this.form.constructionPrice * (this.grossProfitRateInput / 100));
      }
      return this.form.netGrossProfit;
    },

    /**
     * 粗利率（入力モードによらず常に計算）
     */
    grossProfitRate() {
      if (this.grossProfitInputMode === 'rate') {
        return this.grossProfitRateInput;
      }
      if (this.form.constructionPrice === 0) return 0;
      return ((this.form.netGrossProfit / this.form.constructionPrice) * 100).toFixed(1);
    },

    /**
     * NET直接原価を粗利から逆算
     */
    calculatedDirectCost() {
      return this.form.constructionPrice - this.calculatedGrossProfit;
    },

    /**
     * 入金合計
     */
    totalPaymentAmount() {
      return (this.form.paymentAmountStart || 0) +
             (this.form.paymentAmountMiddle || 0) +
             (this.form.paymentAmountEnd || 0);
    },

    /**
     * 入金合計と契約金額の不一致チェック
     */
    paymentAmountMismatch() {
      return this.totalPaymentAmount > 0 &&
             this.calculatedContractAmount > 0 &&
             this.totalPaymentAmount !== this.calculatedContractAmount;
    },

    /**
     * 編集モードか新規モードか
     */
    isEditMode() {
      return !!this.form.contractId;
    },

    /**
     * 区分が「追加」かどうか
     */
    isAdditionalWork() {
      return this.form.category === '追加';
    },

    /**
     * 元契約として選択可能な承認済み契約一覧（自分自身は除外）
     */
    approvedContractOptions() {
      return this.allContracts.filter(c =>
        c.status === '承認済' && c.contractId !== this.form.contractId
      );
    },

    /**
     * 追加工事時の合計契約金額（既契約 + 今回）
     */
    totalContractAmount() {
      return (this.form.existingContractAmount || 0) + this.calculatedContractAmount;
    },

    filteredSalesManagerEmployees() {
      if (!this.salesManagerSearch) return this.employees;
      const kw = this.salesManagerSearch.toLowerCase();
      return this.employees.filter(e =>
        String(e.employeeName || '').toLowerCase().includes(kw) ||
        String(e.employeeId || '').toLowerCase().includes(kw) ||
        String(e.department || '').toLowerCase().includes(kw)
      );
    },
    filteredConstructionManagerEmployees() {
      if (!this.constructionManagerSearch) return this.employees;
      const kw = this.constructionManagerSearch.toLowerCase();
      return this.employees.filter(e =>
        String(e.employeeName || '').toLowerCase().includes(kw) ||
        String(e.employeeId || '').toLowerCase().includes(kw) ||
        String(e.department || '').toLowerCase().includes(kw)
      );
    },
    filteredDesignManagerEmployees() {
      if (!this.designManagerSearch) return this.employees;
      const kw = this.designManagerSearch.toLowerCase();
      return this.employees.filter(e =>
        String(e.employeeName || '').toLowerCase().includes(kw) ||
        String(e.employeeId || '').toLowerCase().includes(kw) ||
        String(e.department || '').toLowerCase().includes(kw)
      );
    },

    filteredContractCustomers() {
      if (!this.customerSearchKeyword) return this.customers.slice(0, 100);
      const kw = this.customerSearchKeyword.trim();
      if (!kw) return this.customers.slice(0, 100);
      return this.customers.filter(c =>
        prefixMatch(c.customerName, kw) ||
        prefixMatch(c.furigana, kw)
      ).slice(0, 100);
    }
  },

  watch: {
    contract: {
      handler(newContract) {
        if (newContract) {
          this.loadContractData(newContract);
        }
      },
      immediate: true
    },

    // 工事価格変更時に消費税・契約金額・直接原価を自動計算
    'form.constructionPrice': {
      handler() {
        this.form.consumptionTax = this.calculatedTax;
        this.form.contractAmount = this.calculatedContractAmount;
        this.form.netDirectCost = this.calculatedDirectCost;
      }
    },

    // 粗利額変更時にNET直接原価を逆算
    'form.netGrossProfit': {
      handler() {
        if (this.grossProfitInputMode === 'amount') {
          this.form.netDirectCost = this.calculatedDirectCost;
        }
      }
    },

    // 粗利率入力変更時にNET直接原価と粗付加金額を逆算
    grossProfitRateInput() {
      if (this.grossProfitInputMode === 'rate') {
        this.form.netGrossProfit = this.calculatedGrossProfit;
        this.form.netDirectCost = this.calculatedDirectCost;
      }
    }
  },

  methods: {
    /**
     * 契約協議書データをフォームに読み込み
     */
    loadContractData(contract) {
      // スプレッドシートのカラム名からフォームにマッピング
      this.form = {
        contractId: contract['協議書ID'] || '',
        createdDate: this.formatDateForInput(contract['作成日']),
        contractDate: this.formatDateForInput(contract['契約協議書日付']),
        constructionCategory: contract['工事区分'] || '',
        category: contract['区分'] || '',
        creator: contract['作成者'] || '',
        contractRequired: contract['契約書要不要'] || '',
        customerContact: contract['お客様担当者'] || '',
        salesManager: contract['営業担当者'] || '',
        constructionManager: contract['工事担当者'] || '',
        designManager: contract['設計担当者'] || '',
        projectName: contract['工事名'] || '',
        location: contract['工事場所'] || '',
        constructionOverview: contract['工事概要'] || '',
        customerRequirements: contract['顧客要求事項'] || '',
        customer: contract['発注者_表示'] || contract['発注者'] || '',
        customerId: contract['発注者'] || '',
        customerPhone: contract['電話番号'] || '',

        relatedOriginalContractId: contract['関連元協議書ID'] || '',
        existingContractAmount: contract['既契約金額（税込）'] || 0,

        submittedEstimateAmount: contract['提出見積金額'] || 0,
        priceDecisionDate: this.formatDateForInput(contract['金額決定日']),
        settlementCategory: contract['精算カテゴリー'] || '',
        constructionPrice: contract['工事価格'] || 0,
        consumptionTax: contract['消費税'] || 0,
        contractAmount: contract['契約金額'] || 0,
        netDirectCost: contract['NET_直接原価'] || 0,
        netGrossProfit: contract['NET_粗付加金額'] || 0,

        paymentTimingStart: contract['入金時期_着工時'] || '',
        paymentAmountStart: contract['入金金額_着工時'] || 0,
        paymentTimingMiddle: contract['入金時期_中間時'] || '',
        paymentAmountMiddle: contract['入金金額_中間時'] || 0,
        paymentTimingEnd: contract['入金時期_竣工時'] || '',
        paymentAmountEnd: contract['入金金額_竣工時'] || 0,
        paymentMethodCash: this.parsePercent(contract['入金方法_現金']),
        paymentMethodNote: this.parsePercent(contract['入金方法_手形']),
        paymentMethodSite: contract['入金方法_サイト'] || '',

        periodUndetermined: contract['工期未定'] === 'はい',
        expectedCompletionDate: contract['履行予定日'] || '',
        periodStart: this.formatDateForInput(contract['工期_開始']),
        periodEnd: this.formatDateForInput(contract['工期_終了']),
        separateOrderExists: contract['別途発注工事の有無'] === 'あり' || contract['別途発注工事の有無'] === true,
        separateOrderDetail: contract['別途発注工事_詳細'] || '',
        ceremonyExists: contract['式典の有無'] === 'あり' || contract['式典の有無'] === true,
        technicianConditionExists: contract['技術者資格条件の有無'] === 'あり' || contract['技術者資格条件の有無'] === true,
        technicianConditionDetail: contract['技術者資格条件_詳細'] || '',
        fundingMethod: contract['資金調達方法'] || '',
        fundingMethodLoan: contract['資金調達方法_融資'] || '',
        performanceGuaranteeExists: contract['履行保証の有無'] === 'あり' || contract['履行保証の有無'] === true,
        performanceGuaranteeDetail: contract['履行保証_詳細'] || '',
        completionGuarantorExists: contract['完成保証人の有無'] === 'あり' || contract['完成保証人の有無'] === true,
        completionGuarantorDetail: contract['完成保証人_詳細'] || '',

        hasContractCopy: contract['契約書(写)の有無'] === 'あり' || contract['契約書(写)の有無'] === true,
        hasDesignDoc: contract['設計図書の有無'] === 'あり' || contract['設計図書の有無'] === true,
        hasSpecDoc: contract['仕様書の有無'] === 'あり' || contract['仕様書の有無'] === true,
        hasEstimate: contract['見積書の有無'] === 'あり' || contract['見積書の有無'] === true,
        hasMeetingRecord: contract['打合せ記録の有無'] === 'あり' || contract['打合せ記録の有無'] === true,
        hasSiteExplanation: contract['現場説明書の有無'] === 'あり' || contract['現場説明書の有無'] === true,
        hasSitePhoto: contract['現場写真の有無'] === 'あり' || contract['現場写真の有無'] === true,
        hasDrawing: contract['図面の有無'] === 'あり' || contract['図面の有無'] === true,
        attachDrawing: contract['添付_図面'] || '',
        attachEstimate: contract['添付_見積書'] || '',
        attachContract: contract['添付_契約書'] || '',

        remarks: contract['備考'] || '',
        approvalStatus: contract['承認ステータス'] || '作成中',
        approver: contract['承認者'] || '',
        approvalDate: this.formatDateForInput(contract['承認日']),
        comment: contract['コメント'] || '',
        outputTrigger: contract['出力トリガー'] || '',
        outputPath: contract['契約協議書(ソリューション)パス'] || ''
      };

      // DB保存済みの承認ステータスを記録（編集ロック判定用）
      this.originalApprovalStatus = contract['承認ステータス'] || '作成中';

      // 顧客名を検索キーワードにセット
      this.customerSearchKeyword = this.form.customer;

      // 各担当者の検索欄に初期値セット
      this.salesManagerSearch = this.form.salesManager || '';
      this.showSalesManagerSuggestions = false;
      this.constructionManagerSearch = this.form.constructionManager || '';
      this.showConstructionManagerSuggestions = false;
      this.designManagerSearch = this.form.designManager || '';
      this.showDesignManagerSuggestions = false;

      // 新規作成時: 作成者が空ならcurrentUserをデフォルトセット
      if (!this.form.contractId && this.currentUser?.name) {
        if (!this.form.creator) {
          this.form.creator = this.currentUser.name;
        }
      }
    },

    /**
     * 日付をinput[type=date]用にフォーマット
     */
    formatDateForInput(dateValue) {
      if (!dateValue) return '';
      if (dateValue instanceof Date) {
        return dateValue.toISOString().split('T')[0];
      }
      if (typeof dateValue === 'string' && dateValue.includes('/')) {
        const parts = dateValue.split('/');
        if (parts.length === 3) {
          return `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
        }
      }
      return dateValue;
    },

    /**
     * 顧客検索（サジェスト）
     */
    onCustomerInput() {
      this.showCustomerSuggestions = true;
    },
    onCustomerFocus() {
      this.showCustomerSuggestions = true;
    },
    onCustomerBlur() {
      setTimeout(() => { this.showCustomerSuggestions = false; }, 200);
    },

    /**
     * 顧客選択
     */
    selectCustomer(customer) {
      this.form.customer = customer.customerName;
      this.form.customerId = customer.customerId;
      this.customerSearchKeyword = customer.customerName;
      this.showCustomerSuggestions = false;
    },

    /**
     * 営業担当者オートコンプリート
     */
    onSalesManagerInput() {
      this.showSalesManagerSuggestions = true;
      this.form.salesManager = this.salesManagerSearch;
    },
    onSalesManagerFocus() {
      this.showSalesManagerSuggestions = true;
    },
    onSalesManagerBlur() {
      setTimeout(() => { this.showSalesManagerSuggestions = false; }, 200);
    },
    selectSalesManager(emp) {
      this.form.salesManager = emp.employeeName;
      this.salesManagerSearch = emp.employeeName;
      this.showSalesManagerSuggestions = false;
    },

    /**
     * 工事担当者オートコンプリート
     */
    onConstructionManagerInput() {
      this.showConstructionManagerSuggestions = true;
      this.form.constructionManager = this.constructionManagerSearch;
    },
    onConstructionManagerFocus() {
      this.showConstructionManagerSuggestions = true;
    },
    onConstructionManagerBlur() {
      setTimeout(() => { this.showConstructionManagerSuggestions = false; }, 200);
    },
    selectConstructionManager(emp) {
      this.form.constructionManager = emp.employeeName;
      this.constructionManagerSearch = emp.employeeName;
      this.showConstructionManagerSuggestions = false;
    },

    /**
     * 設計担当者オートコンプリート
     */
    onDesignManagerInput() {
      this.showDesignManagerSuggestions = true;
      this.form.designManager = this.designManagerSearch;
    },
    onDesignManagerFocus() {
      this.showDesignManagerSuggestions = true;
    },
    onDesignManagerBlur() {
      setTimeout(() => { this.showDesignManagerSuggestions = false; }, 200);
    },
    selectDesignManager(emp) {
      this.form.designManager = emp.employeeName;
      this.designManagerSearch = emp.employeeName;
      this.showDesignManagerSuggestions = false;
    },

    /**
     * 元契約協議書を選択（追加工事用）
     */
    onOriginalContractChange() {
      const selected = this.approvedContractOptions.find(
        c => c.contractId === this.form.relatedOriginalContractId
      );
      if (selected) {
        this.form.existingContractAmount = selected.contractAmount || 0;
      } else {
        this.form.existingContractAmount = 0;
      }
    },

    /**
     * 金額フォーマット
     */
    formatCurrency(value) {
      if (typeof Formatters !== 'undefined' && Formatters.number) {
        return Formatters.number(value);
      }
      if (!value && value !== 0) return '';
      return Number(value).toLocaleString('ja-JP');
    },

    /**
     * カンマ区切り表示用フォーマット（入力フィールド用）
     */
    formatAmountForInput(value) {
      if (!value || Number(value) === 0) return '';
      return Number(value).toLocaleString('ja-JP');
    },

    /**
     * カンマ区切りを数値に変換
     */
    parseAmountFromInput(str) {
      if (!str) return 0;
      return Number(String(str).replace(/[,、]/g, '')) || 0;
    },

    /**
     * パーセント文字列を数値に変換（例: "70%" → 70）
     */
    parsePercent(str) {
      if (!str && str !== 0) return '';
      const n = Number(String(str).replace(/[%％]/g, '')) || 0;
      // スプレッドシートがパーセンテージ書式の場合、内部値は小数（0.5 = 50%）
      return n > 0 && n <= 1 ? Math.round(n * 100) : n;
    },

    /**
     * 現金入力時に手形を自動計算（合計100%）
     */
    onCashInput(event) {
      let cash = Number(event.target.value) || 0;
      // 0-100の範囲に制限
      if (cash < 0) cash = 0;
      if (cash > 100) cash = 100;
      this.form.paymentMethodCash = cash;
      this.form.paymentMethodNote = 100 - cash;
    },

    /**
     * 手形入力時に現金を自動計算（合計100%）
     */
    onNoteInput(event) {
      let note = Number(event.target.value) || 0;
      // 0-100の範囲に制限
      if (note < 0) note = 0;
      if (note > 100) note = 100;
      this.form.paymentMethodNote = note;
      this.form.paymentMethodCash = 100 - note;
    },

    /**
     * 金額入力時の処理
     */
    onAmountInput(field, event) {
      const value = this.parseAmountFromInput(event.target.value);
      this.form[field] = value;
    },

    /**
     * 金額入力フィールドからフォーカスが外れた時の処理
     */
    onAmountBlur(field, event) {
      event.target.value = this.formatAmountForInput(this.form[field]);
    },

    /**
     * 保存データをスプレッドシート形式に変換
     */
    toSheetData() {
      return {
        '協議書ID': this.form.contractId,
        '作成日': this.form.createdDate,
        '契約協議書日付': this.form.contractDate,
        '工事区分': this.form.constructionCategory,
        '区分': this.form.category,
        '作成者': this.form.creator,
        '契約書要不要': this.form.contractRequired,
        'お客様担当者': this.form.customerContact,
        '営業担当者': this.form.salesManager,
        '工事担当者': this.form.constructionManager,
        '設計担当者': this.form.designManager,
        '工事名': this.form.projectName,
        '工事場所': this.form.location,
        '工事概要': this.form.constructionOverview,
        '顧客要求事項': this.form.customerRequirements,
        '発注者': this.form.customerId || this.form.customer,
        '電話番号': this.form.customerPhone,

        '関連元協議書ID': this.form.relatedOriginalContractId,
        '既契約金額（税込）': this.form.existingContractAmount,

        '提出見積金額': this.form.submittedEstimateAmount,
        '金額決定日': this.form.priceDecisionDate,
        '精算カテゴリー': this.form.settlementCategory,
        '工事価格': this.form.constructionPrice,
        '消費税': this.form.consumptionTax,
        '契約金額': this.form.contractAmount,
        'NET_直接原価': this.calculatedDirectCost,
        'NET_粗付加金額': this.calculatedGrossProfit,

        '入金時期_着工時': this.form.paymentTimingStart,
        '入金金額_着工時': this.form.paymentAmountStart,
        '入金時期_中間時': this.form.paymentTimingMiddle,
        '入金金額_中間時': this.form.paymentAmountMiddle,
        '入金時期_竣工時': this.form.paymentTimingEnd,
        '入金金額_竣工時': this.form.paymentAmountEnd,
        '入金方法_現金': this.form.paymentMethodCash !== '' ? this.form.paymentMethodCash + '%' : '',
        '入金方法_手形': this.form.paymentMethodNote !== '' ? this.form.paymentMethodNote + '%' : '',
        '入金方法_サイト': this.form.paymentMethodSite,

        '工期未定': this.form.periodUndetermined ? 'はい' : '',
        '履行予定日': this.form.expectedCompletionDate,
        '工期_開始': this.form.periodUndetermined ? '' : this.form.periodStart,
        '工期_終了': this.form.periodUndetermined ? '' : this.form.periodEnd,
        '別途発注工事の有無': this.form.separateOrderExists ? 'あり' : 'なし',
        '別途発注工事_詳細': this.form.separateOrderDetail,
        '式典の有無': this.form.ceremonyExists ? 'あり' : 'なし',
        '技術者資格条件の有無': this.form.technicianConditionExists ? 'あり' : 'なし',
        '技術者資格条件_詳細': this.form.technicianConditionDetail,
        '資金調達方法': this.form.fundingMethod,
        '資金調達方法_融資': this.form.fundingMethodLoan,
        '履行保証の有無': this.form.performanceGuaranteeExists ? 'あり' : 'なし',
        '履行保証_詳細': this.form.performanceGuaranteeDetail,
        '完成保証人の有無': this.form.completionGuarantorExists ? 'あり' : 'なし',
        '完成保証人_詳細': this.form.completionGuarantorDetail,

        '契約書(写)の有無': this.form.hasContractCopy ? 'あり' : 'なし',
        '設計図書の有無': this.form.hasDesignDoc ? 'あり' : 'なし',
        '仕様書の有無': this.form.hasSpecDoc ? 'あり' : 'なし',
        '見積書の有無': this.form.hasEstimate ? 'あり' : 'なし',
        '打合せ記録の有無': this.form.hasMeetingRecord ? 'あり' : 'なし',
        '現場説明書の有無': this.form.hasSiteExplanation ? 'あり' : 'なし',
        '現場写真の有無': this.form.hasSitePhoto ? 'あり' : 'なし',
        '図面の有無': this.form.hasDrawing ? 'あり' : 'なし',
        '添付_図面': this.form.attachDrawing,
        '添付_見積書': this.form.attachEstimate,
        '添付_契約書': this.form.attachContract,

        '備考': this.form.remarks,
        '承認ステータス': this.form.approvalStatus,
        '承認者': this.form.approver,
        '承認日': this.form.approvalDate,
        'コメント': this.form.comment,
        '出力トリガー': this.form.outputTrigger,
        '契約協議書(ソリューション)パス': this.form.outputPath
      };
    },

    /**
     * 保存
     */
    onSave() {
      if (this.paymentAmountMismatch) {
        if (!confirm('入金合計と契約金額が一致しません。このまま保存しますか？')) {
          return;
        }
      }
      const data = this.toSheetData();
      this.$emit('save', data);
    },

    /**
     * Excel出力
     */
    onExportExcel() {
      this.$emit('export-excel', this.form.contractId);
    },

    /**
     * 小口用Excel出力
     */
    onExportExcelSmall() {
      this.$emit('export-excel-small', this.form.contractId);
    },

    /**
     * PDF出力
     */
    onExportPdf() {
      this.$emit('export-pdf', this.form.contractId);
    },

    /**
     * 削除
     */
    onDelete() {
      if (!confirm('この契約協議書を削除しますか？\n関連する工事・発注データも削除されます。')) return;
      this.$emit('delete', this.form.contractId);
    },

    /**
     * サジェスト領域外クリック時に閉じる
     */
    hideSuggestions() {
      setTimeout(() => {
        this.showCustomerSuggestions = false;
      }, 200);
    }
  },

  template: `
    <div class="contract-form">
      <div class="page-header" style="margin-bottom: 24px;">
        <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
          <div style="display: flex; align-items: center; gap: 16px;">
            <button class="btn btn-secondary btn-sm" @click="$emit('back')" style="display: flex; align-items: center; gap: 4px;">
              ← 一覧に戻る
            </button>
            <h1 style="font-size: 20px; font-weight: 500; margin: 0;">
              契約協議書
              <span v-if="form.contractId" class="text-muted" style="font-size: 14px; margin-left: 12px;">
                {{ form.contractId }}
              </span>
              <span v-else class="text-muted" style="font-size: 14px; margin-left: 12px;">
                新規作成
              </span>
            </h1>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <button class="btn btn-primary" @click="onExportExcel" :disabled="!form.contractId" style="display: flex; align-items: center; gap: 6px;">
              <span style="font-size: 16px;">📄</span> 大工事用出力
            </button>
            <button class="btn btn-primary" @click="onExportExcelSmall" :disabled="!form.contractId" style="display: flex; align-items: center; gap: 6px; background-color: #0d47a1;">
              <span style="font-size: 16px;">📋</span> 小口用出力
            </button>
            <button v-if="form.contractId" class="btn btn-secondary btn-sm" @click="$emit('copy-contract', form.contractId)" style="display: flex; align-items: center; gap: 4px;">
              複写して新規作成
            </button>
            <button v-if="form.contractId" class="btn btn-danger btn-sm" @click="onDelete" :disabled="isApproved" style="display: flex; align-items: center; gap: 4px;">
              削除
            </button>
          </div>
        </div>
      </div>

      <!-- 承認済みの場合は読み取り専用バナーを表示 -->
      <div v-if="isApproved" style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
        <span style="font-size: 18px;">🔒</span>
        <span style="font-weight: 500; color: #856404;">この契約協議書は承認済みのため、編集できません。</span>
      </div>

      <tab-panel :tabs="tabs" v-model="activeTab" :class="{ 'form-readonly': isApproved }">
        <!-- 基本情報タブ -->
        <template #basic>
          <div class="section">
            <h3 class="section-title">基本情報</h3>
            <div class="form-grid-3">
              <div class="form-group">
                <label class="form-label">協議書ID</label>
                <input type="text" :value="form.contractId || '（自動採番）'" class="form-control" readonly />
              </div>
              <div class="form-group">
                <label class="form-label">作成日</label>
                <input type="date" v-model="form.createdDate" class="form-control" />
              </div>
              <div class="form-group">
                <label class="form-label">契約協議書日付</label>
                <input type="date" v-model="form.contractDate" class="form-control" />
              </div>
            </div>

            <div class="form-grid-3">
              <div class="form-group">
                <label class="form-label">工事区分</label>
                <select v-model="form.constructionCategory" class="form-control" :disabled="isEditMode">
                  <option value="">選択してください</option>
                  <option v-for="opt in constructionCategoryOptions" :key="opt" :value="opt">{{ opt }}</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">区分</label>
                <select v-model="form.category" class="form-control">
                  <option value="">選択してください</option>
                  <option v-for="opt in categoryOptions" :key="opt" :value="opt">{{ opt }}</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">作成者</label>
                <input type="text" v-model="form.creator" class="form-control" />
              </div>
            </div>

            <div class="form-grid-3">
              <div class="form-group" style="position: relative;">
                <label class="form-label">営業担当者</label>
                <input
                  type="text"
                  v-model="salesManagerSearch"
                  @input="onSalesManagerInput"
                  @focus="onSalesManagerFocus"
                  @blur="onSalesManagerBlur"
                  class="form-control"
                  placeholder="社員名を入力して検索"
                  autocomplete="off"
                />
                <ul v-if="showSalesManagerSuggestions && filteredSalesManagerEmployees.length > 0" class="suggestion-list">

<script>

 * OrderForm - 発注管理画面
 *
 * スプレッドシート「発注業者管理」シートの24列に対応
 * タブ構成: 基本情報 / 支払条件 / 協議・条件 / 書類管理
 */
const OrderForm = {
  name: 'OrderForm',

  props: {
    order: {
      type: Object,
      default: null
    },
    vendors: {
      type: Array,
      default: () => []
    },
    currentUser: {
      type: Object,
      default: () => ({})
    }
  },

  emits: ['save', 'export-order', 'export-agreement', 'copy-order', 'back', 'show-toast'],

  data() {
    return {
      activeTab: 'basic',
      tabs: [
        { id: 'basic', label: '基本情報' },
        { id: 'payment', label: '支払条件' },
        { id: 'negotiation', label: '協議・条件' },
        { id: 'documents', label: '書類管理' },
        { id: 'quotes', label: '見積もり詳細' }
      ],

      saving: false,  // 保存中フラグ（連打防止）

      // スプレッドシート24列対応フォームデータ
      form: {
        // === 基本情報（7項目）===
        orderId: '',                    // 発注ID
        constructionId: '',             // 関連工事番号
        vendorName: '',                 // 施主名(注文決定業者名)
        vendorId: '',                   // 仕入先コード（協力会社マスタ参照用）
        orderContent: '',               // 注文内容
        orderCategory: 'その他',        // 発注区分（材料 or その他）
        orderAmount: 0,                  // 注文金額
        budgetAmount: 0,                 // 実行予算金額
        vendorRank: '',                 // 注文決定業者のランク

        // === 支払条件（7項目）===
        paymentClosingDay: '',          // 支払条件(毎月◯日締め切り)
        paymentDueDay: '',              // 支払条件(翌月◯日支払)
        paymentProgressRate: '',        // 支払条件(出来高◯%以内)
        paymentCashRate: '',            // 支払条件(現金%)
        paymentNoteRate: '',            // 支払条件(手形%)
        paymentStatus: '',              // 支払ステータス(協力会社への)
        safetyFee: '',                  // 安推協特別会費（金額）
        safetyFeeRate: '',              // 安推協会費率（協力会社マスタから）

        // === 協議・条件（5項目）===
        negotiationContent: '',         // 協議内容
        orderConditions: '',            // 注文条件
        warrantyTerms: '',              // かし担保
        constructionPermit: '',         // 建設業の許可
        remarks: '',                    // 備考

        // === 書類管理（5項目）===
        orderIssueDate: '',             // 注文書発行日
        orderNumber: '',                // 注文書番号
        agreementPath: '',              // 注文協議書パス
        orderSheetPath: '',             // 注文書パス
        returnedOrderReceipt: ''        // 返送された注文請書
      },

      // 業者ランク選択肢
      rankOptions: ['A', 'B', 'C', 'D', 'E', '新規'],

      // 支払ステータス選択肢
      paymentStatusOptions: ['未発注', '発注済', '一部支払済', '支払完了'],

      // 業者検索
      vendorSearchKeyword: '',
      showVendorSuggestions: false,

      // 工事一覧（ドロップダウン用）
      constructions: [],
      constructionsLoading: false,

      // 見積もり詳細関連
      quotes: [],                    // 見積もり一覧
      quotesLoading: false,          // 読み込み中フラグ
      quotesViewMode: 'comparison',  // 'comparison' | 'list'
      newQuote: null,                // 新規追加用テンプレート

      // 見積もり業者サジェスト用
      quoteVendorKeyword: '',        // 検索キーワード
      quoteVendorSuggestions: [],    // サジェスト候補
      showQuoteVendorSuggestions: false,  // サジェスト表示フラグ
      activeQuoteIndex: -1           // 現在編集中の見積もりインデックス
    };
  },

  /**
   * コンポーネントマウント時に工事一覧を取得
   */
  mounted() {
    this.loadConstructions();
  },

  computed: {
    /**
     * 業者サジェスト（computedで絞り込み）
     */
    filteredVendors() {
      if (!this.vendorSearchKeyword) return this.vendors.slice(0, 30);
      const kw = normalizeWidth(this.vendorSearchKeyword.trim());
      if (!kw) return this.vendors.slice(0, 30);
      return this.vendors.filter(v =>
        normalizeWidth(v.vendorName).includes(kw) ||
        normalizeWidth(v.shortName || '').includes(kw) ||
        normalizeWidth(v.vendorId || '').includes(kw)
      ).slice(0, 30);
    },

    /**
     * 支払金額の自動計算（でんさい万円未満切捨 → 安推協10円未満切捨 → 振込=税込-でんさい-安推協）
     */
    paymentCalc() {
      const amount = Number(this.form.orderAmount) || 0;
      const feeRate = parseFloat(this.form.safetyFeeRate) || 0;
      const noteRatio = Number(this.form.paymentNoteRate) || 0;

      // 安推協特別会費（10円未満切捨て）
      const safetyFee = feeRate > 0 ? Math.floor(amount * feeRate / 100 / 10) * 10 : 0;
      // 手形 = 税抜 × 比率（万円未満切捨て）
      const notePayment = Math.floor(amount * noteRatio / 100 / 10000) * 10000;
      // 消費税・税込
      const tax = Math.floor(amount * 0.1);
      const amountIncludingTax = amount + tax;
      // 現金 = 税込 - 手形 - 安推協（帳尻合わせ）
      const cashPayment = amountIncludingTax - notePayment - safetyFee;

      return { safetyFee, paymentBase: amount - safetyFee, notePayment, cashPayment };
    },

    /**
     * 予算対比
     */
    budgetDifference() {
      return this.form.budgetAmount - this.form.orderAmount;
    },

    /**
     * 予算達成率
     */
    budgetAchievementRate() {
      if (this.form.budgetAmount === 0 || !this.form.budgetAmount) return 0;
      return ((this.budgetDifference / this.form.budgetAmount) * 100).toFixed(1);
    },

    /**
     * 編集モードか新規モードか
     */
    isEditMode() {
      return !!this.form.orderId;
    },

    /**
     * 注文書発行日を編集可能か（manager/adminのみ）
     */
    canEditOrderIssueDate() {
      const role = this.currentUser?.role;
      return role === 'manager' || role === 'admin';
    },

    /**
     * 関連工事番号の表示テキスト（工事番号 - 工事名）
     */
    constructionDisplayText() {
      if (!this.form.constructionId) {
        return '（工事未設定）';
      }
      const construction = this.constructions.find(c => c.constructionId === this.form.constructionId);
      if (construction) {
        return `${construction.constructionId} - ${construction.constructionName}`;
      }
      return this.form.constructionId;
    }
  },

  watch: {
    order: {
      async handler(newOrder) {
        if (newOrder) {
          // 工事一覧がまだロードされていない場合は先にロード
          if (this.constructions.length === 0) {
            await this.loadConstructions();
          }
          this.loadOrderData(newOrder);
          // 見積もり詳細を読み込み
          if (newOrder['発注ID']) {
            this.loadQuotes(newOrder['発注ID']);
          } else {
            // 新規発注の場合は見積もりをクリア
            this.quotes = [];
          }
        }
      },
      immediate: true
    }
  },

  methods: {
    /**
     * 工事一覧を読み込む（ドロップダウン用）
     */
    async loadConstructions() {
      this.constructionsLoading = true;
      try {
        const data = await GasApi.getConstructions();
        this.constructions = data || [];
        console.log('[OrderForm] 工事一覧を取得:', this.constructions.length, '件');
      } catch (e) {
        console.error('[OrderForm] 工事一覧取得エラー:', e);
        this.constructions = [];
      } finally {
        this.constructionsLoading = false;
      }
    },

    /**
     * フォームをリセット
     */
    resetForm() {
      this.form = {
        orderId: '',
        constructionId: '',
        vendorName: '',
        vendorId: '',
        orderContent: '',
        orderCategory: 'その他',
        orderAmount: 0,
        budgetAmount: 0,
        vendorRank: '',
        paymentClosingDay: '',
        paymentDueDay: '',
        paymentProgressRate: '',
        paymentCashRate: '',
        paymentNoteRate: '',
        paymentStatus: '',
        safetyFee: '',
        safetyFeeRate: '',
        negotiationContent: '',
        orderConditions: '',
        warrantyTerms: '',
        constructionPermit: '',
        remarks: '',
        orderIssueDate: '',
        orderNumber: '',
        agreementPath: '',
        orderSheetPath: '',
        returnedOrderReceipt: ''
      };
      this.vendorSearchKeyword = '';
      this.activeTab = 'basic';
    },

    /**
     * 金額をフォーマット
     */
    formatAmount(value) {
      if (typeof Formatters !== 'undefined') return Formatters.number(value);
      if (!value && value !== 0) return '-';
      return Number(value).toLocaleString('ja-JP');
    },

    /**
     * 発注データをフォームに読み込み
     * 日本語キー形式とcamelCase形式の両方に対応
     */
    loadOrderData(order) {
      // camelCase形式と日本語キー形式の両方に対応するヘルパー
      const get = (camelKey, jpKey) => order[camelKey] || order[jpKey] || '';
      const getNum = (camelKey, jpKey) => order[camelKey] || order[jpKey] || 0;

      this.form = {
        // === 基本情報 ===
        orderId: get('orderId', '発注ID'),
        constructionId: get('constructionId', '関連工事番号'),
        vendorName: order['協力会社名_表示'] || get('vendorName', '施主名(注文決定業者名)'),
        vendorId: get('vendorId', '仕入先コード') || order['仕入先コード'] || get('vendorName', '施主名(注文決定業者名)'),
        orderContent: get('orderContent', '注文内容'),
        orderCategory: get('orderCategory', '発注区分') || 'その他',
        orderAmount: getNum('orderAmount', '注文金額'),
        budgetAmount: getNum('budgetAmount', '実行予算金額'),
        vendorRank: get('vendorRank', '注文決定業者のランク'),

        // === 支払条件 ===
        paymentClosingDay: get('paymentClosingDay', '支払条件(毎月◯日締め切り)'),
        paymentDueDay: get('paymentDueDay', '支払条件(翌月◯日支払)'),
        paymentProgressRate: get('paymentProgressRate', '支払条件(出来高◯%以内)'),
        paymentCashRate: get('paymentCashRate', '支払条件(現金%)'),
        paymentNoteRate: get('paymentNoteRate', '支払条件(手形%)'),
        paymentStatus: get('paymentStatus', '支払ステータス(協力会社への)'),
        safetyFee: get('safetyFee', '安推協特別会費'),
        safetyFeeRate: '',  // 編集時は協力会社マスタから再取得

        // === 協議・条件 ===
        negotiationContent: get('negotiationContent', '協議内容'),
        orderConditions: get('orderConditions', '注文条件'),
        warrantyTerms: get('warrantyTerms', 'かし担保'),
        constructionPermit: get('constructionPermit', '建設業の許可'),
        remarks: get('remarks', '備考'),

        // === 書類管理 ===
        orderIssueDate: this.formatDateForInput(order['orderIssueDate'] || order['注文書発行日']),
        orderNumber: get('orderNumber', '注文書番号'),
        agreementPath: get('agreementPath', '注文協議書パス'),
        orderSheetPath: get('orderSheetPath', '注文書パス'),
        returnedOrderReceipt: get('returnedOrderReceipt', '返送された注文請書')
      };

      this.vendorSearchKeyword = this.form.vendorName;
      console.log('[OrderForm] loadOrderData完了:', this.form.orderId);

      // 協力会社マスタから安推協会費率を復元
      if (this.form.vendorId) {
        GasApi.getVendorById(this.form.vendorId).then(v => {
          if (v && v.safetyFeeRate !== undefined && v.safetyFeeRate !== null && v.safetyFeeRate !== '') {
            this.form.safetyFeeRate = v.safetyFeeRate;
          }
        }).catch(() => {});
      }
    },

    /**
     * 日付をinput[type=date]用にフォーマット
     */
    formatDateForInput(dateValue) {
      if (!dateValue) return '';
      if (dateValue instanceof Date) {
        return dateValue.toISOString().split('T')[0];
      }
      if (typeof dateValue === 'string' && dateValue.includes('/')) {
        const parts = dateValue.split('/');
        if (parts.length === 3) {
          return `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
        }
      }
      return dateValue;
    },

    /**
     * 業者入力時
     */
    onVendorInput() {
      this.showVendorSuggestions = true;
      // 手入力で名前が変わったらIDをクリア（再選択を促す）
      if (this.vendorSearchKeyword !== this.form.vendorName) {
        this.form.vendorId = '';
      }
    },
    onVendorFocus() {
      this.showVendorSuggestions = true;
    },
    onVendorBlur() {
      setTimeout(() => { this.showVendorSuggestions = false; }, 200);
    },

    /**
     * 業者選択
     * AppSheet数式の再現:
     * - 支払条件(毎月◯日締め切り) = [施主名(注文決定業者名)].[締日]
     * - 支払条件(翌月◯日支払) = [施主名(注文決定業者名)].[支払日]
     * - 支払条件(現金%) = [施主名(注文決定業者名)].[支払比率(手形以外)]
     * - 支払条件(手形%) = [施主名(注文決定業者名)].[支払比率(手形)]
     * - 建設業の許可 = [施主名(注文決定業者名)].[許可ステータス]
     */
    async selectVendor(vendor) {
      // まずサジェストを閉じてから値をセット（blur競合防止）
      this.showVendorSuggestions = false;
      this.vendorSearchKeyword = vendor.vendorName;
      this.form.vendorName = vendor.vendorName;
      this.form.vendorId = vendor.vendorId || '';
      // 業者ランクはマスタに値がある場合のみ上書き（手動入力値を保持）
      if (vendor.vendorRank) this.form.vendorRank = vendor.vendorRank;

      // 支払条件を自動セット（協力会社マスタから）
      if (vendor.closingDay !== undefined && vendor.closingDay !== null) {
        this.form.paymentClosingDay = vendor.closingDay;
      }
      if (vendor.paymentDay !== undefined && vendor.paymentDay !== null) {
        this.form.paymentDueDay = vendor.paymentDay;
      }
      if (vendor.cashRatio !== undefined && vendor.cashRatio !== null) {
        this.form.paymentCashRate = vendor.cashRatio;
      }
      if (vendor.noteRatio !== undefined && vendor.noteRatio !== null) {
        this.form.paymentNoteRate = vendor.noteRatio;
      }

      // 建設業の許可ステータスを自動セット
      if (vendor.permitStatus) {
        this.form.constructionPermit = vendor.permitStatus;
      }

      // 安推協会費率を保持し、金額を自動計算
      if (vendor.safetyFeeRate !== undefined && vendor.safetyFeeRate !== null && vendor.safetyFeeRate !== '') {
        this.form.safetyFeeRate = vendor.safetyFeeRate;
        this.calcSafetyFee();
      }

      // 詳細情報がない場合はAPIから取得
      if (!vendor.closingDay && !vendor.paymentDay && vendor.vendorId) {
        try {
          const vendorDetail = await GasApi.getVendorById(vendor.vendorId);
          if (vendorDetail) {
            if (vendorDetail.closingDay !== undefined) this.form.paymentClosingDay = vendorDetail.closingDay;
            if (vendorDetail.paymentDay !== undefined) this.form.paymentDueDay = vendorDetail.paymentDay;
            if (vendorDetail.cashRatio !== undefined) this.form.paymentCashRate = vendorDetail.cashRatio;
            if (vendorDetail.noteRatio !== undefined) this.form.paymentNoteRate = vendorDetail.noteRatio;
            if (vendorDetail.permitStatus) this.form.constructionPermit = vendorDetail.permitStatus;
            if (vendorDetail.vendorRank) this.form.vendorRank = vendorDetail.vendorRank;
            if (vendorDetail.safetyFeeRate !== undefined && vendorDetail.safetyFeeRate !== null && vendorDetail.safetyFeeRate !== '') {
              this.form.safetyFeeRate = vendorDetail.safetyFeeRate;
              this.calcSafetyFee();
            }
          }
        } catch (e) {
          console.error('協力会社詳細取得エラー:', e);
        }
      }
    },

    /**
     * 注文金額変更時の出来高率自動計算 + 安推協会費再計算
     * AppSheet数式の再現: IF([注文金額] <= 500000, "100", "90")
     */
    onOrderAmountChange() {
      const amount = Number(this.form.orderAmount) || 0;
      if (amount <= 500000) {
        this.form.paymentProgressRate = '100';
      } else {
        this.form.paymentProgressRate = '90';
      }
      this.calcSafetyFee();
    },

    /**
     * 安推協特別会費を自動計算（paymentCalcから取得してformに反映）
     */
    calcSafetyFee() {
      this.form.safetyFee = this.paymentCalc.safetyFee;
    },

    /**
     * 金額フォーマット
     */
    formatCurrency(value) {
      if (typeof Formatters !== 'undefined') return Formatters.number(value);
      if (!value && value !== 0) return '-';
      return Number(value).toLocaleString('ja-JP');
    },

    /**
     * 保存データをスプレッドシート形式に変換
     */
    toSheetData() {
      return {
        '発注ID': this.form.orderId,
        '関連工事番号': this.form.constructionId,
        '施主名(注文決定業者名)': this.form.vendorId || this.form.vendorName,
        '注文内容': this.form.orderContent,
        '発注区分': this.form.orderCategory,
        '注文金額': this.form.orderAmount,
        '支払条件(毎月◯日締め切り)': this.form.paymentClosingDay,
        '支払条件(翌月◯日支払)': this.form.paymentDueDay,
        '支払条件(出来高◯%以内)': this.form.paymentProgressRate,
        '支払条件(現金%)': this.form.paymentCashRate,
        '支払条件(手形%)': this.form.paymentNoteRate,
        '支払ステータス(協力会社への)': this.form.paymentStatus,
        '安推協特別会費': this.paymentCalc.safetyFee,
        '安推協会費率': this.form.safetyFeeRate,
        '協議内容': this.form.negotiationContent,
        '注文条件': this.form.orderConditions,
        'かし担保': this.form.warrantyTerms,
        '備考': this.form.remarks,
        '実行予算金額': this.form.budgetAmount,
        '注文決定業者のランク': this.form.vendorRank,
        '注文書発行日': this.form.orderIssueDate,
        '注文書番号': this.form.orderNumber,
        '建設業の許可': this.form.constructionPermit,
        '注文協議書パス': this.form.agreementPath,
        '注文書パス': this.form.orderSheetPath,
        '返送された注文請書': this.form.returnedOrderReceipt
      };
    },

    /**
     * 保存（発注と未保存の見積もりを一括保存）
     */
    async onSave() {
      // 連打防止
      if (this.saving) return;
      this.saving = true;

      const data = this.toSheetData();

      try {
        // 発注を保存
        const result = await GasApi.saveOrder(data);

        if (result && result.success) {
          // 新規発注の場合、IDを設定
          if (result.id && !this.form.orderId) {
            this.form.orderId = result.id;
            console.log('[OrderForm] 新規発注ID取得:', result.id);
          }

          // 未保存の見積もりを保存
          const unsavedQuotes = this.quotes.filter(q => !q['見積もり詳細ID']);
          for (let i = 0; i < unsavedQuotes.length; i++) {
            const quote = unsavedQuotes[i];
            const idx = this.quotes.indexOf(quote);
            quote['発注ID'] = this.form.orderId;
            quote['工事番号'] = this.form.constructionId;
            await this.saveQuote(quote, idx);
          }

          // 新規発注の場合、支払データを自動作成
          if (result.id) {
            try {
              const payResult = await GasApi.createPaymentFromOrder(this.form.orderId);
              if (payResult && payResult.success) {
                console.log('[OrderForm] 支払データ自動作成成功:', payResult.id);
              } else {
                console.warn('[OrderForm] 支払データ自動作成失敗:', payResult?.error);
              }
            } catch (payErr) {
              console.warn('[OrderForm] 支払データ自動作成エラー:', payErr);
            }
          }

          // 親コンポーネントに保存成功を通知
          this.$emit('save', { ...data, orderId: this.form.orderId, _saved: true });
          this.$emit('show-toast', '発注を保存しました', 'success');
        } else {
          console.error('[OrderForm] 発注保存失敗:', result?.error);
          alert('発注の保存に失敗しました: ' + (result?.error || ''));
        }
      } catch (e) {
        console.error('[OrderForm] 保存エラー:', e);
        alert('保存に失敗しました');
      } finally {
        this.saving = false;
      }
    },

    /**
     * 注文協議書出力（出力前に全見積もりを保存）
     */
    async onExportAgreement() {
      if (!this.form.orderId) {
        this.$emit('show-toast', '先に発注を保存してください', 'error');
        return;
      }
      // 全見積もりを保存してからエクスポート
      console.log('[onExportAgreement] 見積もり件数:', this.quotes.length);
      for (let i = 0; i < this.quotes.length; i++) {
        console.log('[onExportAgreement] 見積もり' + (i+1) + ':', this.quotes[i]['見積もり詳細ID'], this.quotes[i]['見積業者名']);
        await this.saveQuote(this.quotes[i], i);
      }
      console.log('[onExportAgreement] 全見積もり保存完了。エクスポート開始 orderId:', this.form.orderId);
      this.$emit('export-agreement', this.form.orderId);
    },

    /**
     * 注文書出力（出力前に全見積もりを保存）
     */
    async onExportOrder() {
      if (!this.form.orderId) {
        this.$emit('show-toast', '先に発注を保存してください', 'error');
        return;
      }
      for (let i = 0; i < this.quotes.length; i++) {
        await this.saveQuote(this.quotes[i], i);
      }
      this.$emit('export-order', this.form.orderId);
    },

    /**
     * 支払ステータスに応じたCSSクラスを返す
     */
    getPaymentStatusClass(status) {
      switch (status) {
        case '支払完了': return 'status-completed';
        case '発注済': return 'status-contracted';
        case '一部支払済': return 'status-in-progress';
        case '未発注': return 'status-negotiating';
        default: return '';
      }
    },

    // ========================================
    // 見積もり詳細関連メソッド
    // ========================================

    /**
     * 発注IDに紐づく見積もり一覧を取得
     */
    async loadQuotes(orderId) {
      if (!orderId) {
        this.quotes = [];
        return;
      }
      this.quotesLoading = true;
      try {
        const data = await GasApi.getQuotesByOrderId(orderId);
        this.quotes = data || [];
        console.log('[OrderForm] 見積もり一覧を取得:', this.quotes.length, '件');
      } catch (e) {
        console.error('[OrderForm] 見積もり取得エラー:', e);
        this.quotes = [];
      } finally {
        this.quotesLoading = false;
      }
    },

    /**
     * 見積もりを保存
     */
    async saveQuote(quote, index) {
      // 発注IDがない場合は保存せず、ローカルで保持のみ
      if (!this.form.orderId) {
        console.log('[OrderForm] 発注未保存のため見積もりはローカル保持');
        return;
      }

      try {
        // 発注IDと工事番号を設定
        quote['発注ID'] = this.form.orderId;
        quote['工事番号'] = this.form.constructionId;

        // 保存用データを作成（見積業者名は仕入先コードで保存、UI表示は会社名のまま）
        const saveData = Object.assign({}, quote);
        if (quote['_vendorId']) {
          saveData['見積業者名'] = quote['_vendorId'];
        }
        delete saveData['_vendorId'];

        const result = await GasApi.saveQuote(saveData);
        if (result.success) {
          // 新規保存の場合、IDを設定
          if (result.id && !quote['見積もり詳細ID']) {
            this.quotes[index]['見積もり詳細ID'] = result.id;
          }
          console.log('[OrderForm] 見積もり保存成功:', result.id);
        } else {
          alert('見積もり保存に失敗しました: ' + (result.error || ''));
        }
      } catch (e) {
        console.error('[OrderForm] 見積もり保存エラー:', e);
        alert('見積もり保存に失敗しました');
      }
    },

    /**
     * 新規見積もりを追加
     * 発注が未保存でも見積もりを追加可能（ローカルに保持し、発注保存時に一緒に保存）
     */
    addQuote() {
      const newQuote = {
        '工事番号': this.form.constructionId,
        '発注ID': this.form.orderId || '',  // 発注未保存の場合は空
        '見積もり詳細ID': '',  // 新規なのでIDは空
        '見積業者名': '',
        'TEL': '',
        '担当者': '',
        '見積金額': 0,
        '当社NET': 0,
        '最終協議金額': 0
      };
      this.quotes.push(newQuote);
    },

    /**
     * 見積もり業者をサジェスト検索
     */
    searchQuoteVendor(index) {
      this.activeQuoteIndex = index;
      const keyword = normalizeWidth((this.quotes[index]['見積業者名'] || '').trim());

      if (!keyword) {
        // 空欄ならフォーカス時に全候補を表示（注文決定業者名と同じ挙動）
        this.quoteVendorSuggestions = this.vendors.slice(0, 30);
      } else {
        this.quoteVendorSuggestions = this.vendors.filter(v =>
          normalizeWidth(v.vendorName).includes(keyword) ||
          normalizeWidth(v.shortName || '').includes(keyword) ||
          normalizeWidth(v.vendorId || '').includes(keyword)
        ).slice(0, 30);
      }

      this.showQuoteVendorSuggestions = this.quoteVendorSuggestions.length > 0;
    },

    /**
     * 見積もり業者を選択
     */
    selectQuoteVendor(vendor, index) {
      this.quotes[index]['見積業者名'] = vendor.vendorName;
      this.quotes[index]['_vendorId'] = vendor.vendorId || '';
      // TELと担当者も自動セット（協力会社マスタにあれば）
      if (vendor.tel) {
        this.quotes[index]['TEL'] = vendor.tel;
      }
      if (vendor.contactPerson) {
        this.quotes[index]['担当者'] = vendor.contactPerson;
      }
      this.showQuoteVendorSuggestions = false;
      this.activeQuoteIndex = -1;
      // 自動保存（発注IDがあれば）
      this.saveQuote(this.quotes[index], index);
    },

    /**
     * 見積もり業者サジェストを閉じる
     */
    hideQuoteVendorSuggestions() {
      setTimeout(() => {
        this.showQuoteVendorSuggestions = false;
        this.activeQuoteIndex = -1;
      }, 200);
    },

    /**
     * 見積もりを削除
     */
    async removeQuote(index) {
      const quote = this.quotes[index];
      const quoteId = quote['見積もり詳細ID'];

      if (!confirm('この見積もりを削除しますか？')) {
        return;
      }

      // 保存済みの見積もりならAPIで削除
      if (quoteId) {
        try {
          const result = await GasApi.deleteQuote(quoteId);
          if (!result.success) {
            alert('削除に失敗しました: ' + (result.error || ''));
            return;
          }
        } catch (e) {
          console.error('[OrderForm] 見積もり削除エラー:', e);
          alert('削除に失敗しました');
          return;
        }
      }

      // 配列から削除
      this.quotes.splice(index, 1);
    },

    /**
     * 見積もり合計を計算
     */
    getQuoteTotal(field) {
      return this.quotes.reduce((sum, q) => {
        const val = parseFloat(q[field]) || 0;
        return sum + val;
      }, 0);
    }
  },
